<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teacher Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  font-family:Arial;
  margin:0;
  background:#f5f6fa;
}

.topbar{
  background:#fff;
  padding:12px;
  display:flex;
  justify-content:space-between;
  border-bottom:1px solid #eee;
}

.page{display:none;padding:15px;}
.page.active{display:block;}

.card{
  background:#fff;
  padding:15px;
  margin-bottom:10px;
  border-radius:10px;
}

.bottom-nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  display:flex;
  background:#fff;
  border-top:1px solid #ddd;
}

.nav-item{
  flex:1;
  text-align:center;
  padding:10px;
  cursor:pointer;
}

.nav-item.active{
  color:orange;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="topbar">
  <div><b>Teacher Portal</b></div>
</div>

<!-- HOME -->
<div id="home" class="page active">
  <div class="card">
    <h3>Welcome Teacher</h3>

    <select id="class" onchange="handleClassChange()"></select>
  </div>
</div>

<!-- RESULTS -->
<div id="results" class="page">
  <div class="card">
    <h3>Results</h3>
    <p>View and manage results here</p>
  </div>
</div>

<!-- CHAT -->
<div id="chat" class="page">
  <div class="card">Chat coming soon</div>
</div>

<!-- PROFILE -->
<div id="profile" class="page">
  <div class="card">Profile</div>
</div>

<!-- NAV -->
<div class="bottom-nav">
  <div class="nav-item active" onclick="switchPage('home',this)">Home</div>

  <!-- FIXED RESULTS BUTTON -->
  <div class="nav-item" onclick="openResults(this)">Results</div>

  <div class="nav-item" onclick="switchPage('chat',this)">Chat</div>
  <div class="nav-item" onclick="switchPage('profile',this)">Profile</div>
</div>

<script>

const supabaseClient = supabase.createClient(
"https://bslofdobcvxkjphbjyzb.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJzbG9mZG9iY3Z4a2pwaGJqeXpiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzODY5NTEsImV4cCI6MjA5Njk2Mjk1MX0.oZ8oxXGxKyN4qwBgWrgdp9JOCkNXtREf6epTAcQg45s"
);

/* STATE */
let selectedClass = null;

/* SWITCH PAGE */
function switchPage(page,el){

  document.querySelectorAll('.page')
    .forEach(p=>p.classList.remove('active'));

  document.getElementById(page).classList.add('active');

  document.querySelectorAll('.nav-item')
    .forEach(n=>n.classList.remove('active'));

  el.classList.add('active');
}

/* CLASS CHANGE */
function handleClassChange(){
  selectedClass = document.getElementById("class").value;
}

/* ===================== IMPORTANT FIX ===================== */
async function openResults(el){

  document.querySelectorAll('.nav-item')
    .forEach(n=>n.classList.remove('active'));
  el.classList.add('active');

  if(!selectedClass){
    alert("Please select a class first");
    switchPage('home', el);
    return;
  }

  const { data, error } = await supabaseClient
    .from("published_reports")
    .select("is_published")
    .eq("class_id", selectedClass)
    .maybeSingle();

  if(error){
    alert("Error checking results");
    return;
  }

  if(!data || data.is_published !== true){
    document.getElementById("results").innerHTML = `
      <div class="card">
        <h3>Results</h3>
        <p>Results have not been published yet.</p>
      </div>
    `;

    switchPage("results", el);
    return;
  }

  // OPEN REPORT PAGE
  location.href = "reports.html?class=" + selectedClass;
}

/* LOAD CLASSES */
async function loadClasses(){

  const { data } = await supabaseClient
    .from("classes")
    .select("*");

  const sel = document.getElementById("class");

  sel.innerHTML = `<option value="">Select Class</option>`;

  data.forEach(c=>{
    sel.innerHTML += `<option value="${c.id}">${c.class_name}</option>`;
  });
}

loadClasses();

</script>

</body>
</html>
