<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kemps Portal</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{box-sizing:border-box;font-family:Segoe UI, Arial;}
body{margin:0;background:#f5f6fa;}

/* TOP BAR */
.topbar{
  background:#fff;
  padding:12px 15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid #eee;
}

.brand{
  font-weight:bold;
  color:#111;
  display:flex;
  align-items:center;
  gap:8px;
}

.brand-logo{
  width:30px;height:30px;
  background-image:url("https://bslofdobcvxkjphbjyzb.supabase.co/storage/v1/object/public/logos/school.png");
  background-size:contain;
  background-repeat:no-repeat;
  background-position:center;
  background-color:white;
  border-radius:6px;
}

.user{
  background:#a78bfa;
  color:#fff;
  width:35px;height:35px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
}

/* PAGES */
.page{
  display:none;
  padding:15px;
  opacity:0;
  transform:translateY(10px);
  transition:all .3s ease;
}

.page.active{
  display:block;
  opacity:1;
  transform:translateY(0);
}

/* CARD */
.card{
  background:#fff;
  padding:15px;
  border-radius:12px;
  margin-bottom:12px;
  box-shadow:0 2px 8px rgba(0,0,0,0.06);
  animation:cardIn .3s ease;
}

@keyframes cardIn{
  from{opacity:0;transform:translateY(10px);}
  to{opacity:1;transform:translateY(0);}
}

/* INPUTS */
input,select{
  width:100%;
  padding:10px;
  margin-top:6px;
  border:1px solid #ddd;
  border-radius:8px;
}

/* TABLE */
table{width:100%;border-collapse:collapse;}
th,td{padding:10px;border-bottom:1px solid #eee;}

/* NAV */
.bottom-nav{
  position:fixed;
  bottom:0;left:0;right:0;
  height:65px;
  background:#fff;
  display:flex;
  justify-content:space-around;
  align-items:center;
  border-top:1px solid #eee;
}

.nav-item{
  text-align:center;
  font-size:12px;
  color:#777;
  cursor:pointer;
  transition:.2s;
}

.nav-item:active{transform:scale(.92);}
.nav-item.active{color:#f59e0b;font-weight:bold;}

.hidden{display:none;}

/* SOUND */
.sound-active{
  animation:pulse 1.2s infinite;
}

@keyframes pulse{
  0%{transform:scale(1);}
  70%{transform:scale(1.1);}
  100%{transform:scale(1);}
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="brand">
    <span class="brand-logo"></span>
    KempsPortal
  </div>

  <div style="display:flex;align-items:center;gap:10px;">
    <div id="soundIcon" onclick="SoundManager.toggle()"
      style="width:30px;height:30px;border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      background:#1e3a8a;color:#fff;cursor:pointer;">🔊</div>

    <div class="user" id="userInitials">SM</div>
  </div>
</div>

<!-- HOME -->
<div id="home" class="page active">
  <div class="card">
    <h3 id="teacherInfo">Welcome Teacher</h3>
    <p>Manage your classes and students easily</p>
  </div>

  <div class="card">
    <button onclick="openMyClass()" style="width:100%;padding:10px;border:none;background:#1e3a8a;color:#fff;border-radius:8px;">
      Open Class Teacher Panel
    </button>
  </div>

  <div class="card">
    <h4>Select Class</h4>
    <select id="class" onchange="handleClassChange()"></select>

    <h4 id="subjectLabel" class="hidden">Subject</h4>
    <select id="subject" class="hidden" onchange="handleSubjectChange()"></select>
  </div>

  <div class="card">
    <h3>Students</h3>
    <table>
      <thead>
        <tr><th>Adm</th><th>Name</th><th>Marks</th></tr>
      </thead>
      <tbody id="students"></tbody>
    </table>
  </div>
</div>

<!-- OTHER PAGES -->
<div id="results" class="page"><div class="card"><h3>Results</h3></div></div>
<div id="chat" class="page"><div class="card"><h3>Chat</h3></div></div>
<div id="notices" class="page"><div class="card"><h3>No notices</h3></div></div>

<div id="profile" class="page">
  <div class="card"><h3>Profile</h3></div>

  <div class="card">
    <button onclick="SoundManager.toggle()" style="width:100%;padding:10px;background:#1e3a8a;color:#fff;border:none;border-radius:8px;">
      🔊 Sound Toggle
    </button>

    <button onclick="logout()" style="margin-top:10px;width:100%;padding:10px;background:#ef4444;color:#fff;border:none;border-radius:8px;">
      Logout
    </button>
  </div>
</div>

<!-- NAV -->
<div class="bottom-nav">
  <div class="nav-item active" onclick="switchPage('home',this)">🏠<br>Home</div>
  <div class="nav-item" onclick="switchPage('results',this)">📊<br>Results</div>
  <div class="nav-item" onclick="switchPage('chat',this)">💬<br>Chat</div>
  <div class="nav-item" onclick="switchPage('notices',this)">📢<br>Notices</div>
  <div class="nav-item" onclick="switchPage('profile',this)">👤<br>Profile</div>
</div>

<script>
const supabaseClient = supabase.createClient(
  "https://bslofdobcvxkjphbjyzb.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJzbG9mZG9iY3Z4a2pwaGJqeXpiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzODY5NTEsImV4cCI6MjA5Njk2Mjk1MX0.oZ8oxXGxKyN4qwBgWrgdp9JOCkNXtREf6epTAcQg45s"
);

let teacherId=null;
let assignments=[];
let selectedClass=null;
let selectedSubject=null;

/* PAGE SWITCH */
function switchPage(page, el){
  document.querySelectorAll('.page').forEach(p=>{
    p.classList.remove('active');
  });
  document.getElementById(page).classList.add('active');

  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  el.classList.add('active');
}

/* AUTH */
async function protect(role){
  const { data:{ user } } = await supabaseClient.auth.getUser();
  if(!user){ location.href="../index.html"; return false; }

  const { data } = await supabaseClient
    .from("profiles")
    .select("role")
    .eq("id", user.id)
    .single();

  if(!data || data.role !== role){
    alert("No permission");
    location.href="../index.html";
    return false;
  }
  return true;
}

/* INIT */
async function init(){
  if(!await protect("teacher")) return;

  const { data:{ user } } = await supabaseClient.auth.getUser();
  teacherId=user.id;

  const { data: profile } = await supabaseClient
    .from("profiles")
    .select("full_name")
    .eq("id", user.id)
    .maybeSingle();

  document.getElementById("teacherInfo").innerText =
    `Welcome ${profile?.full_name || "Teacher"}`;

  loadAssignments();
  updateSoundUI();
}

/* ASSIGNMENTS */
async function loadAssignments(){
  const { data } = await supabaseClient
    .from("teacher_assignments")
    .select("class_id, classes(id,class_name)")
    .eq("teacher_id", teacherId);

  assignments=data||[];

  const sel=document.getElementById("class");
  sel.innerHTML=`<option value="">Select Class</option>`;

  const seen=new Set();
  assignments.forEach(a=>{
    if(a.classes && !seen.has(a.classes.id)){
      seen.add(a.classes.id);
      sel.innerHTML+=`<option value="${a.classes.id}">${a.classes.class_name}</option>`;
    }
  });
}

/* CLASS CHANGE */
function handleClassChange(){
  selectedClass=document.getElementById("class").value;
  selectedSubject=null;
  document.getElementById("students").innerHTML="";
  loadSubjects(selectedClass);
}

/* SUBJECTS */
function loadSubjects(class_id){
  const sub=document.getElementById("subject");
  sub.innerHTML=`<option value="">Select Subject</option>`;

  assignments.forEach(a=>{
    if(String(a.class_id)===String(class_id) && a.subjects){
      sub.innerHTML+=`<option value="${a.subjects.id}">${a.subjects.subject_name}</option>`;
    }
  });

  document.getElementById("subject").classList.remove("hidden");
  document.getElementById("subjectLabel").classList.remove("hidden");
}

/* STUDENTS */
async function handleSubjectChange(){
  selectedSubject=document.getElementById("subject").value;
  if(!selectedSubject) return;

  const { data: students } = await supabaseClient
    .from("students")
    .select("*")
    .eq("class_id", selectedClass);

  const { data: marks } = await supabaseClient
    .from("results")
    .select("student_id,marks")
    .eq("subject_id", selectedSubject);

  const map={};
  (marks||[]).forEach(m=>map[m.student_id]=m.marks);

  const tbody=document.getElementById("students");
  tbody.innerHTML="";

  (students||[]).forEach(s=>{
    tbody.innerHTML+=`
      <tr>
        <td>${s.admission_no}</td>
        <td>${s.student_name}</td>
        <td><input type="number" value="${map[s.id]??''}" oninput="autoSave('${s.id}',this.value)"></td>
      </tr>`;
  });
}

/* AUTO SAVE */
async function autoSave(studentId,value){
  if(!selectedSubject) return;

  if(value===""){
    await supabaseClient.from("results")
      .delete()
      .eq("student_id",studentId)
      .eq("subject_id",selectedSubject);
    return;
  }

  await supabaseClient.from("results").upsert([{
    student_id:studentId,
    subject_id:selectedSubject,
    teacher_id:teacherId,
    marks:Number(value)
  }],{onConflict:"student_id,subject_id"});
}

/* CLASS TEACHER */
async function openMyClass(){
  const { data:{ user } } = await supabaseClient.auth.getUser();

  const { data } = await supabaseClient
    .from("teacher_assignments")
    .select("class_id")
    .eq("teacher_id",user.id)
    .eq("is_class_teacher",true)
    .maybeSingle();

  if(!data){
    alert("Not assigned as class teacher");
    return;
  }

  location.href="classteacher.html";
}

/* SOUND */
let soundEnabled=true;

const SoundManager={
  play(){
    if(!soundEnabled) return;
    const audio=document.getElementById("uiClickSound");
    if(audio){ audio.currentTime=0; audio.play().catch(()=>{}); }
  },
  toggle(){
    soundEnabled=!soundEnabled;
    updateSoundUI();
  }
};

function updateSoundUI(){
  const icon=document.getElementById("soundIcon");
  icon.innerHTML=soundEnabled?"🔊":"🔇";
  icon.style.background=soundEnabled?"#1e3a8a":"#6b7280";
}

/* GLOBAL CLICK SOUND */
document.addEventListener("click",(e)=>{
  if(e.target.closest("button, .nav-item, select, input")){
    SoundManager.play();
  }
});

/* LOGOUT */
async function logout(){
  await supabaseClient.auth.signOut();
  location.href="../index.html";
}

init();
</script>

<audio id="uiClickSound" preload="auto">
  <source src="https://bslofdobcvxkjphbjyzb.supabase.co/storage/v1/object/public/sounds/click.mp3">
</audio>

</body>
  </html>
