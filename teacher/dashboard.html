<body>

<!-- ================= TOP BAR ================= -->
<header class="topbar">
  <div class="brand">
    <span class="brand-logo"></span>
    KempsPortal
  </div>

  <div class="user-section">
    <div id="soundIcon">🔊</div>
    <div class="user" id="userInitials">SM</div>
  </div>
</header>

<!-- ================= T.O.D BAR ================= -->
<div id="todText">Loading T.O.D...</div>

<!-- ================= MAIN WRAPPER ================= -->
<main>

  <!-- HOME PAGE -->
  <section id="home" class="page active">

    <div class="card">
      <h2 id="teacherInfo">Welcome Teacher</h2>
      <p>Manage your classes and students</p>
    </div>

    <div class="card">
      <button id="openClassBtn">Open Class Panel</button>
    </div>

    <!-- CLASS + SUBJECT SELECT -->
    <div class="card">

      <label for="class">Class</label>
      <select id="class"></select>

      <label id="subjectLabel" class="hidden">Subject</label>
      <select id="subject" class="hidden"></select>

    </div>

    <!-- MARKS TABLE -->
    <div class="card hidden" id="marksCard">

      <h3>Student Marks</h3>

      <table>
        <thead>
          <tr>
            <th>Adm No</th>
            <th>Name</th>
            <th>Marks</th>
          </tr>
        </thead>

        <tbody id="students"></tbody>
      </table>

    </div>

  </section>

  <!-- RESULTS PAGE -->
  <section id="results" class="page">
    <div class="card">
      <h2>Results</h2>
      <p>Results management area</p>
    </div>
  </section>

  <!-- CHAT PAGE -->
  <section id="chat" class="page">
    <div class="card">
      <h2>Chat</h2>
      <p>Chat system coming soon</p>
    </div>
  </section>

  <!-- NOTICES PAGE -->
  <section id="notices" class="page">
    <div class="card">
      <h2>Notices</h2>
      <p>No notices available</p>
    </div>
  </section>

  <!-- PROFILE PAGE -->
  <section id="profile" class="page">

    <div class="card">
      <h2>Profile</h2>
      <p>Teacher profile settings</p>
    </div>

    <div class="card">

      <h3>Settings</h3>

      <button id="soundToggleBtn">Toggle Sound</button>
      <button id="logoutBtn">Logout</button>

    </div>

  </section>

</main>

<!-- ================= BOTTOM NAV ================= -->
<nav class="bottom-nav">

  <button class="nav-item active" data-page="home">Home</button>
  <button class="nav-item" data-page="results">Results</button>
  <button class="nav-item" data-page="chat">Chat</button>
  <button class="nav-item" data-page="notices">Notices</button>
  <button class="nav-item" data-page="profile">Profile</button>

</nav>
<script>

const supabaseUrl = "https://bslofdobcvxkjphbjyzb.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJzbG9mZG9iY3Z4a2pwaGJqeXpiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzODY5NTEsImV4cCI6MjA5Njk2Mjk1MX0.oZ8oxXGxKyN4qwBgWrgdp9JOCkNXtREf6epTAcQg45s";
const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

/* ================= GLOBAL STATE ================= */
let teacherId = null;
let assignments = [];
let selectedClass = null;
let selectedSubject = null;
let soundEnabled = true;

/* ================= PAGE SWITCHER ================= */
function switchPage(page, el){

  document.querySelectorAll('.page').forEach(p=>{
    p.classList.remove('active');
  });

  document.getElementById(page).classList.add('active');

  document.querySelectorAll('.nav-item').forEach(n=>{
    n.classList.remove('active');
  });

  if(el) el.classList.add('active');
}

/* ================= AUTH PROTECT ================= */
async function protect(roleRequired){

  const { data:{ user } } = await supabaseClient.auth.getUser();

  if(!user){
    location.href = "../index.html";
    return false;
  }

  const { data: profile } = await supabaseClient
    .from("profiles")
    .select("role")
    .eq("id", user.id)
    .single();

  if(!profile || profile.role !== roleRequired){
    alert("No permission");
    location.href = "../index.html";
    return false;
  }

  return true;
}

/* ================= INIT ================= */
async function init(){

  const ok = await protect("teacher");
  if(!ok) return;

  const { data:{ user } } = await supabaseClient.auth.getUser();
  teacherId = user.id;

  const { data: profile } = await supabaseClient
    .from("profiles")
    .select("full_name")
    .eq("id", user.id)
    .maybeSingle();

  document.getElementById("teacherInfo").innerText =
    "Welcome " + (profile?.full_name || "Teacher");

  await loadAssignments();
}

/* ================= LOAD ASSIGNMENTS ================= */
async function loadAssignments(){

  const { data } = await supabaseClient
    .from("teacher_assignments")
    .select(`
      class_id,
      subject_id,
      classes(id,class_name),
      subjects(id,subject_name)
    `)
    .eq("teacher_id", teacherId);

  assignments = data || [];

  const classSel = document.getElementById("class");
  classSel.innerHTML = `<option value="">Select Class</option>`;

  const seen = new Set();

  assignments.forEach(a=>{
    if(a.classes && !seen.has(a.classes.id)){
      seen.add(a.classes.id);

      classSel.innerHTML += `
        <option value="${a.classes.id}">
          ${a.classes.class_name}
        </option>`;
    }
  });
}

/* ================= CLASS CHANGE ================= */
function handleClassChange(){

  selectedClass = document.getElementById("class").value;
  selectedSubject = null;

  document.getElementById("students").innerHTML = "";

  const subject = document.getElementById("subject");
  const label = document.getElementById("subjectLabel");

  subject.classList.remove("hidden");
  label.classList.remove("hidden");

  loadSubjects(selectedClass);
}

/* ================= LOAD SUBJECTS ================= */
function loadSubjects(class_id){

  const subjectSel = document.getElementById("subject");
  subjectSel.innerHTML = `<option value="">Select Subject</option>`;

  assignments.forEach(a=>{

    const cid = a.classes?.id || a.class_id;

    if(String(cid) === String(class_id) && a.subjects){
      subjectSel.innerHTML += `
        <option value="${a.subjects.id}">
          ${a.subjects.subject_name}
        </option>`;
    }
  });
}

/* ================= SUBJECT CHANGE ================= */
function handleSubjectChange(){

  selectedSubject = document.getElementById("subject").value;

  if(!selectedSubject) return;

  loadStudents(selectedClass);
}

/* ================= LOAD STUDENTS ================= */
async function loadStudents(class_id){

  if(!selectedSubject) return;

  const { data: students } = await supabaseClient
    .from("students")
    .select("*")
    .eq("class_id", class_id)
    .order("admission_no");

  const { data: marks } = await supabaseClient
    .from("results")
    .select("student_id, marks")
    .eq("subject_id", selectedSubject);

  const map = {};
  (marks || []).forEach(m=>{
    map[m.student_id] = m.marks;
  });

  const tbody = document.getElementById("students");
  tbody.innerHTML = "";

  (students || []).forEach(s=>{
    tbody.innerHTML += `
      <tr>
        <td>${s.admission_no}</td>
        <td>${s.student_name}</td>
        <td>
          <input type="number"
            value="${map[s.id] ?? ''}"
            oninput="autoSave('${s.id}',this.value)">
        </td>
      </tr>
    `;
  });
}

/* ================= AUTO SAVE MARKS ================= */
async function autoSave(studentId, value){

  if(!selectedSubject) return;

  if(value === ""){
    await supabaseClient
      .from("results")
      .delete()
      .eq("student_id", studentId)
      .eq("subject_id", selectedSubject);
    return;
  }

  await supabaseClient
    .from("results")
    .upsert([{
      student_id: studentId,
      subject_id: selectedSubject,
      teacher_id: teacherId,
      marks: Number(value)
    }],{
      onConflict: "student_id,subject_id"
    });
}

/* ================= OPEN CLASS ================= */
function openMyClass(){
  document.getElementById("class").classList.remove("hidden");
}

/* ================= SOUND ================= */
const SoundManager = {

  toggle(){
    soundEnabled = !soundEnabled;
    updateSoundUI();
  },

  play(){
    if(!soundEnabled) return;

    const audio = document.getElementById("uiClickSound");
    if(audio){
      audio.currentTime = 0;
      audio.play().catch(()=>{});
    }
  }
};

document.addEventListener("click", (e)=>{
  if(e.target.closest("button") || e.target.closest("select") || e.target.closest(".nav-item")){
    SoundManager.play();
  }
});

function updateSoundUI(){
  document.getElementById("soundIcon").innerText =
    soundEnabled ? "🔊" : "🔇";
}

/* ================= LOGOUT ================= */
async function logout(){
  await supabaseClient.auth.signOut();
  location.href = "../index.html";
}

/* ================= NAV RESULT PAGE ================= */
function openResults(){
  location.href = "results.html";
}

/* ================= INIT APP ================= */
init();

</script>
<!-- ================= AUDIO ================= -->
<audio id="uiClickSound">
  <source src="" type="audio/mpeg">
</audio>

</body>
