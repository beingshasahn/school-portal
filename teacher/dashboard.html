<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teacher Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{
  box-sizing:border-box;
  font-family:Arial;
}

body{
  margin:0;
  background:#f4f6f9;
}

/* ===== TOP HEADER (LIKE IMAGE) ===== */
.header{
  background:linear-gradient(135deg,#f39c12,#f1c40f);
  padding:12px 14px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  color:#111;
}

.brand{
  display:flex;
  align-items:center;
  gap:10px;
}

.logo{
  width:40px;
  height:40px;
  border-radius:10px;
  background:#111;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-weight:bold;
}

.brand-text{
  line-height:1.2;
}

.brand-text small{
  display:block;
  font-size:11px;
  opacity:0.7;
}

.right-area{
  display:flex;
  align-items:center;
  gap:10px;
}

.user-chip{
  width:38px;
  height:38px;
  border-radius:50%;
  background:#6c5ce7;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
}

.logout-pill{
  background:#fff;
  border:none;
  padding:6px 10px;
  border-radius:20px;
  cursor:pointer;
  font-weight:bold;
}

/* ===== T.O.D ===== */
.tod-wrapper{
  background:#111;
  padding:6px 0;
  overflow:hidden;
}

.tod-scroll{
  display:inline-block;
  white-space:nowrap;
  animation:scrollLeft 12s linear infinite;
  color:#00ff88;
  font-weight:bold;
  font-size:13px;
}

@keyframes scrollLeft{
  0%{transform:translateX(100%)}
  100%{transform:translateX(-100%)}
}

/* ===== NAV MENU (LIKE IMAGE PILLS) ===== */
.menu{
  display:flex;
  gap:10px;
  padding:12px;
  background:#fff;
  overflow-x:auto;
}

.menu button{
  border:none;
  padding:10px 14px;
  border-radius:20px;
  background:#f1f2f6;
  color:#333;
  font-size:13px;
  white-space:nowrap;
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:6px;
}

.menu button.active{
  background:#f39c12;
  color:#fff;
}

/* ===== CONTENT ===== */
.container{
  padding:14px;
}

/* ===== CARD STYLE (MODERN LIKE IMAGE) ===== */
.card{
  background:#fff;
  border-radius:16px;
  padding:16px;
  margin-bottom:15px;
  box-shadow:0 6px 18px rgba(0,0,0,0.06);
}

/* EMPTY STATE (LIKE "NO NOTICES") */
.empty-state{
  text-align:center;
  padding:40px 20px;
  color:#777;
}

.empty-icon{
  font-size:40px;
  margin-bottom:10px;
}

/* INPUTS */
select,input{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:1px solid #ddd;
  margin-top:6px;
}

/* TABLE (CLEAN PROFESSIONAL) */
table{
  width:100%;
  border-collapse:collapse;
  font-size:14px;
}

th,td{
  padding:10px;
  border-bottom:1px solid #eee;
  text-align:left;
}

/* HIDDEN */
.hidden{display:none}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="brand">
    <div class="logo">E</div>
    <div class="brand-text">
      <b>eduportal</b>
      <small>SunRise Public School</small>
    </div>
  </div>

  <div class="right-area">
    <div class="user-chip">RM</div>
    <button class="logout-pill" onclick="logout()">Logout</button>
  </div>
</div>

<!-- T.O.D -->
<div class="tod-wrapper">
  <div id="todText" class="tod-scroll">Loading T.O.D...</div>
</div>

<!-- MENU -->
<div class="menu">
  <button onclick="openMyClass()">📚 My Class</button>
  <button onclick="showSection('results')">📊 Results</button>
  <button onclick="showSection('chat')">💬 Chat</button>
  <button onclick="openChangePassword()">🔑 Password</button>
</div>

<div class="container">

<!-- CLASS -->
<div class="card">
  <h3>Select Class & Subject</h3>

  <label>Class</label>
  <select id="class" onchange="handleClassChange()">
    <option value="">Select Class</option>
  </select>

  <label id="subjectLabel" class="hidden">Subject</label>
  <select id="subject" class="hidden" onchange="handleSubjectChange()">
    <option value="">Select Subject</option>
  </select>
</div>

<!-- STUDENTS -->
<div class="card">
  <h3>Students Marks Entry</h3>
  <table>
    <thead>
      <tr>
        <th>Adm No</th>
        <th>Name</th>
        <th>Marks</th>
      </tr>
    </thead>
    <tbody id="students"></tbody>
  </table>
</div>

<!-- RESULTS SECTION -->
<div id="resultsSection" class="card hidden">
  <h3>Results</h3>
  <div class="empty-state">
    <div class="empty-icon">📊</div>
    <b>No results</b>
    <p>Check back later for updates</p>
  </div>
</div>

<!-- CHAT -->
<div id="chatSection" class="card hidden">
  <h3>Chat</h3>
  <div class="empty-state">
    <div class="empty-icon">💬</div>
    <b>No messages</b>
    <p>Start a conversation</p>
  </div>
</div>

<!-- PASSWORD -->
<div id="passwordSection" class="card hidden">
  <h3>Change Password</h3>
  <input type="password" id="currentPassword" placeholder="Current password">
  <input type="password" id="newPassword" placeholder="New password">
  <input type="password" id="confirmPassword" placeholder="Confirm password">

  <button onclick="changePassword()" class="logout-pill" style="margin-top:10px;background:#f39c12;color:#fff;">
    Update Password
  </button>

  <div id="passwordMsg"></div>
</div>

</div>

<!-- JS BELOW (UNCHANGED LOGIC - KEEP YOUR ORIGINAL SCRIPT HERE) -->

<script>

const supabaseUrl = "https://bslofdobcvxkjphbjyzb.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJzbG9mZG9iY3Z4a2pwaGJqeXpiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzODY5NTEsImV4cCI6MjA5Njk2Mjk1MX0.oZ8oxXGxKyN4qwBgWrgdp9JOCkNXtREf6epTAcQg45s";

const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

let teacherId = null;
let assignments = [];
let selectedClass = null;
let selectedSubject = null;

/* AUTH */
async function protect(roleRequired){

  const { data:{ user } } = await supabaseClient.auth.getUser();

  if(!user){
    location.href="../index.html";
    return false;
  }

  const { data: profile } = await supabaseClient
    .from("profiles")
    .select("role")
    .eq("id", user.id)
    .single();

  if(!profile || profile.role !== roleRequired){
    alert("No permission");
    location.href="../index.html";
    return false;
  }

  return true;
}

/* INIT */
async function init(){

  const ok = await protect("teacher");
  if(!ok) return;

  const { data:{ user } } = await supabaseClient.auth.getUser();
teacherId = user.id;

/* FETCH PROFILE NAME */
  const { data: profile } = await supabaseClient
    .from("profiles")
    .select("full_name")
    .eq("id", user.id)
    .maybeSingle();

  const name = profile?.full_name || "Teacher";

  const hour = new Date().getHours();

  let greeting = "Good morning";
  if(hour >= 12 && hour < 17){
    greeting = "Good afternoon";
  }else if(hour >= 17){
    greeting = "Good evening";
  }

  document.getElementById("teacherInfo").innerText =
    `${greeting}, ${name}`;

  await loadAssignments();
  await ensureWeeklyTOD();
  await loadTOD();
}

/* WEEK */
function getWeekRange(){
  const d = new Date();
  const day = d.getDay();
  const diff = (day === 0 ? -6 : 1) - day;

  const monday = new Date(d.setDate(d.getDate()+diff));
  const sunday = new Date(monday);
  sunday.setDate(monday.getDate()+6);

  return {
    start: monday.toISOString().split("T")[0],
    end: sunday.toISOString().split("T")[0]
  };
}

/* T.O.D SYSTEM */
async function ensureWeeklyTOD(){

  const { start } = getWeekRange();

  const { data: exists } = await supabaseClient
    .from("tod_rotation")
    .select("id")
    .eq("week_start", start)
    .maybeSingle();

  if(exists) return;

  const { data: teachers } = await supabaseClient
    .from("profiles")
    .select("id")
    .eq("role","teacher");

  if(!teachers?.length) return;

  const index = Math.floor(Math.random()*teachers.length);

  await supabaseClient.from("tod_rotation").insert([{
    teacher_id: teachers[index].id,
    week_start: start,
    week_end: getWeekRange().end
  }]);
}

async function loadTOD(){

  const { start } = getWeekRange();

  const { data: row } = await supabaseClient
    .from("tod_rotation")
    .select("teacher_id")
    .eq("week_start", start)
    .maybeSingle();

  if(!row){
    document.getElementById("todText").innerText =
      "T.O.D: Not assigned this week";
    return;
  }

  const { data: t } = await supabaseClient
    .from("profiles")
    .select("full_name")
    .eq("id", row.teacher_id)
    .maybeSingle();

  const { data:{ user } } = await supabaseClient.auth.getUser();

  document.getElementById("todText").innerText =
    row.teacher_id === user.id
      ? "YOU ARE A T.O.D THIS WEEK"
      : "T.O.D: " + (t?.full_name || "Unknown");
}

/* MY CLASS ROUTE */
async function openMyClass(){

  const { data:{ user } } = await supabaseClient.auth.getUser();

  const { data } = await supabaseClient
    .from("teacher_assignments")
    .select("class_id")
    .eq("teacher_id", user.id)
    .eq("is_class_teacher", true)
    .maybeSingle();

  if(!data){
    alert("You are not assigned as a class teacher yet.");
    return;
  }

  location.href = "classteacher.html";
}

/* ASSIGNMENTS */
async function loadAssignments(){

  const { data } = await supabaseClient
    .from("teacher_assignments")
    .select("class_id, subject_id, classes(id,class_name), subjects(id,subject_name)")
    .eq("teacher_id", teacherId);

  assignments = data || [];

  const sel = document.getElementById("class");
  sel.innerHTML = `<option value="">Select Class</option>`;

  const seen = new Set();

  assignments.forEach(a=>{
    if(a.classes && !seen.has(a.classes.id)){
      seen.add(a.classes.id);
      sel.innerHTML += `<option value="${a.classes.id}">
        ${a.classes.class_name}
      </option>`;
    }
  });
}

/* CLASS */
function handleClassChange(){
  selectedClass = document.getElementById("class").value;
  selectedSubject = null;
  document.getElementById("students").innerHTML = "";

  if(selectedClass) loadSubjects(selectedClass);
}

/* SUBJECT */
function handleSubjectChange(){
  selectedSubject = document.getElementById("subject").value;
  loadStudents(selectedClass);
}

/* SUBJECT LOAD FIXED */
function loadSubjects(class_id){

  const sub = document.getElementById("subject");
  sub.innerHTML = `<option value="">Select Subject</option>`;

  assignments.forEach(a=>{
    const cid = a.classes?.id || a.class_id;

    if(String(cid) === String(class_id) && a.subjects){
      sub.innerHTML += `
        <option value="${a.subjects.id}">
          ${a.subjects.subject_name}
        </option>`;
    }
  });

  showSubject();
}

/* STUDENTS */

async function loadStudents(class_id){

  if(!selectedSubject) return;

  const { data: students } = await supabaseClient
    .from("students")
    .select("*")
    .eq("class_id", class_id)
    .order("admission_no");

  const { data: marksData } = await supabaseClient
    .from("results")
    .select("student_id, marks")
    .eq("subject_id", selectedSubject);

  const marksMap = {};

  (marksData || []).forEach(r=>{
    marksMap[r.student_id] = r.marks;
  });

  const tbody = document.getElementById("students");
  tbody.innerHTML = "";

  (students || []).forEach(s=>{

    tbody.innerHTML += `
      <tr>
        <td>${s.admission_no}</td>
        <td>${s.student_name}</td>
        <td>
          <input
            type="number"
            min="0"
            max="100"
            value="${marksMap[s.id] ?? ''}"
            oninput="autoSave('${s.id}',this.value)">
        </td>
      </tr>
    `;
  });
}

/* SAVE MARKS */
async function autoSave(studentId,value){

  if(!selectedSubject) return;

  const mark = value.trim();

  if(mark === ""){

    await supabaseClient
      .from("results")
      .delete()
      .eq("student_id", studentId)
      .eq("subject_id", selectedSubject);

    return;
  }

  await supabaseClient
    .from("results")
    .upsert([{
      student_id: studentId,
      subject_id: selectedSubject,
      teacher_id: teacherId,
      marks: Number(mark)
    }],{
      onConflict:"student_id,subject_id"
    });
}

/* UI */
function showSubject(){
  document.getElementById("subject").classList.remove("hidden");
  document.getElementById("subjectLabel").classList.remove("hidden");
}

/* SECTION CONTROL */
function showSection(s){

  document.getElementById("classTeacherSection").classList.add("hidden");
  document.getElementById("resultsSection").classList.add("hidden");
  document.getElementById("chatSection").classList.add("hidden");
  document.getElementById("passwordSection").classList.add("hidden");

  if(s==="classTeacher")
    document.getElementById("classTeacherSection").classList.remove("hidden");

  if(s==="results")
    document.getElementById("resultsSection").classList.remove("hidden");

  if(s==="chat")
    document.getElementById("chatSection").classList.remove("hidden");

  if(s==="password")
    document.getElementById("passwordSection").classList.remove("hidden");
}

/* LOGOUT */
async function logout(){
  await supabaseClient.auth.signOut();
  location.href="../index.html";
}
function openChangePassword(){
  showSection("password");
}

async function changePassword(){

  const currentPassword =
    document.getElementById("currentPassword").value.trim();

  const newPassword =
    document.getElementById("newPassword").value.trim();

  const confirmPassword =
    document.getElementById("confirmPassword").value.trim();

  const msg = document.getElementById("passwordMsg");

  msg.innerHTML = "";

  if(!currentPassword || !newPassword || !confirmPassword){
    msg.style.color = "red";
    msg.innerHTML = "Fill all fields";
    return;
  }

  if(newPassword.length < 6){
    msg.style.color = "red";
    msg.innerHTML = "Password must be at least 6 characters";
    return;
  }

  if(newPassword !== confirmPassword){
    msg.style.color = "red";
    msg.innerHTML = "Passwords do not match";
    return;
  }

  try{

    const { data:{ user } } =
      await supabaseClient.auth.getUser();

    const { error: loginError } =
      await supabaseClient.auth.signInWithPassword({
        email: user.email,
        password: currentPassword
      });

    if(loginError){
      msg.style.color = "red";
      msg.innerHTML = "Current password is incorrect";
      return;
    }

    const { error } =
      await supabaseClient.auth.updateUser({
        password: newPassword
      });

    if(error){
      msg.style.color = "red";
      msg.innerHTML = error.message;
      return;
    }

    msg.style.color = "green";
    msg.innerHTML = "Password updated successfully";

    document.getElementById("currentPassword").value = "";
    document.getElementById("newPassword").value = "";
    document.getElementById("confirmPassword").value = "";

  }catch(err){

    msg.style.color = "red";
    msg.innerHTML = err.message;

  }
  }

function togglePassword(){

  const fields = [
    "currentPassword",
    "newPassword",
    "confirmPassword"
  ];

  const btn = document.getElementById("eyeBtn");

  let isHidden = document.getElementById("currentPassword").type === "password";

  fields.forEach(id => {
    document.getElementById(id).type = isHidden ? "text" : "password";
  });

  if(isHidden){
    btn.innerHTML = "🙈 Hide Password";
  } else {
    btn.innerHTML = "👁️ Show Password";
  }
  }
init();

</script>

</body>
</html>
