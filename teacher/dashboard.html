<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kemps Portal</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
/* ===== YOUR ORIGINAL CSS (UNCHANGED) ===== */
*{
  box-sizing:border-box;
  font-family:Segoe UI, Arial;
}

body{
  margin:0;
  background:#f5f6fa;
}

.topbar{
  background:#fff;
  padding:12px 15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid #eee;
}

.brand{font-weight:bold;color:#111;}

.user{
  background:#a78bfa;
  color:#fff;
  width:35px;
  height:35px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
}

.page{display:none;padding:15px;animation:fade 0.3s ease-in-out;}

.page.active{display:block;}

@keyframes fade{
  from{opacity:0; transform:translateY(10px)}
  to{opacity:1; transform:translateY(0)}
}

.card{
  background:#fff;
  padding:15px;
  border-radius:12px;
  margin-bottom:12px;
  box-shadow:0 2px 8px rgba(0,0,0,0.06);
}

input,select{
  width:100%;
  padding:10px;
  margin-top:6px;
  border:1px solid #ddd;
  border-radius:8px;
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:10px;
  border-bottom:1px solid #eee;
}

.bottom-nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  height:65px;
  background:#fff;
  display:flex;
  justify-content:space-around;
  align-items:center;
  border-top:1px solid #eee;
}

.nav-item{
  text-align:center;
  font-size:12px;
  color:#777;
  cursor:pointer;
}

.nav-item span{display:block;font-size:18px;}

.hidden{display:none;}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="brand">
    KempsPortal
  </div>

  <div class="user" id="userInitials">SM</div>
</div>

<!-- HOME -->
<div id="home" class="page active">
  <div class="card">
    <h3 id="teacherInfo">Welcome Teacher</h3>
  </div>

  <div class="card">
    <button onclick="openMyClass()">Open Class Teacher Panel</button>
  </div>

  <div class="card">
    <h4>Select Class</h4>
    <select id="class" onchange="handleClassChange()"></select>

    <h4 id="subjectLabel" class="hidden">Subject</h4>
    <select id="subject" class="hidden" onchange="handleSubjectChange()"></select>
  </div>

  <div class="card">
    <table>
      <thead>
        <tr>
          <th>Adm</th>
          <th>Name</th>
          <th>Marks</th>
        </tr>
      </thead>
      <tbody id="students"></tbody>
    </table>
  </div>
</div>

<!-- RESULTS (ENHANCED LATER) -->
<div id="results" class="page">
  <div class="card">
    <h3>Results</h3>

    <!-- NEW: publish lock status UI -->
    <p id="publishStatus">Checking publication...</p>

    <!-- results content -->
    <div id="resultsContent"></div>
  </div>
</div>

<!-- OTHER PAGES -->
<div id="chat" class="page"><div class="card"><h3>Chat</h3></div></div>
<div id="notices" class="page"><div class="card"><h3>Notices</h3></div></div>
<div id="profile" class="page"><div class="card"><h3>Profile</h3></div></div>

<!-- NAV -->
<div class="bottom-nav">
  <div class="nav-item" onclick="switchPage('home',this)">🏠</div>
  <div class="nav-item" onclick="switchPage('results',this)">📊</div>
  <div class="nav-item" onclick="switchPage('chat',this)">💬</div>
  <div class="nav-item" onclick="switchPage('notices',this)">📢</div>
  <div class="nav-item" onclick="switchPage('profile',this)">👤</div>
</div>

<script>

/* ================= SUPABASE ================= */
const supabaseUrl = "https://bslofdobcvxkjphbjyzb.supabase.co";
const supabaseKey = "YOUR_KEY_HERE";
const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

/* ================= STATE (YOUR ORIGINAL + NEW) ================= */
let teacherId = null;
let assignments = [];
let selectedClass = null;
let selectedSubject = null;

/* NEW: publication state */
let isPublished = false;

/* ================= PAGE SWITCH (YOUR ORIGINAL) ================= */
function switchPage(page, el){

  document.querySelectorAll('.page').forEach(p=>{
    p.classList.remove('active');
  });

  document.getElementById(page).classList.add('active');

  document.querySelectorAll('.nav-item').forEach(n=>{
    n.classList.remove('active');
  });

  el.classList.add('active');

  // NEW: trigger results check ONLY
  if(page === "results"){
    checkPublishStatus();
  }
}

/* ================= NEW: CHECK PUBLICATION ================= */
async function checkPublishStatus(){

  if(!selectedClass){
    document.getElementById("publishStatus").innerText =
      "Select a class first";
    return;
  }

  const { data } = await supabaseClient
    .from("published_reports")
    .select("*")
    .eq("class_id", selectedClass)
    .maybeSingle();

  isPublished = data?.is_published || false;

  document.getElementById("publishStatus").innerText =
    isPublished ? "✅ Results Published" : "🔒 Not Published";

  document.getElementById("resultsContent").innerHTML =
    isPublished ? "Loading results..." : "";
}

<script>

/* ================= STATE (from PART 1) ================= */
let teacherId = null;
let assignments = [];
let selectedClass = null;
let selectedSubject = null;
let isPublished = false;

/* ================= AUTH (UNCHANGED LOGIC) ================= */
async function protect(roleRequired){

  const { data:{ user } } = await supabaseClient.auth.getUser();

  if(!user){
    location.href="../index.html";
    return false;
  }

  const { data: profile } = await supabaseClient
    .from("profiles")
    .select("role")
    .eq("id", user.id)
    .single();

  if(!profile || profile.role !== roleRequired){
    alert("No permission");
    location.href="../index.html";
    return false;
  }

  return true;
}

/* ================= INIT (UNCHANGED) ================= */
async function init(){

  const ok = await protect("teacher");
  if(!ok) return;

  const { data:{ user } } = await supabaseClient.auth.getUser();
  teacherId = user.id;

  const { data: profile } = await supabaseClient
    .from("profiles")
    .select("full_name")
    .eq("id", user.id)
    .maybeSingle();

  const name = profile?.full_name || "Teacher";

  document.getElementById("teacherInfo").innerText =
    "Welcome " + name;

  await loadAssignments();
}

/* ================= CLASS CHANGE (UNCHANGED) ================= */
function handleClassChange(){

  selectedClass = document.getElementById("class").value;
  selectedSubject = null;

  document.getElementById("students").innerHTML = "";

  if(selectedClass){
    loadSubjects(selectedClass);
  }
}

/* ================= SUBJECT CHANGE (UNCHANGED) ================= */
function handleSubjectChange(){

  selectedSubject = document.getElementById("subject").value;

  if(selectedClass && selectedSubject){
    loadStudents(selectedClass);
  }
}

/* ================= LOAD SUBJECTS (UNCHANGED) ================= */
function loadSubjects(class_id){

  const sub = document.getElementById("subject");
  sub.innerHTML = `<option value="">Select Subject</option>`;

  assignments.forEach(a=>{

    const cid = a.classes?.id || a.class_id;

    if(String(cid) === String(class_id) && a.subjects){

      sub.innerHTML += `
        <option value="${a.subjects.id}">
          ${a.subjects.subject_name}
        </option>
      `;
    }
  });

  document.getElementById("subject").classList.remove("hidden");
  document.getElementById("subjectLabel").classList.remove("hidden");
}

/* ================= LOAD STUDENTS (UNCHANGED CORE LOGIC) ================= */
async function loadStudents(class_id){

  if(!selectedSubject) return;

  const { data: students } = await supabaseClient
    .from("students")
    .select("*")
    .eq("class_id", class_id)
    .order("admission_no");

  const { data: marksData } = await supabaseClient
    .from("results")
    .select("student_id, marks")
    .eq("subject_id", selectedSubject);

  const marksMap = {};

  (marksData || []).forEach(r=>{
    marksMap[r.student_id] = r.marks;
  });

  const tbody = document.getElementById("students");
  tbody.innerHTML = "";

  (students || []).forEach(s=>{

    tbody.innerHTML += `
      <tr>
        <td>${s.admission_no}</td>
        <td>${s.student_name}</td>
        <td>
          <input type="number"
            value="${marksMap[s.id] ?? ''}"
            oninput="autoSave('${s.id}',this.value)">
        </td>
      </tr>
    `;
  });
}

/* ================= LOAD ASSIGNMENTS (UNCHANGED) ================= */
async function loadAssignments(){

  const { data } = await supabaseClient
    .from("teacher_assignments")
    .select(`
      class_id,
      subject_id,
      classes(id,class_name),
      subjects(id,subject_name)
    `)
    .eq("teacher_id", teacherId);

  assignments = data || [];

  const sel = document.getElementById("class");
  sel.innerHTML = `<option value="">Select Class</option>`;

  const seen = new Set();

  assignments.forEach(a=>{
    if(a.classes && !seen.has(a.classes.id)){
      seen.add(a.classes.id);

      sel.innerHTML += `
        <option value="${a.classes.id}">
          ${a.classes.class_name}
        </option>
      `;
    }
  });
}

/* ================= AUTOSAVE (UNCHANGED) ================= */
async function autoSave(studentId,value){

  if(!selectedSubject) return;

  if(value.trim() === ""){

    await supabaseClient
      .from("results")
      .delete()
      .eq("student_id", studentId)
      .eq("subject_id", selectedSubject);

    return;
  }

  await supabaseClient
    .from("results")
    .upsert([{
      student_id: studentId,
      subject_id: selectedSubject,
      teacher_id: teacherId,
      marks: Number(value)
    }],{
      onConflict:"student_id,subject_id"
    });
}

/* ================= OPEN CLASS (UNCHANGED) ================= */
async function openMyClass(){

  const { data:{ user } } = await supabaseClient.auth.getUser();

  const { data } = await supabaseClient
    .from("teacher_assignments")
    .select("class_id")
    .eq("teacher_id", user.id)
    .eq("is_class_teacher", true)
    .maybeSingle();

  if(!data){
    alert("You are not assigned as a class teacher yet.");
    return;
  }

  location.href = "classteacher.html";
}

/* ================= SOUND SYSTEM (UNCHANGED) ================= */
let soundEnabled = true;

const SoundManager = {

  play(){
    if(!soundEnabled) return;

    const audio = document.getElementById("uiClickSound");
    if(!audio) return;

    audio.currentTime = 0;
    audio.play().catch(()=>{});
  },

  toggle(){
    soundEnabled = !soundEnabled;
    updateSoundUI();
  }
};

document.addEventListener("click",(e)=>{

  if(
    e.target.closest("button") ||
    e.target.closest(".nav-item") ||
    e.target.closest("select") ||
    e.target.closest("input")
  ){
    SoundManager.play();
  }
});

/* ================= LOGOUT (UNCHANGED) ================= */
async function logout(){
  await supabaseClient.auth.signOut();
  location.href="../index.html";
}


/* ================= SUPABASE INIT (FINAL SAFE) ================= */
const supabaseUrl = "https://bslofdobcvxkjphbjyzb.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJzbG9mZG9iY3Z4a2pwaGJqeXpiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzODY5NTEsImV4cCI6MjA5Njk2Mjk1MX0.oZ8oxXGxKyN4qwBgWrgdp9JOCkNXtREf6epTAcQg45s";
const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

/* ================= RESULTS STATE ================= */
let isPublished = false;

/* ================= CHECK PUBLISH STATUS ================= */
async function checkPublishStatus(){

  if(!selectedClass){
    document.getElementById("publishStatus").innerText =
      "Select a class first";
    return;
  }

  const { data } = await supabaseClient
    .from("published_reports")
    .select("*")
    .eq("class_id", selectedClass)
    .maybeSingle();

  isPublished = data?.is_published || false;

  const status = document.getElementById("publishStatus");

  if(status){
    status.innerText = isPublished
      ? "✅ Results Published"
      : "🔒 Results Not Published";
  }
}

/* ================= RESULTS PAGE RENDER ================= */
async function loadResults(){

  const container = document.getElementById("resultsContent");

  if(!selectedClass){
    container.innerHTML = "<p>Select class first</p>";
    return;
  }

  await checkPublishStatus();

  // 🔒 BLOCK IF NOT PUBLISHED
  if(!isPublished){
    container.innerHTML = `
      <div style="padding:15px;background:#fff;border-radius:10px;">
        🔒 Results have not been published yet.
      </div>
    `;
    return;
  }

  // ✅ LOAD RESULTS
  const { data: results } = await supabaseClient
    .from("results")
    .select(`
      student_id,
      marks,
      students(student_name, admission_no)
    `)
    .eq("class_id", selectedClass);

  if(!results || results.length === 0){
    container.innerHTML = "<p>No results found</p>";
    return;
  }

  let html = `
    <table>
      <thead>
        <tr>
          <th>Adm</th>
          <th>Name</th>
          <th>Marks</th>
        </tr>
      </thead>
      <tbody>
  `;

  results.forEach(r=>{
    html += `
      <tr>
        <td>${r.students?.admission_no || ""}</td>
        <td>${r.students?.student_name || ""}</td>
        <td>${r.marks}</td>
      </tr>
    `;
  });

  html += `</tbody></table>`;

  container.innerHTML = html;
}

/* ================= PAGE SWITCH (FINAL PATCH) ================= */
function switchPage(page, el){

  document.querySelectorAll('.page').forEach(p=>{
    p.classList.remove('active');
  });

  document.getElementById(page).classList.add('active');

  document.querySelectorAll('.nav-item').forEach(n=>{
    n.classList.remove('active');
  });

  el.classList.add('active');

  // 👉 ONLY TRIGGER RESULTS LOGIC HERE
  if(page === "results"){
    loadResults();
  }
}

/* ================= INIT CALL ================= */
init();


</script>

</body>
</html>
