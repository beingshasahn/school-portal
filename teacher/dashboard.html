<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kemps Portal FIXED</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{
  box-sizing:border-box;
  font-family:Segoe UI, Arial;
}

body{
  margin:0;
  background:#f5f6fa;
}

/* TOP BAR */
.topbar{
  background:#fff;
  padding:12px 15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid #eee;
}

.brand{
  font-weight:bold;
  color:#111;
  display:flex;
  align-items:center;
  gap:8px;
}

.user{
  background:#a78bfa;
  color:#fff;
  width:35px;
  height:35px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* PAGES */
.page{
  display:none;
  padding:15px;
}

.page.active{
  display:block;
}

/* CARD */
.card{
  background:#fff;
  padding:15px;
  border-radius:12px;
  margin-bottom:12px;
}

/* HIDDEN FIX */
.hidden{
  display:none !important;
}

/* INPUTS */
input,select{
  width:100%;
  padding:10px;
  margin-top:6px;
  border:1px solid #ddd;
  border-radius:8px;
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:10px;
  border-bottom:1px solid #eee;
}

/* BUTTON */
button{
  cursor:pointer;
}

</style>
</head>

<body>

<div class="topbar">
  <div class="brand">📘 KempsPortal</div>
  <div class="user">SM</div>
</div>

<!-- HOME -->
<div id="home" class="page active">

  <div class="card">
    <h3 id="teacherInfo">Welcome Teacher</h3>
  </div>

  <div class="card">
    <button onclick="openMyClass()">Open Class Panel</button>
  </div>

  <!-- CLASS + SUBJECT -->
  <div class="card hidden" id="marksCard">

    <h3>Marks Entry</h3>

    <label>Class</label>
    <select id="class" onchange="handleClassChange()">
      <option value="">Select Class</option>
    </select>

    <div id="subjectWrapper" class="hidden">
      <label>Subject</label>
      <select id="subject" onchange="handleSubjectChange()">
        <option value="">Select Subject</option>
      </select>
    </div>

  </div>

  <!-- TABLE -->
  <div class="card">
    <table>
      <thead>
        <tr>
          <th>Adm</th>
          <th>Name</th>
          <th>Marks</th>
        </tr>
      </thead>
      <tbody id="students"></tbody>
    </table>
  </div>

</div>

<script>

/* STATE */
let teacherId = null;
let assignments = [];
let selectedClass = null;
let selectedSubject = null;

/* SUPABASE */
const supabaseClient = supabase.createClient(
  "https://bslofdobcvxkjphbjyzb.supabase.co",
  "YOUR_KEY"
);

/* INIT */
async function init(){

  const { data:{ user } } = await supabaseClient.auth.getUser();
  teacherId = user.id;

  loadAssignments();
}

init();

/* OPEN CLASS PANEL */
function openMyClass(){

  document.getElementById("marksCard").classList.remove("hidden");

  // IMPORTANT FIX:
  document.getElementById("class").classList.remove("hidden");

}

/* STEP 1: CLASS CHANGE */
function handleClassChange(){

  selectedClass = document.getElementById("class").value;

  selectedSubject = null;

  document.getElementById("students").innerHTML = "";

  document.getElementById("subjectWrapper").classList.remove("hidden");

  loadSubjects(selectedClass);
}

/* STEP 2: LOAD SUBJECTS */
function loadSubjects(class_id){

  const sub = document.getElementById("subject");

  sub.innerHTML = `<option value="">Select Subject</option>`;

  assignments.forEach(a=>{

    const cid = a.class_id || a.classes?.id;

    if(String(cid) === String(class_id)){

      sub.innerHTML += `
        <option value="${a.subjects.id}">
          ${a.subjects.subject_name}
        </option>
      `;
    }
  });
}

/* STEP 3: SUBJECT CHANGE */
function handleSubjectChange(){

  selectedSubject = document.getElementById("subject").value;

  if(!selectedSubject) return;

  loadStudents(selectedClass);

}

/* LOAD ASSIGNMENTS */
async function loadAssignments(){

  const { data } = await supabaseClient
    .from("teacher_assignments")
    .select(`
      class_id,
      classes(id,class_name),
      subjects(id,subject_name)
    `)
    .eq("teacher_id", teacherId);

  assignments = data || [];

  const sel = document.getElementById("class");

  sel.innerHTML = `<option value="">Select Class</option>`;

  const seen = new Set();

  assignments.forEach(a=>{

    if(!seen.has(a.classes.id)){
      seen.add(a.classes.id);

      sel.innerHTML += `
        <option value="${a.classes.id}">
          ${a.classes.class_name}
        </option>
      `;
    }

  });

}

/* LOAD STUDENTS */
async function loadStudents(class_id){

  const { data: students } = await supabaseClient
    .from("students")
    .select("*")
    .eq("class_id", class_id);

  const tbody = document.getElementById("students");
  tbody.innerHTML = "";

  students.forEach(s=>{
    tbody.innerHTML += `
      <tr>
        <td>${s.admission_no}</td>
        <td>${s.student_name}</td>
        <td><input type="number"></td>
      </tr>
    `;
  });

}

  /* =========================
   MARKS SYSTEM (FULL FIX)
========================= */

async function loadStudents(class_id){

  if(!selectedSubject) return;

  const { data: students } = await supabaseClient
    .from("students")
    .select("*")
    .eq("class_id", class_id)
    .order("admission_no");

  const { data: marksData } = await supabaseClient
    .from("results")
    .select("student_id, marks")
    .eq("subject_id", selectedSubject);

  const marksMap = {};

  (marksData || []).forEach(r=>{
    marksMap[r.student_id] = r.marks;
  });

  const tbody = document.getElementById("students");
  tbody.innerHTML = "";

  (students || []).forEach(s=>{
    tbody.innerHTML += `
      <tr>
        <td>${s.admission_no}</td>
        <td>${s.student_name}</td>
        <td>
          <input type="number"
            value="${marksMap[s.id] ?? ''}"
            oninput="autoSave('${s.id}',this.value)">
        </td>
      </tr>
    `;
  });
}

/* AUTO SAVE MARKS */
async function autoSave(studentId, value){

  if(!selectedSubject) return;

  if(value === "" || value === null){

    await supabaseClient
      .from("results")
      .delete()
      .eq("student_id", studentId)
      .eq("subject_id", selectedSubject);

    return;
  }

  await supabaseClient
    .from("results")
    .upsert([{
      student_id: studentId,
      subject_id: selectedSubject,
      teacher_id: teacherId,
      marks: Number(value)
    }],{
      onConflict: "student_id,subject_id"
    });
}


/* =========================
   TOD SYSTEM (FULL)
========================= */

function getWeekRange(){

  const d = new Date();
  const day = d.getDay();

  const diff = (day === 0 ? -6 : 1) - day;

  const monday = new Date(d);
  monday.setDate(d.getDate() + diff);

  const sunday = new Date(monday);
  sunday.setDate(monday.getDate() + 6);

  return {
    start: monday.toISOString().split("T")[0],
    end: sunday.toISOString().split("T")[0]
  };
}

async function ensureTOD(){

  const { start, end } = getWeekRange();

  const { data: exists } = await supabaseClient
    .from("tod_rotation")
    .select("id")
    .eq("week_start", start)
    .maybeSingle();

  if(exists) return;

  const { data: teachers } = await supabaseClient
    .from("profiles")
    .select("id")
    .eq("role", "teacher");

  if(!teachers?.length) return;

  const random = teachers[Math.floor(Math.random() * teachers.length)];

  await supabaseClient
    .from("tod_rotation")
    .insert([{
      teacher_id: random.id,
      week_start: start,
      week_end: end
    }]);
}

async function loadTOD(){

  const { start } = getWeekRange();

  const { data: row } = await supabaseClient
    .from("tod_rotation")
    .select("teacher_id")
    .eq("week_start", start)
    .maybeSingle();

  if(!row){
    document.getElementById("todText").innerText =
      "T.O.D: Not assigned this week";
    return;
  }

  const { data: t } = await supabaseClient
    .from("profiles")
    .select("full_name")
    .eq("id", row.teacher_id)
    .maybeSingle();

  const { data:{ user } } = await supabaseClient.auth.getUser();

  const text = row.teacher_id === user.id
    ? "YOU ARE A T.O.D THIS WEEK"
    : "T.O.D: " + (t?.full_name || "Unknown");

  document.getElementById("todText").innerText = text;
}

function subscribeTODRealtime(){

  supabaseClient
    .channel('tod-live')
    .on('postgres_changes',
      {
        event: '*',
        schema: 'public',
        table: 'tod_rotation'
      },
      () => {

        const el = document.getElementById("todText");

        el.classList.add("tod-flash");

        loadTOD();

        setTimeout(()=>{
          el.classList.remove("tod-flash");
        }, 800);

      }
    )
    .subscribe();
}


/* =========================
   AUTH FUNCTIONS
========================= */

async function logout(){
  await supabaseClient.auth.signOut();
  location.href = "../index.html";
}

async function changePassword(){

  const current = document.getElementById("currentPassword").value.trim();
  const newPass = document.getElementById("newPassword").value.trim();
  const confirm = document.getElementById("confirmPassword").value.trim();

  const msg = document.getElementById("passwordMsg");

  if(!current || !newPass || !confirm){
    msg.innerText = "Fill all fields";
    msg.style.color = "red";
    return;
  }

  if(newPass !== confirm){
    msg.innerText = "Passwords do not match";
    msg.style.color = "red";
    return;
  }

  const { data:{ user } } = await supabaseClient.auth.getUser();

  const { error: loginError } = await supabaseClient.auth.signInWithPassword({
    email: user.email,
    password: current
  });

  if(loginError){
    msg.innerText = "Current password is wrong";
    msg.style.color = "red";
    return;
  }

  const { error } = await supabaseClient.auth.updateUser({
    password: newPass
  });

  if(error){
    msg.innerText = error.message;
    msg.style.color = "red";
    return;
  }

  msg.innerText = "Password updated successfully";
  msg.style.color = "green";

  document.getElementById("currentPassword").value = "";
  document.getElementById("newPassword").value = "";
  document.getElementById("confirmPassword").value = "";
}


/* =========================
   NAVIGATION
========================= */

function openResults(){
  window.location.href = "results.html";
}


/* =========================
   SOUND SYSTEM
========================= */

let soundEnabled = true;

const SoundManager = {

  play(){
    if(!soundEnabled) return;

    const audio = document.getElementById("uiClickSound");
    if(!audio) return;

    audio.currentTime = 0;
    audio.play().catch(()=>{});
  },

  toggle(){
    soundEnabled = !soundEnabled;
    updateSoundUI();
  }
};

function updateSoundUI(){

  const icon = document.getElementById("soundIcon");
  if(!icon) return;

  icon.innerHTML = soundEnabled ? "🔊" : "🔇";

  icon.style.background = soundEnabled ? "#1e3a8a" : "#6b7280";
}

document.addEventListener("click", (e)=>{

  if(
    e.target.closest("button") ||
    e.target.closest("select") ||
    e.target.closest("input") ||
    e.target.closest(".nav-item")
  ){
    SoundManager.play();
  }

});
</script>

</body>
</html>
