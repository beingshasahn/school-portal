<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kemps Portal</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
/* (YOUR FULL CSS EXACTLY UNCHANGED) */
*{
  box-sizing:border-box;
  font-family:Segoe UI, Arial;
}

body{margin:0;background:#f5f6fa;}

.topbar{
  background:#fff;
  padding:12px 15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid #eee;
}

.page{
  display:none;
  padding:15px;
  animation:fade 0.3s ease-in-out;
  opacity:0;
  transform:translateY(12px) scale(0.98);
  transition:all 0.35s ease-in-out;
}

.page.active{
  display:block;
  opacity:1;
  transform:translateY(0) scale(1);
}

.card{
  background:#fff;
  padding:15px;
  border-radius:12px;
  margin-bottom:12px;
  box-shadow:0 2px 8px rgba(0,0,0,0.06);
  animation:cardIn 0.4s ease;
}

@keyframes cardIn{
  from{opacity:0;transform:translateY(15px);}
  to{opacity:1;transform:translateY(0);}
}

.bottom-nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  height:65px;
  background:#fff;
  display:flex;
  justify-content:space-around;
  align-items:center;
  border-top:1px solid #eee;
}

.nav-item{
  text-align:center;
  font-size:12px;
  color:#777;
  cursor:pointer;
}

.nav-item.active{
  color:#f59e0b;
  font-weight:bold;
}

.hidden{display:none;}
</style>
</head>

<body>

<div class="topbar">
  <div class="brand">Kemps Portal</div>
  <div id="userInitials">SM</div>
</div>

<!-- HOME -->
<div id="home" class="page active">
  <div class="card">
    <h3 id="teacherInfo">Welcome Teacher</h3>

    <h4>Select Class</h4>
    <select id="class" onchange="handleClassChange()"></select>

    <h4 id="subjectLabel" class="hidden">Subject</h4>
    <select id="subject" class="hidden" onchange="handleSubjectChange()"></select>
  </div>

  <div class="card">
    <h3>Students</h3>
    <table>
      <thead>
        <tr>
          <th>Adm</th>
          <th>Name</th>
          <th>Marks</th>
        </tr>
      </thead>
      <tbody id="students"></tbody>
    </table>
  </div>
</div>

<!-- RESULTS -->
<div id="results" class="page">
  <div class="card">
    <h3>Results</h3>
    <p>View and manage results here</p>
  </div>
</div>

<!-- NAV -->
<div class="bottom-nav">
  <div class="nav-item active" onclick="switchPage('home',this)">Home</div>

  <!-- 🔥 RESULTS -->
  <div class="nav-item" onclick="openResults(this)">Results</div>

  <div class="nav-item" onclick="switchPage('chat',this)">Chat</div>
  <div class="nav-item" onclick="switchPage('profile',this)">Profile</div>
</div>
<script>

/* ===== STATE ===== */
let teacherId = null;
let assignments = [];
let selectedClass = null;
let selectedSubject = null;

/* ===== SUPABASE ===== */
const supabaseClient = supabase.createClient(
"https://bslofdobcvxkjphbjyzb.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJzbG9mZG9iY3Z4a2pwaGJqeXpiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzODY5NTEsImV4cCI6MjA5Njk2Mjk1MX0.oZ8oxXGxKyN4qwBgWrgdp9JOCkNXtREf6epTAcQg45s"
);

/* ===== SWITCH PAGE (UNCHANGED) ===== */
function switchPage(page, el){

  document.querySelectorAll('.page')
    .forEach(p=>{
      p.style.opacity = "0";
      p.style.transform = "translateY(10px) scale(0.98)";
      setTimeout(()=>p.classList.remove('active'),150);
    });

  setTimeout(()=>{
    document.getElementById(page).classList.add('active');
  },150);

  document.querySelectorAll('.nav-item')
    .forEach(n=>n.classList.remove('active'));

  el.classList.add('active');
}

/* ===== YOUR FUNCTIONS (UNCHANGED LOGIC) ===== */
function handleClassChange(){
  selectedClass = document.getElementById("class").value;
  selectedSubject = null;
  document.getElementById("students").innerHTML = "";
  if(selectedClass) loadSubjects(selectedClass);
}

function handleSubjectChange(){
  selectedSubject = document.getElementById("subject").value;
  loadStudents(selectedClass);
}

function loadSubjects(class_id){

  const sub = document.getElementById("subject");
  sub.innerHTML = `<option value="">Select Subject</option>`;

  assignments.forEach(a=>{
    const cid = a.classes?.id;
    if(String(cid) === String(class_id)){
      sub.innerHTML += `
        <option value="${a.subjects.id}">
          ${a.subjects.subject_name}
        </option>`;
    }
  });

  document.getElementById("subject").classList.remove("hidden");
  document.getElementById("subjectLabel").classList.remove("hidden");
}

async function loadStudents(class_id){

  if(!selectedSubject) return;

  const { data } = await supabaseClient
    .from("students")
    .select("*")
    .eq("class_id", class_id);

  const tbody = document.getElementById("students");
  tbody.innerHTML = "";

  (data || []).forEach(s=>{
    tbody.innerHTML += `
      <tr>
        <td>${s.admission_no}</td>
        <td>${s.student_name}</td>
        <td><input type="number"></td>
      </tr>
    `;
  });
}

  /* ================= 🔥 NEW: RESULTS CHECK ================= */
async function openResults(el){

  document.querySelectorAll('.nav-item')
    .forEach(n=>n.classList.remove('active'));
  el.classList.add('active');

  if(!selectedClass){
    alert("Please select a class first");
    switchPage('home', el);
    return;
  }

  const { data } = await supabaseClient
    .from("published_reports")
    .select("is_published")
    .eq("class_id", selectedClass)
    .maybeSingle();

  if(!data || data.is_published !== true){

    document.getElementById("results").innerHTML = `
      <div class="card">
        <h3>Results</h3>
        <p>Results have not been published yet</p>
      </div>
    `;

    switchPage("results", el);
    return;
  }

  // OPEN REPORT
  location.href = `reports.html?class=${selectedClass}`;
}

/* ===== INIT ===== */
async function init(){

  const { data:{ user } } = await supabaseClient.auth.getUser();
  teacherId = user.id;

  const { data } = await supabaseClient
    .from("teacher_assignments")
    .select(`
      class_id,
      subject_id,
      classes(id,class_name),
      subjects(id,subject_name)
    `)
    .eq("teacher_id", teacherId);

  assignments = data || [];

  const sel = document.getElementById("class");
  sel.innerHTML = `<option value="">Select Class</option>`;

  const seen = new Set();

  assignments.forEach(a=>{
    if(a.classes && !seen.has(a.classes.id)){
      seen.add(a.classes.id);
      sel.innerHTML += `
        <option value="${a.classes.id}">
          ${a.classes.class_name}
        </option>`;
    }
  });
}

init();

</script>
</body>
</html>
