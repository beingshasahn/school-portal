<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kemps Portal</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
/* ===== YOUR ORIGINAL CSS (UNCHANGED) ===== */
*{box-sizing:border-box;font-family:Segoe UI, Arial;}
body{margin:0;background:#f5f6fa;}
.topbar{background:#fff;padding:12px 15px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #eee;}
.brand{font-weight:bold;color:#111;}
.user{background:#a78bfa;color:#fff;width:35px;height:35px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:bold;}
.page{display:none;padding:15px;animation:fade 0.3s ease-in-out;}
.page.active{display:block;}
@keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.card{background:#fff;padding:15px;border-radius:12px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,0.06);}
input,select{width:100%;padding:10px;margin-top:6px;border:1px solid #ddd;border-radius:8px;}
table{width:100%;border-collapse:collapse;}
th,td{padding:10px;border-bottom:1px solid #eee;text-align:left;}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:65px;background:#fff;display:flex;justify-content:space-around;align-items:center;border-top:1px solid #eee;}
.nav-item{text-align:center;font-size:12px;color:#777;cursor:pointer;}
.nav-item span{display:block;font-size:18px;}
.nav-item.active{color:#f59e0b;font-weight:bold;}
.hidden{display:none;}
</style>
</head>

<body>

<div class="topbar">
  <div class="brand">KempsPortal</div>
  <div class="user" id="userInitials">SM</div>
</div>

<!-- HOME -->
<div id="home" class="page active">
  <div class="card">
    <h3 id="teacherInfo">Welcome Teacher</h3>
  </div>

  <div class="card">
    <h4>Select Class</h4>
    <select id="class" onchange="handleClassChange()"></select>

    <h4 id="subjectLabel" class="hidden">Subject</h4>
    <select id="subject" class="hidden" onchange="handleSubjectChange()"></select>
  </div>

  <div class="card">
    <h3>Students</h3>
    <table>
      <thead>
        <tr><th>Adm</th><th>Name</th><th>Marks</th></tr>
      </thead>
      <tbody id="students"></tbody>
    </table>
  </div>
</div>

<!-- RESULTS -->
<div id="results" class="page">
  <div class="card">
    <h3>Results</h3>
    <p id="resultsStatus">View and manage results here</p>
    <div id="resultsTable"></div>
  </div>
</div>

<!-- OTHER PAGES -->
<div id="chat" class="page"><div class="card"><h3>Chat</h3></div></div>
<div id="notices" class="page"><div class="card"><h3>Notices</h3></div></div>
<div id="profile" class="page"><div class="card"><h3>Profile</h3></div></div>

<!-- NAV -->
<div class="bottom-nav">
  <div class="nav-item active" onclick="switchPage('home',this)">🏠 Home</div>
  <div class="nav-item" onclick="switchPage('results',this);loadPublishedResults()">📊 Results</div>
  <div class="nav-item" onclick="switchPage('chat',this)">💬 Chat</div>
  <div class="nav-item" onclick="switchPage('notices',this)">📢 Notices</div>
  <div class="nav-item" onclick="switchPage('profile',this)">👤 Profile</div>
</div>

<script>

const supabaseClient = supabase.createClient(
"https://bslofdobcvxkjphbjyzb.supabase.co",
"YOUR_ANON_KEY"
);

/* ================= ORIGINAL VARIABLES (KEPT) ================= */
let teacherId=null;
let assignments=[];
let selectedClass=null;
let selectedSubject=null;

/* ================= PAGE SWITCH ================= */
function switchPage(page,el){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(page).classList.add('active');

  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  el.classList.add('active');
}

/* ================= ORIGINAL FUNCTIONS (KEPT) ================= */
function handleClassChange(){
  selectedClass=document.getElementById("class").value;
  loadSubjects(selectedClass);
}

function handleSubjectChange(){
  selectedSubject=document.getElementById("subject").value;
  loadStudents(selectedClass);
}

function showSubject(){
  document.getElementById("subject").classList.remove("hidden");
  document.getElementById("subjectLabel").classList.remove("hidden");
}

async function loadAssignments(){
  const {data}=await supabaseClient.from("teacher_assignments")
  .select("class_id,subject_id,classes(id,class_name),subjects(id,subject_name)")
  .eq("teacher_id",teacherId);

  assignments=data||[];

  const sel=document.getElementById("class");
  sel.innerHTML="<option>Select Class</option>";

  let seen=new Set();

  assignments.forEach(a=>{
    if(!seen.has(a.classes.id)){
      seen.add(a.classes.id);
      sel.innerHTML+=`<option value="${a.classes.id}">${a.classes.class_name}</option>`;
    }
  });
}

function loadSubjects(class_id){
  const sub=document.getElementById("subject");
  sub.innerHTML="<option>Select Subject</option>";

  assignments.forEach(a=>{
    if(String(a.classes.id)===String(class_id)){
      sub.innerHTML+=`<option value="${a.subjects.id}">${a.subjects.subject_name}</option>`;
    }
  });

  showSubject();
}

async function loadStudents(class_id){
  const {data:students}=await supabaseClient.from("students")
  .select("*").eq("class_id",class_id);

  const tbody=document.getElementById("students");
  tbody.innerHTML="";

  students.forEach(s=>{
    tbody.innerHTML+=`
      <tr>
        <td>${s.admission_no}</td>
        <td>${s.student_name}</td>
        <td><input></td>
      </tr>`;
  });
}

/* ================= AUTH (KEPT) ================= */
async function init(){
  const {data:{user}}=await supabaseClient.auth.getUser();
  teacherId=user.id;
  await loadAssignments();
}

/* ================= SOUND (KEPT) ================= */
let soundEnabled=true;

/* ================= LOGOUT (KEPT) ================= */
async function logout(){
  await supabaseClient.auth.signOut();
  location.href="../index.html";
}

/* =========================================================
   ⭐ NEW FEATURE: RESULTS (PUBLISHED ONLY)
   ========================================================= */

async function loadPublishedResults(){

  const box=document.getElementById("resultsTable");
  box.innerHTML="Loading...";

  if(!selectedClass){
    box.innerHTML="Select a class first";
    return;
  }

  // 1. check publish status
  const {data:pub}=await supabaseClient
    .from("published_reports")
    .select("*")
    .eq("class_id",selectedClass)
    .maybeSingle();

  if(!pub || !pub.is_published){
    box.innerHTML="<b>❌ Results not published yet</b>";
    return;
  }

  // 2. load data
  const {data:students}=await supabaseClient.from("students").select("*");
  const {data:subjects}=await supabaseClient.from("subjects").select("*");
  const {data:results}=await supabaseClient.from("results").select("*");

  const st=students.filter(s=>String(s.class_id)===String(selectedClass));

  let html="<table border='1' width='100%'><tr><th>Adm</th><th>Name</th><th>Results</th></tr>";

  st.forEach(s=>{
    let row="";

    subjects.forEach(sub=>{
      const r=results.find(x=>
        String(x.student_id)===String(s.id) &&
        String(x.subject_id)===String(sub.id)
      );

      if(r) row+=`${sub.subject_name}: ${r.marks} | `;
    });

    html+=`<tr><td>${s.admission_no}</td><td>${s.student_name}</td><td>${row}</td></tr>`;
  });

  html+="</table>";

  box.innerHTML=html;
}

init();

</script>

</body>
</html>
