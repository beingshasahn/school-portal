<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kemps Portal</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
/* ===== KEEP YOUR ORIGINAL CSS ===== */
*{box-sizing:border-box;font-family:Segoe UI, Arial;}
body{margin:0;background:#f5f6fa;}

.topbar{
  background:#fff;
  padding:12px 15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid #eee;
}

.brand{font-weight:bold;color:#111;}

.user{
  background:#a78bfa;
  color:#fff;
  width:35px;height:35px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
}

.page{display:none;padding:15px;animation:fade 0.3s ease-in-out;}
.page.active{display:block;}

@keyframes fade{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1;transform:translateY(0)}
}

.card{
  background:#fff;
  padding:15px;
  border-radius:12px;
  margin-bottom:12px;
  box-shadow:0 2px 8px rgba(0,0,0,0.06);
}

input,select{
  width:100%;
  padding:10px;
  margin-top:6px;
  border:1px solid #ddd;
  border-radius:8px;
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:10px;
  border-bottom:1px solid #eee;
}

.bottom-nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  height:65px;
  background:#fff;
  display:flex;
  justify-content:space-around;
  align-items:center;
  border-top:1px solid #eee;
}

.nav-item{
  text-align:center;
  font-size:12px;
  color:#777;
  cursor:pointer;
}

.nav-item span{display:block;font-size:18px;}

.hidden{display:none;}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="brand">KempsPortal</div>
  <div class="user" id="userInitials">SM</div>
</div>

<!-- HOME -->
<div id="home" class="page active">
  <div class="card">
    <h3 id="teacherInfo">Welcome Teacher</h3>
  </div>

  <div class="card">
    <button onclick="openMyClass()">Open Class Teacher Panel</button>
  </div>

  <div class="card">
    <h4>Select Class</h4>
    <select id="class" onchange="handleClassChange()"></select>

    <h4 id="subjectLabel" class="hidden">Subject</h4>
    <select id="subject" class="hidden" onchange="handleSubjectChange()"></select>
  </div>

  <div class="card">
    <table>
      <thead>
        <tr>
          <th>Adm</th>
          <th>Name</th>
          <th>Marks</th>
        </tr>
      </thead>
      <tbody id="students"></tbody>
    </table>
  </div>
</div>
<!-- RESULTS -->
<div id="results" class="page">
  <div class="card">
    <h3>Results</h3>
    <p id="publishStatus"></p>
    <div id="resultsContent"></div>
  </div>
</div>

<div id="chat" class="page"><div class="card"><h3>Chat</h3></div></div>
<div id="notices" class="page"><div class="card"><h3>Notices</h3></div></div>
<div id="profile" class="page"><div class="card"><h3>Profile</h3></div></div>

<!-- NAV -->
<div class="bottom-nav">
  <div class="nav-item" onclick="switchPage('home',this)">🏠</div>
  <div class="nav-item" onclick="switchPage('results',this)">📊</div>
  <div class="nav-item" onclick="switchPage('chat',this)">💬</div>
  <div class="nav-item" onclick="switchPage('notices',this)">📢</div>
  <div class="nav-item" onclick="switchPage('profile',this)">👤</div>
</div>

<script>

/* SUPABASE (ONLY ONCE!) */
const supabaseUrl = "https://bslofdobcvxkjphbjyzb.supabase.co";
const supabaseKey = "PASTE_YOUR_KEY";
const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

/* STATE */
let teacherId = null;
let assignments = [];
let selectedClass = null;
let selectedSubject = null;
let isPublished = false;

/* PAGE SWITCH */
function switchPage(page, el){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(page).classList.add('active');

  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  el.classList.add('active');

  if(page === "results"){
    checkPublishStatus();
  }
}

  /* AUTH */
async function protect(roleRequired){
  const { data:{ user } } = await supabaseClient.auth.getUser();

  if(!user){
    location.href="../index.html";
    return false;
  }

  const { data: profile } = await supabaseClient
    .from("profiles")
    .select("role")
    .eq("id", user.id)
    .single();

  if(!profile || profile.role !== roleRequired){
    alert("No permission");
    location.href="../index.html";
    return false;
  }

  return true;
}

/* INIT */
async function init(){
  const ok = await protect("teacher");
  if(!ok) return;

  const { data:{ user } } = await supabaseClient.auth.getUser();
  teacherId = user.id;

  const { data: profile } = await supabaseClient
    .from("profiles")
    .select("full_name")
    .eq("id", user.id)
    .maybeSingle();

  document.getElementById("teacherInfo").innerText =
    "Welcome " + (profile?.full_name || "Teacher");

  await loadAssignments();
}

/* CLASS */
function handleClassChange(){
  selectedClass = document.getElementById("class").value;
  selectedSubject = null;
  document.getElementById("students").innerHTML = "";
  if(selectedClass) loadSubjects(selectedClass);
}

/* SUBJECT */
function handleSubjectChange(){
  selectedSubject = document.getElementById("subject").value;
  if(selectedClass && selectedSubject) loadStudents(selectedClass);
}

/* LOAD SUBJECTS */
function loadSubjects(class_id){
  const sub = document.getElementById("subject");
  sub.innerHTML = `<option value="">Select Subject</option>`;

  assignments.forEach(a=>{
    const cid = a.classes?.id || a.class_id;

    if(String(cid) === String(class_id) && a.subjects){
      sub.innerHTML += `<option value="${a.subjects.id}">${a.subjects.subject_name}</option>`;
    }
  });

  sub.classList.remove("hidden");
  document.getElementById("subjectLabel").classList.remove("hidden");
}

/* LOAD STUDENTS */
async function loadStudents(class_id){
  if(!selectedSubject) return;

  const { data: students } = await supabaseClient
    .from("students")
    .select("*")
    .eq("class_id", class_id);

  const { data: marksData } = await supabaseClient
    .from("results")
    .select("student_id, marks")
    .eq("subject_id", selectedSubject);

  const map = {};
  (marksData||[]).forEach(r=>map[r.student_id]=r.marks);

  const tbody = document.getElementById("students");
  tbody.innerHTML = "";

  (students||[]).forEach(s=>{
    tbody.innerHTML += `
      <tr>
        <td>${s.admission_no}</td>
        <td>${s.student_name}</td>
        <td>
          <input type="number"
            value="${map[s.id] ?? ''}"
            oninput="autoSave('${s.id}',this.value)">
        </td>
      </tr>`;
  });
}

/* AUTO SAVE */
async function autoSave(studentId,value){
  if(!selectedSubject) return;

  if(value.trim()===""){
    await supabaseClient.from("results")
      .delete()
      .eq("student_id",studentId)
      .eq("subject_id",selectedSubject);
    return;
  }

  await supabaseClient.from("results").upsert([{
    student_id:studentId,
    subject_id:selectedSubject,
    teacher_id:teacherId,
    marks:Number(value)
  }],{onConflict:"student_id,subject_id"});
}

/* OPEN CLASS */
async function openMyClass(){
  const { data:{ user } } = await supabaseClient.auth.getUser();

  const { data } = await supabaseClient
    .from("teacher_assignments")
    .select("class_id")
    .eq("teacher_id", user.id)
    .eq("is_class_teacher", true)
    .maybeSingle();

  if(!data){
    alert("Not assigned");
    return;
  }

  location.href="classteacher.html";
}

/* PUBLISH CHECK */
async function checkPublishStatus(){
  if(!selectedClass) return;

  const { data } = await supabaseClient
    .from("published_reports")
    .select("*")
    .eq("class_id", selectedClass)
    .maybeSingle();

  isPublished = !!data?.is_published;

  document.getElementById("publishStatus").innerText =
    isPublished ? "Published" : "Not Published";
}

/* INIT CALL */
init();

</script>

</body>
</html>
