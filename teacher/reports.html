<script>

const client = supabase.createClient(
"https://bslofdobcvxkjphbjyzb.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJzbG9mZG9iY3Z4a2pwaGJqeXpiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzODY5NTEsImV4cCI6MjA5Njk2Mjk1MX0.oZ8oxXGxKyN4qwBgWrgdp9JOCkNXtREf6epTAcQg45s"
);

/* ================= ROLE ================= */
let role = "admin";

function isPublic(){
  return !["admin","teacher","headteacher"].includes(role);
}

/* ================= STATE ================= */
let currentClass = null;
let isPublished = false;

/* ================= AUTO COLUMN WIDTH (YOUR ORIGINAL - KEPT) ================= */
function autoFitTable(tableId){

  if(tableId === "gradePerf") return;

  const table = document.getElementById(tableId);
  if(!table) return;

  const rows = table.querySelectorAll("tr");
  if(rows.length === 0) return;

  const colCount = rows[0].children.length;
  const maxWidths = new Array(colCount).fill(0);

  rows.forEach(row=>{
    [...row.children].forEach((cell,i)=>{
      const text = (cell.innerText || "").trim();

      if(text.length > maxWidths[i]){
        maxWidths[i] = text.length;
      }
    });
  });

  rows.forEach(row=>{
  [...row.children].forEach((cell,i)=>{

    let width = (maxWidths[i] * 7) + 8;

    // SEX column (index 2) fixed small size
    if(i === 2){
      width = 40;
    }

    if(width < 60) width = 60;

    if(i !== 3 && width > 180) width = 180;

    cell.style.width = width + "px";
    cell.style.minWidth = width + "px";
  });
});
}

/* ================= EVERYTHING ELSE (UNCHANGED) ================= */
function getClassFromURL(){
  const p = new URLSearchParams(window.location.search);
  return p.get("class");
}

async function loadClasses(){
  const { data } = await client.from("classes").select("*");

  const el = document.getElementById("class");
  el.innerHTML = `<option value="">Select Class</option>`;

  data.forEach(c=>{
    el.innerHTML += `<option value="${c.id}">${c.class_name}</option>`;
  });
}

async function initFromLink(){

  const urlClass = getClassFromURL();

  await loadClasses();

  if(urlClass){
    currentClass = urlClass;
    document.getElementById("class").value = urlClass;
    document.getElementById("class").disabled = true;
    document.getElementById("publishBar").style.display = "none";
    await checkPublishStatus();
    await loadReport();
  }
}

async function onClassChange(){

  if(document.getElementById("class").disabled) return;

  currentClass = document.getElementById("class").value;
  if(!currentClass) return;

  document.getElementById("publishBar").style.display =
    role==="admin" ? "block":"none";

  await checkPublishStatus();

  if(isPublic() && !isPublished){
    document.getElementById("tbody").innerHTML =
      "<tr><td colspan='4'>RESULTS NOT PUBLISHED</td></tr>";
    return;
  }

  loadReport();
}

async function checkPublishStatus(){

  const { data } = await client
    .from("published_reports")
    .select("*")
    .eq("class_id", currentClass)
    .maybeSingle();

  isPublished = data?.is_published || false;

  document.getElementById("publishBtn").innerText =
    isPublished ? "UNPUBLISH" : "PUBLISH";

  document.getElementById("lockNotice").style.display =
    isPublished ? "block":"none";
}

async function togglePublish(){

  const { data, error } = await client
    .from("published_reports")
    .select("*")
    .eq("class_id", currentClass)
    .maybeSingle();

  // 👇 BONUS CHECK hapa
  console.log("CURRENT CLASS:", currentClass);
  console.log("EXISTING ROW:", data);
  console.log("SELECT ERROR:", error);

  const newState = !(data?.is_published || false);

  const { error: upsertError } = await client
    .from("published_reports")
    .upsert({
      class_id: currentClass,
      is_published: newState
    }, { onConflict: "class_id" });

  // 👇 BONUS CHECK hapa pia
  console.log("UPSERT ERROR:", upsertError);

  await checkPublishStatus();
}

function copyLink(){
  const link = window.location.origin + window.location.pathname + "?class=" + currentClass;
  navigator.clipboard.writeText(link);
  alert("Link copied:\n" + link);
}

function grade(m){
  if(m>=81) return "A";
  if(m>=61) return "B";
  if(m>=41) return "C";
  if(m>=21) return "D";
  return "E";
}

function gpa(g){
  return {A:1,B:2,C:3,D:4,E:5}[g] || 1;
}
function formatSubject(name){

  const map = {
    "Historia ya Tanzania na Maadili": "HIST.TZ",
    "Geography and the environment": "GEOGRAPHY",
    "Arts and Sports": "ARTS & SPORTS"
  };

  return map[name] || name;
  }
/* ================= REPORT (UNCHANGED) ================= */
async function loadReport(){

  if(!currentClass) return;

  const { data:students } = await client.from("students").select("*");
  const { data:subjects } = await client.from("subjects").select("*");
  const { data:results } = await client.from("results").select("*");

  let filtered = students
  .filter(s =>
    String(s.class_id) === String(currentClass)
  )
  .sort((a, b) => {

    if ((a.gender || "Male") !== (b.gender || "Male")) {
      return (a.gender === "Female") ? 1 : -1;
    }

    return (a.admission_no || "").localeCompare(b.admission_no || "");
  });

  let final = [];

  let gradePerf = {
    Male:{A:0,B:0,C:0,D:0,E:0},
    Female:{A:0,B:0,C:0,D:0,E:0}
  };

  filtered.forEach(stu=>{

    let total=0,count=0,detail=[];

    subjects.forEach(sub=>{
      let r = results.find(x =>
        String(x.student_id)===String(stu.id) &&
        String(x.subject_id)===String(sub.id)
      );

      if(!r) return;

      let m = Number(r.marks);

      total += m;
      count++;

      const subName = formatSubject(sub.subject_name);
detail.push(subName + "-" + grade(m));
    });

    if(count===0) return;

    let avg = total/count;
    let g = grade(avg);
   detail.push("AVERAGE - " + g);
    gradePerf[stu.gender||"Male"][g]++;

    final.push({
      adm: stu.admission_no,
      prem: stu.prem_no,
      sex: stu.gender==="Female"?"F":"M",
      detail: detail.join(" ")
    });
  });

  document.getElementById("tbody").innerHTML =
  final.map(r=>`
    <tr>
      <td>${r.adm}</td>
      <td>${r.prem}</td>
      <td>${r.sex}</td>
      <td>${r.detail}</td>
    </tr>
  `).join("");

  document.getElementById("gradePerf").innerHTML =
  Object.entries(gradePerf).map(([k,v])=>`
    <tr>
      <td>${k}</td>
      <td>${v.A}</td>
      <td>${v.B}</td>
      <td>${v.C}</td>
      <td>${v.D}</td>
      <td>${v.E}</td>
    </tr>
  `).join("");

  let subjectStats = subjects.map(sub => {

  let st = results.filter(r => {

  if (String(r.subject_id) !== String(sub.id)) return false;

  return filtered.some(s =>
    String(s.id) === String(r.student_id)
  );

});

  if (st.length === 0) return null;

  let total = st.reduce((a,b)=>a+Number(b.marks),0);
  let avg = total / st.length;

  return {
    name: sub.subject_name,
    sat: st.length,
    passed: st.filter(x => x.marks >= 41).length,
    avg
  };

}).filter(Boolean);

  if(subjectStats.length === 0){
  document.getElementById("subtbody").innerHTML =
    `<tr><td colspan="7" style="text-align:center;">
      NO SUBJECT PERFORMANCE DATA AVAILABLE
    </td></tr>`;
} else {
    
let i = 1;

document.getElementById("subtbody").innerHTML =
subjectStats.map(sub => {

  let g = grade(sub.avg);

  return `
    <tr>
      <td>${i++}</td>
      <td>${sub.name}</td>
      <td>${sub.sat}</td>
      <td>${sub.sat}</td>
      <td>${sub.passed}</td>
      <td>${sub.avg.toFixed(1)}</td>
      <td class="grade${g}">
        ${g} (${
          g==="A" ? "Excellent" :
          g==="B" ? "Very Good" :
          g==="C" ? "Good" :
          g==="D" ? "Satisfactory" :
          "Unsatisfactory"
        })
      </td>
    </tr>
  `;
}).join("");

    }
}

initFromLink();

</script>
