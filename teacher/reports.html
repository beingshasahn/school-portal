<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NECTA PRO MAX REPORT</title>

<style>
body{
  font-family:Arial;
  margin:0;
  background:#c7e3ee;
}

.header{
  text-align:center;
  padding:10px;
  font-weight:bold;
  text-transform:uppercase;
}

.school{
  text-align:center;
  font-size:13px;
}

select,button{
  margin:10px;
  padding:8px;
}

button{
  cursor:pointer;
}

#publishBar{
  display:none;
  text-align:center;
}

.table-wrap{
  margin:10px;
  background:#fff7cc;
  border:1px solid #999;
  overflow-x:auto;
}

table{
  width:100%;
  border-collapse:collapse;
  font-size:12px;
}

th{
  background:#e6e6e6;
  border:1px solid #999;
  padding:5px;
}

td{
  border:1px solid #999;
  padding:4px;
  white-space:nowrap;
}

@media print{
  select,button{display:none;}
}
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<div class="header">NECTA REPORT SYSTEM</div>
<div class="school">KOROSHO ENGLISH MEDIUM PRE AND PRIMARY SCHOOL</div>

<div id="lockNotice" style="display:none;color:red;font-weight:bold;text-align:center;">
🔒 This class is PUBLISHED. Editing locked.
</div>

<select id="class" onchange="onClassChange()"></select>

<div id="publishBar">
  <button id="publishBtn" onclick="togglePublish()">PUBLISH</button>
</div>

<button onclick="window.print()">PRINT</button>

<div class="table-wrap">
<table>
<thead>
<tr>
<th>SEX</th><th>A</th><th>B</th><th>C</th><th>D</th><th>E</th>
</tr>
</thead>
<tbody id="gradePerf"></tbody>
</table>
</div>

<div class="table-wrap">
<table>
<thead>
<tr id="mainHead">
<th>CAND NO</th>
<th>PREM NO</th>
<th>SEX</th>
<th>SUBJECTS</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

<div class="table-wrap">
<table>
<thead>
<tr>
<th>NO</th>
<th>SUBJECT</th>
<th>REGISTERED</th>
<th>SAT</th>
<th>PASSED (A-C)</th>
<th>AVER. MARKS</th>
<th>COMPETENCY</th>
</tr>
</thead>
<tbody id="subtbody"></tbody>
</table>
</div>

<script>
const client = supabase.createClient(
"https://bslofdobcvxkjphbjyzb.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJzbG9mZG9iY3Z4a2pwaGJqeXpiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzODY5NTEsImV4cCI6MjA5Njk2Mjk1MX0.oZ8oxXGxKyN4qwBgWrgdp9JOCkNXtREf6epTAcQg45s"
);

/* ROLE SYSTEM (replace with real login later) */
let role = "admin";

function isPublic(){
  return !(role === "admin" || role === "teacher" || role === "headteacher");
}

/* STATE */
let currentClass = null;
let isPublished = false;
let classLocked = false;

/* ================= LOAD CLASSES ================= */
async function loadClasses(){
  const { data } = await client.from("classes").select("*");

  let el = document.getElementById("class");
  el.innerHTML = `<option value="">Select Class</option>`;

  data.forEach(c=>{
    el.innerHTML += `<option value="${c.id}">${c.class_name}</option>`;
  });
}

/* ================= CHECK PUBLISH (SECURE) ================= */
async function checkPublishStatus(){

  const { data } = await client
    .from("published_reports")
    .select("is_published")
    .eq("class_id", currentClass)
    .maybeSingle();

  isPublished = data?.is_published === true;
  classLocked = isPublished;

  document.getElementById("publishBtn").innerText =
    isPublished ? "PUBLISHED" : "PUBLISH";

  document.getElementById("lockNotice").style.display =
    classLocked ? "block" : "none";
}

/* ================= CLASS CHANGE ================= */
async function onClassChange(){
  currentClass = document.getElementById("class").value;
  if(!currentClass) return;

  document.getElementById("publishBar").style.display =
    role === "admin" ? "block" : "none";

  await checkPublishStatus();

  /* 🔥 CRITICAL SECURITY CHECK BEFORE FETCH */
  if(isPublic() && !isPublished){
    document.getElementById("tbody").innerHTML =
      "<tr><td colspan='4' style='color:red;text-align:center'>RESULTS NOT PUBLISHED</td></tr>";

    document.getElementById("gradePerf").innerHTML = "";
    document.getElementById("subtbody").innerHTML = "";
    return;
  }

  loadReport();
}

/* ================= TOGGLE PUBLISH ================= */
async function togglePublish(){

  const { data } = await client
    .from("published_reports")
    .select("*")
    .eq("class_id", currentClass)
    .maybeSingle();

  if(data){
    await client
      .from("published_reports")
      .update({ is_published: !data.is_published })
      .eq("class_id", currentClass);
  } else {
    await client
      .from("published_reports")
      .insert([{ class_id: currentClass, is_published: true }]);
  }

  await checkPublishStatus();
}

/* ================= NECTA LOGIC ================= */
async function loadReport(){

  const { data:students } = await client.from("students").select("*");
  const { data:subjects } = await client.from("subjects").select("*");
  const { data:results } = await client.from("results").select("*");

  let filtered = students.filter(s =>
    String(s.class_id) === String(currentClass)
  );

  let subStats = {};
  subjects.forEach(s=>{
    subStats[s.id] = {sat:0, pass:0, total:0};
  });

  let gradePerf = {
    Male:{A:0,B:0,C:0,D:0,E:0},
    Female:{A:0,B:0,C:0,D:0,E:0}
  };

  let final = [];

  filtered.forEach(stu=>{
    let total=0, count=0, detail=[];

    subjects.forEach(sub=>{
      let r = results.find(x =>
        String(x.student_id) === String(stu.id) &&
        String(x.subject_id) === String(sub.id)
      );

      if(!r || r.marks==null) return;

      let m = Number(r.marks);

      subStats[sub.id].sat++;
      subStats[sub.id].total+=m;

      if(m>=41) subStats[sub.id].pass++;

      total+=m;
      count++;

      detail.push(`${sub.subject_name.substring(0,4)}-${grade(m)}`);
    });

    if(count===0) return;

    let avg = total/count;
    let avgGrade = grade(avg);

    let sex = stu.gender==="Female"?"Female":"Male";
    gradePerf[sex][avgGrade]++;

    detail.push("AVG-"+avgGrade);

    final.push({
      adm: stu.admission_no,
      prem: stu.prem_no||"",
      sex: stu.gender==="Female"?"F":"M",
      name: stu.student_name,
      detail: detail.join(" ")
    });
  });

  /* TABLE */
  let tb = document.getElementById("tbody");
  tb.innerHTML="";

  const head = document.getElementById("mainHead");

  if(role==="admin"||role==="teacher"||role==="headteacher"){
    head.innerHTML=`
      <th>CAND NO</th>
      <th>NAME</th>
      <th>PREM NO</th>
      <th>SEX</th>
      <th>SUBJECTS</th>`;
  } else {
    head.innerHTML=`
      <th>CAND NO</th>
      <th>PREM NO</th>
      <th>SEX</th>
      <th>SUBJECTS</th>`;
  }

  final.forEach(s=>{
    tb.innerHTML+=`
      <tr>
        <td>${s.adm}</td>
        ${role!=="public"?`<td>${s.name}</td>`:""}
        <td>${s.prem}</td>
        <td>${s.sex}</td>
        <td>${s.detail}</td>
      </tr>`;
  });

  /* GRADE */
  let gp=document.getElementById("gradePerf");
  gp.innerHTML="";

  ["Female","Male"].forEach(sex=>{
    let r=gradePerf[sex];
    gp.innerHTML+=`
      <tr>
        <td>${sex}</td><td>${r.A}</td><td>${r.B}</td><td>${r.C}</td><td>${r.D}</td><td>${r.E}</td>
      </tr>`;
  });

  /* SUBJECT */
  let subbody=document.getElementById("subtbody");
  subbody.innerHTML="";
  let i=1;

  subjects.filter(s=>subStats[s.id].sat>0)
  .forEach(sub=>{
    let st=subStats[sub.id];
    let avg=st.total/st.sat;

    subbody.innerHTML+=`
      <tr>
        <td>${i++}</td>
        <td>${sub.subject_name}</td>
        <td>${st.sat}</td>
        <td>${st.sat}</td>
        <td>${st.pass}</td>
        <td>${avg.toFixed(1)}</td>
        <td>${gpa(grade(avg)).toFixed(2)}</td>
      </tr>`;
  });
}

/* HELPERS */
function grade(m){
  if(m>=81) return "A";
  if(m>=61) return "B";
  if(m>=41) return "C";
  if(m>=21) return "D";
  return "E";
}

function gpa(g){
  return g==="A"?5:g==="B"?4:g==="C"?3:g==="D"?2:1;
}

loadClasses();
</script>

</body>
  </html>
