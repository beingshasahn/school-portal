<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NECTA PRO MAX REPORT</title>

<style>
body{
  font-family:Arial;
  margin:0;
  background:#c7e3ee;
}

.header{
  text-align:left;
  padding:10px;
  font-weight:bold;
  text-transform:uppercase;
}

.school{
  text-align:left;
  font-size:16px;
  padding: 10px;
  font-weight:bold;
}

select,button{
  margin:10px;
  padding:8px;
}

button{cursor:pointer;}

#publishBar{
  display:none;
  text-align:center;
}

.lock{
  display:none !important;
}

.table-wrap{
  margin:10px;
  width:max-content;
  max-width:100%;
  background:#fff;
  border:1px solid #999;
  overflow-x:auto;
}

table{
  width:auto;
  border-collapse:collapse;
  font-size:11px;
}

th{
  background:#e6e6e6;
  border:1px solid #999;
  padding:2px;
  white-space:nowrap;
  text-align:center;
}

td{
  border:2px solid #ccc;
  padding:1px 4px;
  white-space:nowrap;
}

tr:hover td{
  background:#f3f8ff;
}

@media print{
  select,button{display:none;}
}
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<div class="header">TANDAHIMBA DISTRICT COUNCIL</div>
<div class="school">KOROSHO ENGLISH MEDIUM PRE AND PRIMARY SCHOOL<br> RESULTS SUMMARY</div>

<div id="lockNotice" class="lock">🔒 CLASS PUBLISHED - VIEW ONLY</div>

<select id="class" onchange="onClassChange()"></select>

<div id="publishBar">
  <button id="publishBtn" onclick="togglePublish()">PUBLISH</button>
  <button onclick="copyLink()">COPY VIEW LINK</button>
</div>

<button onclick="window.print()">PRINT</button>

<!-- TABLE 1 -->
<div class="table-wrap">
<table>
<thead>
<tr>
<th>SEX</th><th>A</th><th>B</th><th>C</th><th>D</th><th>E</th>
</tr>
</thead>
<tbody id="gradePerf"></tbody>
</table>
</div>

<!-- TABLE 2 -->
<div class="table-wrap">
<table>
<thead>
<tr>
<th>CAND NO</th>
<th>PREM NO</th>
<th>SEX</th>
<th>SUBJECTS</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

<!-- TABLE 3 -->
<div class="table-wrap">
<table>
<thead>
<tr>
<th>NO</th>
<th>SUBJECT</th>
<th>REGISTERED</th>
<th>SAT</th>
<th>PASSED</th>
<th>AVERAGE</th>
<th>GPA</th>
</tr>
</thead>
<tbody id="subtbody"></tbody>
</table>
</div>

<script>

const client = supabase.createClient(
"https://bslofdobcvxkjphbjyzb.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJzbG9mZG9iY3Z4a2pwaGJqeXpiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzODY5NTEsImV4cCI6MjA5Njk2Mjk1MX0.oZ8oxXGxKyN4qwBgWrgdp9JOCkNXtREf6epTAcQg45s"
);

/* ROLE */
let role = localStorage.getItem("role") || "teacher";

/* STATE */
let currentClass = null;
let isPublished = false;

/* URL CLASS */
function getClassFromURL(){
  return new URLSearchParams(window.location.search).get("class");
}

/* LOAD CLASSES */
async function loadClasses(){
  const { data } = await client.from("classes").select("*");

  const el = document.getElementById("class");
  el.innerHTML = `<option value="">Select Class</option>`;

  (data || []).forEach(c=>{
    el.innerHTML += `<option value="${c.id}">${c.class_name}</option>`;
  });
}

/* INIT */
async function initFromLink(){

  await loadClasses();

  if(role !== "admin"){
    document.getElementById("class").style.display = "none";
  }

  const urlClass = getClassFromURL();

  if(urlClass){
    currentClass = urlClass;
    document.getElementById("class").value = urlClass;

    await checkPublishStatus();
    await loadReport();
  }
}

/* CLASS CHANGE */
async function onClassChange(){

  if(role !== "admin") return;

  currentClass = document.getElementById("class").value;
  if(!currentClass) return;

  document.getElementById("publishBar").style.display = "block";

  await checkPublishStatus();

  if(!isPublished){
    document.getElementById("tbody").innerHTML =
      "<tr><td colspan='4'>RESULTS NOT PUBLISHED</td></tr>";
    return;
  }

  loadReport();
}

/* CHECK PUBLISH */
async function checkPublishStatus(){

  const { data } = await client
    .from("published_reports")
    .select("*")
    .eq("class_id", currentClass)
    .maybeSingle();

  isPublished = data?.is_published || false;

  document.getElementById("publishBtn").innerText =
    isPublished ? "UNPUBLISH" : "PUBLISH";

  document.getElementById("lockNotice").style.display =
    isPublished ? "block":"none";
}

/* TOGGLE PUBLISH */
async function togglePublish(){

  const { data } = await client
    .from("published_reports")
    .select("*")
    .eq("class_id", currentClass)
    .maybeSingle();

  let newStatus = true;

  if(data){
    newStatus = !data.is_published;

    await client.from("published_reports")
      .update({ is_published: newStatus })
      .eq("class_id", currentClass);

  } else {
    await client.from("published_reports")
      .insert([{ class_id: currentClass, is_published: true }]);
  }

  await checkPublishStatus();

  alert("Results published successfully.");
}

/* COPY LINK */
function copyLink(){
  const link =
    window.location.origin +
    window.location.pathname +
    "?class=" + currentClass;

  navigator.clipboard.writeText(link);
  alert("Link copied:\n" + link);
}

/* GRADING */
function grade(m){
  if(m>=81) return "A";
  if(m>=61) return "B";
  if(m>=41) return "C";
  if(m>=21) return "D";
  return "E";
}

function gpa(g){
  return {A:1,B:2,C:3,D:4,E:5}[g] || 1;
}

/* REPORT */
async function loadReport(){

  if(!currentClass) return;

  const { data:students } = await client.from("students").select("*");
  const { data:subjects } = await client.from("subjects").select("*");
  const { data:results } = await client.from("results").select("*");

  let filtered = students.filter(s =>
    String(s.class_id) === String(currentClass)
  );

  let gradePerf = {
    Male:{A:0,B:0,C:0,D:0,E:0},
    Female:{A:0,B:0,C:0,D:0,E:0}
  };

  let final = [];

  filtered.forEach(stu=>{

    let total=0,count=0,detail=[];

    subjects.forEach(sub=>{
      let r = results.find(x =>
        String(x.student_id)===String(stu.id) &&
        String(x.subject_id)===String(sub.id)
      );

      if(!r) return;

      let m = Number(r.marks);
      total += m;
      count++;

      detail.push(sub.subject_name + "-" + grade(m));
    });

    if(count===0) return;

    let avg = total/count;
    let g = grade(avg);

    detail.push("AVERAGE - " + g);
    gradePerf[stu.gender||"Male"][g]++;

    final.push({
      adm: stu.admission_no,
      prem: stu.prem_no,
      sex: stu.gender==="Female"?"F":"M",
      detail: detail.join(" ")
    });
  });

  document.getElementById("tbody").innerHTML =
    final.map(r=>`
      <tr>
        <td>${r.adm}</td>
        <td>${r.prem}</td>
        <td>${r.sex}</td>
        <td>${r.detail}</td>
      </tr>
    `).join("");

  document.getElementById("gradePerf").innerHTML =
    Object.entries(gradePerf).map(([k,v])=>`
      <tr>
        <td>${k}</td>
        <td>${v.A}</td>
        <td>${v.B}</td>
        <td>${v.C}</td>
        <td>${v.D}</td>
        <td>${v.E}</td>
      </tr>
    `).join("");

  let i=1;

  document.getElementById("subtbody").innerHTML =
    subjects.map(sub=>{
      let st = results.filter(r=>r.subject_id===sub.id);
      if(!st.length) return "";

      let avg = st.reduce((a,b)=>a+Number(b.marks),0)/st.length;

      return `
        <tr>
          <td>${i++}</td>
          <td>${sub.subject_name}</td>
          <td>${st.length}</td>
          <td>${st.length}</td>
          <td>${st.filter(x=>x.marks>=41).length}</td>
          <td>${avg.toFixed(1)}</td>
          <td>${gpa(grade(avg))}</td>
        </tr>`;
    }).join("");
}

initFromLink();

</script>

</body>
</html>
