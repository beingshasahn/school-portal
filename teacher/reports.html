<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NECTA Results Clone</title>

<style>
body{
  font-family:Arial;
  margin:0;
  background:#b9dce8; /* NECTA light blue */
  color:#000;
}

/* TOP HEADER */
.topbar{
  padding:10px;
  font-weight:bold;
  font-size:14px;
  text-transform:uppercase;
}

/* TITLE */
.title{
  text-align:left;
  padding:5px 10px;
  font-weight:bold;
  font-size:18px;
}

/* SCHOOL INFO */
.school{
  padding:5px 10px;
  font-size:13px;
}

/* SUMMARY BOX */
.summary{
  margin:10px;
  background:#dff1f7;
  border:1px solid #999;
  padding:5px;
  font-size:12px;
}

/* SMALL TABLE (A-E DISTRIBUTION) */
.small-table{
  margin:10px;
  font-size:12px;
  border-collapse:collapse;
}

.small-table td, .small-table th{
  border:1px solid #999;
  padding:3px 6px;
}

/* MAIN TABLE */
.table-wrap{
  margin:10px;
  background:#fff7cc;
  border:1px solid #999;
  overflow-x:auto;
}

table{
  width:100%;
  border-collapse:collapse;
  font-size:12px;
}

th{
  background:#e8e8e8;
  border:1px solid #999;
  padding:5px;
}

td{
  border:1px solid #999;
  padding:4px;
  white-space:nowrap;
}

/* SUBJECT TABLE */
.subject-box{
  margin:10px;
  background:#fff7cc;
  border:1px solid #999;
}

button, select{
  margin:10px;
  padding:6px;
  font-size:12px;
}

/* PRINT */
@media print{
  button, select{
    display:none;
  }
  body{
    background:white;
  }
}
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<div class="topbar">
NATIONAL EXAMINATIONS COUNCIL OF TANZANIA
</div>

<div class="title">
PSLE EXAMINATION RESULTS
</div>

<div class="school">
KOROSHO ENGLISH MEDIUM PRE AND PRIMARY SCHOOL - PS CODE: KOR-001
</div>

<select id="class" onchange="loadReport()">
  <option value="">Select Class</option>
</select>

<button onclick="window.print()">PRINT</button>

<!-- SUMMARY -->
<div class="summary">
WALIOFANYA MTIHANI: <b id="totalStudents">0</b> |
WASTANI: <b id="avgScore">0</b> |
DARAJA: <b id="overallGrade">-</b>
</div>

<!-- A-E TABLE -->
<table class="small-table">
<tr>
<th>SEX</th><th>A</th><th>B</th><th>C</th><th>D</th><th>E</th>
</tr>
<tr>
<td>WAVULANA</td>
<td id="mA">0</td><td id="mB">0</td><td id="mC">0</td><td id="mD">0</td><td id="mE">0</td>
</tr>
<tr>
<td>WASICHANA</td>
<td id="fA">0</td><td id="fB">0</td><td id="fC">0</td><td id="fD">0</td><td id="fE">0</td>
</tr>
</table>

<!-- MAIN TABLE -->
<div class="table-wrap">
<table>
<thead>
<tr>
<th>CAND NO</th>
<th>ADM NO</th>
<th>SEX</th>
<th>SUBJECTS</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

<!-- SUBJECT PERFORMANCE -->
<div class="subject-box">
<table>
<thead>
<tr>
<th>SUBJECT</th>
<th>AVG</th>
<th>GRADE</th>
</tr>
</thead>
<tbody id="subtbody"></tbody>
</table>
</div>

<script>

const supabaseUrl = "https://bslofdobcvxkjphbjyzb.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJzbG9mZG9iY3Z4a2pwaGJqeXpiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzODY5NTEsImV4cCI6MjA5Njk2Mjk1MX0.oZ8oxXGxKyN4qwBgWrgdp9JOCkNXtREf6epTAcQg45s";

const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

function grade(m){
  if(m>=81) return "A";
  if(m>=61) return "B";
  if(m>=41) return "C";
  if(m>=21) return "D";
  return "E";
}

const subjectShort = {
  "ENGLISH":"ENGL",
  "KISWAHILI":"KISW",
  "MATHEMATICS":"MATH",
  "SCIENCE":"SCI",
  "GEOGRAPHY AND ENVIRONMENT":"GEO"
};

function norm(n){return n.toUpperCase().trim();}

/* LOAD CLASSES */
async function loadClasses(){
  const { data } = await supabaseClient.from("classes").select("*");
  let el=document.getElementById("class");
  data.forEach(c=>{
    el.innerHTML+=`<option value="${c.id}">${c.class_name}</option>`;
  });
}

/* LOAD REPORT */
async function loadReport(){

  let class_id=document.getElementById("class").value;
  if(!class_id) return;

  const { data:students } = await supabaseClient.from("students").select("*").eq("class_id",class_id);
  const { data:subjects } = await supabaseClient.from("subjects").select("*");

  const ids=students.map(s=>s.id);

  const { data:results } = await supabaseClient.from("results").select("*").in("student_id",ids);

  let final=[];
  let subStats={};

  subjects.forEach(s=>subStats[s.id]=0);

  students.forEach(stu=>{

    let total=0;
    let detail=[];

    subjects.forEach(sub=>{

      let r=results.find(x=>x.student_id==stu.id && x.subject_id==sub.id);
      let m=r?Number(r.marks):0;

      total+=m;
      subStats[sub.id]+=m;

      detail.push(subjectShort[norm(sub.subject_name)]+" - "+grade(m));
    });

    final.push({
      adm:stu.admission_no,
      sex:stu.gender,
      total,
      avg:total/subjects.length,
      detail:detail.join(" ")
    });
  });

  final.sort((a,b)=>b.total-a.total);

  document.getElementById("totalStudents").innerText=final.length;
  let avg=final.reduce((a,b)=>a+b.avg,0)/final.length;
  document.getElementById("avgScore").innerText=avg.toFixed(1);
  document.getElementById("overallGrade").innerText=grade(avg);

  let tbody=document.getElementById("tbody");
  tbody.innerHTML="";

  final.forEach((s,i)=>{
    tbody.innerHTML+=`
    <tr>
      <td>${i+1}</td>
      <td>${s.adm}</td>
      <td>${s.sex}</td>
      <td>${s.detail}</td>
    </tr>`;
  });

  /* SUBJECT TABLE */
  let subbody=document.getElementById("subtbody");
  subbody.innerHTML="";

  subjects.forEach(s=>{
    let avg=subStats[s.id]/final.length || 0;
    subbody.innerHTML+=`
      <tr>
        <td>${subjectShort[norm(s.subject_name)]||s.subject_name}</td>
        <td>${avg.toFixed(1)}</td>
        <td>${grade(avg)}</td>
      </tr>`;
  });

  /* A-E DISTRIBUTION */
  let dist={A:0,B:0,C:0,D:0,E:0};

  final.forEach(s=>dist[grade(s.avg)]++);

  document.getElementById("mA").innerText=dist.A;
  document.getElementById("mB").innerText=dist.B;
  document.getElementById("mC").innerText=dist.C;
  document.getElementById("mD").innerText=dist.D;
  document.getElementById("mE").innerText=dist.E;
}

loadClasses();

</script>

</body>
</html>
