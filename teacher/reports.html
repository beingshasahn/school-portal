<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NECTA PRO MAX REPORT</title>

<style>
body{
  font-family:Arial;
  margin:0;
  background:#c7e3ee;
}

.header{
  text-align:center;
  padding:10px;
  font-weight:bold;
  text-transform:uppercase;
}

.school{
  text-align:center;
  font-size:13px;
}

select,button{
  margin:10px;
  padding:8px;
}

button{cursor:pointer;}

#publishBar{
  display:none;
  text-align:center;
}

.lock{
  display:none;
  color:red;
  font-weight:bold;
  text-align:center;
}

.table-wrap{
  margin:10px;
  background:#fff7cc;
  border:1px solid #999;
  overflow-x:auto;
}

table{
  width:100%;
  border-collapse:collapse;
  font-size:12px;
}

th{
  background:#e6e6e6;
  border:1px solid #999;
  padding:5px;
}

td{
  border:1px solid #999;
  padding:4px;
  white-space:nowrap;
}

@media print{
  select,button{display:none;}
}
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<div class="header">NECTA REPORT SYSTEM</div>
<div class="school">KOROSHO ENGLISH MEDIUM PRE AND PRIMARY SCHOOL</div>

<div id="lockNotice" class="lock">🔒 CLASS PUBLISHED - VIEW ONLY</div>

<select id="class" onchange="onClassChange()"></select>

<div id="publishBar">
  <button id="publishBtn" onclick="togglePublish()">PUBLISH</button>
  <button onclick="copyLink()">COPY VIEW LINK</button>
</div>

<button onclick="window.print()">PRINT</button>

<!-- TABLES -->
<div class="table-wrap">
<table>
<thead>
<tr>
<th>SEX</th><th>A</th><th>B</th><th>C</th><th>D</th><th>E</th>
</tr>
</thead>
<tbody id="gradePerf"></tbody>
</table>
</div>

<div class="table-wrap">
<table>
<thead>
<tr id="mainHead">
<th>CAND NO</th>
<th>NAME</th>
<th>PREM NO</th>
<th>SEX</th>
<th>SUBJECTS</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

<div class="table-wrap">
<table>
<thead>
<tr>
<th>NO</th>
<th>SUBJECT</th>
<th>REGISTERED</th>
<th>SAT</th>
<th>PASSED</th>
<th>AVERAGE</th>
<th>GPA</th>
</tr>
</thead>
<tbody id="subtbody"></tbody>
</table>
</div>

<script>
const client = supabase.createClient(
"https://bslofdobcvxkjphbjyzb.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJzbG9mZG9iY3Z4a2pwaGJqeXpiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzODY5NTEsImV4cCI6MjA5Njk2Mjk1MX0.oZ8oxXGxKyN4qwBgWrgdp9JOCkNXtREf6epTAcQg45s"
);

/* ================= ROLE ================= */
let role = "admin";

function isPublic(){
  return !["admin","teacher","headteacher"].includes(role);
}

  function canSeeNames(){
  return ["admin","teacher","headteacher"].includes(role);
  }
/* ================= STATE ================= */
let currentClass = null;
let isPublished = false;

/* ================= URL CLASS ================= */
function getClassFromURL(){
  const p = new URLSearchParams(window.location.search);
  return p.get("class");
}

/* ================= LOAD CLASSES ================= */
async function loadClasses(){
  const { data } = await client.from("classes").select("*");

  const el = document.getElementById("class");
  el.innerHTML = `<option value="">Select Class</option>`;

  data.forEach(c=>{
    el.innerHTML += `<option value="${c.id}">${c.class_name}</option>`;
  });
}

/* ================= INIT FROM LINK ================= */
async function initFromLink(){

  const urlClass = getClassFromURL();

  await loadClasses();

  if(urlClass){
    currentClass = urlClass;
    document.getElementById("class").value = urlClass;
    document.getElementById("class").disabled = true;
    document.getElementById("publishBar").style.display = "none";
    await checkPublishStatus();
    await loadReport();
  }
}

/* ================= CLASS CHANGE ================= */
async function onClassChange(){

  if(document.getElementById("class").disabled) return;

  currentClass = document.getElementById("class").value;
  if(!currentClass) return;

  document.getElementById("publishBar").style.display =
    role==="admin" ? "block":"none";

  await checkPublishStatus();

  if(isPublic() && !isPublished){
    document.getElementById("tbody").innerHTML =
      "<tr><td colspan='4'>RESULTS NOT PUBLISHED</td></tr>";
    return;
  }

  loadReport();
}

/* ================= PUBLISH CHECK ================= */
async function checkPublishStatus(){

  const { data } = await client
    .from("published_reports")
    .select("*")
    .eq("class_id", currentClass)
    .maybeSingle();

  isPublished = data?.is_published || false;

  document.getElementById("publishBtn").innerText =
    isPublished ? "UNPUBLISH" : "PUBLISH";

  document.getElementById("lockNotice").style.display =
    isPublished ? "block":"none";
}

/* ================= TOGGLE PUBLISH ================= */
async function togglePublish(){

  const { data } = await client
    .from("published_reports")
    .select("*")
    .eq("class_id", currentClass)
    .maybeSingle();

  if(data){
    await client.from("published_reports")
      .update({ is_published: !data.is_published })
      .eq("class_id", currentClass);
  } else {
    await client.from("published_reports")
      .insert([{ class_id: currentClass, is_published: true }]);
  }

  await checkPublishStatus();
}

/* ================= COPY LINK ================= */
function copyLink(){
  const link = window.location.origin + window.location.pathname + "?class=" + currentClass;
  navigator.clipboard.writeText(link);
  alert("Link copied:\n" + link);
}

/* ================= GRADE ================= */
function grade(m){
  if(m>=81) return "A";
  if(m>=61) return "B";
  if(m>=41) return "C";
  if(m>=21) return "D";
  return "E";
}

function gpa(g){
  return {A:5,B:4,C:3,D:2,E:1}[g] || 1;
}

/* ================= REPORT ================= */
async function loadReport(){

  if(!currentClass) return;

  const { data:students } = await client.from("students").select("*");
  const { data:subjects } = await client.from("subjects").select("*");
  const { data:results } = await client.from("results").select("*");

  let filtered = students
  .filter(s => String(s.class_id) === String(currentClass))
  .sort((a, b) => {

    const g1 = (a.gender || "Male").toLowerCase();
    const g2 = (b.gender || "Male").toLowerCase();

    if (g1 !== g2) {
      return g1 === "male" ? -1 : 1;
    }

    const n1 = (a.name || a.full_name || "").toLowerCase();
    const n2 = (b.name || b.full_name || "").toLowerCase();

    return n1.localeCompare(n2);
  });

  let subStats = {};
  subjects.forEach(s=>{
    subStats[s.id] = {sat:0, pass:0, total:0};
  });

  let gradePerf = {
    Male:{A:0,B:0,C:0,D:0,E:0},
    Female:{A:0,B:0,C:0,D:0,E:0}
  };

  let final = [];

  filtered.forEach(stu=>{

  // 🔒 EXTRA SAFETY FOR PUBLIC VIEW
  let studentName = stu.student_name;

  if(isPublic()){
    studentName = "—";
  }

    let total=0,count=0,detail=[];

    subjects.forEach(sub=>{
      let r = results.find(x =>
        String(x.student_id)===String(stu.id) &&
        String(x.subject_id)===String(sub.id)
      );

      if(!r) return;

      let m = Number(r.marks);

      subStats[sub.id].sat++;
      subStats[sub.id].total += m;
      if(m>=41) subStats[sub.id].pass++;

      total += m;
      count++;

      detail.push(sub.subject_name.slice(0,4)+"-"+grade(m));
    });

    if(count===0) return;

    let avg = total/count;
    let g = grade(avg);

    gradePerf[stu.gender||"Male"][g]++;
let studentName = stu.student_name;

if(isPublic()){
  studentName = "—";
    }
    final.push({
  adm: stu.admission_no,
  name: stu.student_name,
  prem: stu.prem_no,
  sex: stu.gender === "Female" ? "F" : "M",
  detail: detail.join(" ")
});
  });

  if(isPublic() && !isPublished){
    document.getElementById("tbody").innerHTML =
      "<tr><td>NOT PUBLISHED</td></tr>";
    return;
  }

  let tb=document.getElementById("tbody");
  tb.innerHTML="";

  final.forEach(r=>{
    tb.innerHTML += `
      <tr>
        <td>${r.adm}</td>
<td>
  ${canSeeNames() ? r.name : "—"}
</td>
<td>${r.prem}</td>
<td>${r.sex}</td>
        <td>${r.detail}</td>
      </tr>`;
  });

  let gp=document.getElementById("gradePerf");
  gp.innerHTML="";

  ["Female","Male"].forEach(s=>{
    let r=gradePerf[s];
    gp.innerHTML+=`
      <tr>
        <td>${s}</td>
        <td>${r.A}</td>
        <td>${r.B}</td>
        <td>${r.C}</td>
        <td>${r.D}</td>
        <td>${r.E}</td>
      </tr>`;
  });

  let subbody=document.getElementById("subtbody");
  subbody.innerHTML="";

  let i=1;

  subjects.forEach(sub=>{
    let st=subStats[sub.id];
    if(st.sat===0) return;

    let avg=st.total/st.sat;

    subbody.innerHTML+=`
      <tr>
        <td>${i++}</td>
        <td>${sub.subject_name}</td>
        <td>${st.sat}</td>
        <td>${st.sat}</td>
        <td>${st.pass}</td>
        <td>${avg.toFixed(1)}</td>
        <td>${gpa(grade(avg))}</td>
      </tr>`;
  });
}

/* ================= START ================= */
initFromLink();
</script>

</body>
</html>
