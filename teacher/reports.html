<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NECTA PRO MAX REPORT</title>

<style>
body{
  font-family:Arial;
  margin:0;
  background:#c7e3ee;
}

.header{
  text-align:center;
  padding:10px;
  font-weight:bold;
  text-transform:uppercase;
}

.school{
  text-align:center;
  font-size:13px;
}

select,button{
  margin:10px;
  padding:8px;
}

button{cursor:pointer;}

#publishBar{
  display:none;
  text-align:center;
}

.lock{
  display:none;
  color:red;
  font-weight:bold;
  text-align:center;
}

.table-wrap{
  margin:10px;
  background:#fff7cc;
  border:1px solid #999;
  overflow-x:auto;
}

table{
  width:100%;
  border-collapse:collapse;
  font-size:12px;
}

th{
  background:#e6e6e6;
  border:1px solid #999;
  padding:5px;
}

td{
  border:1px solid #999;
  padding:4px;
  white-space:nowrap;
}

@media print{
  select,button{display:none;}
}
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<div class="header">NECTA REPORT SYSTEM</div>
<div class="school">KOROSHO ENGLISH MEDIUM PRE AND PRIMARY SCHOOL</div>

<div id="lockNotice" class="lock">🔒 CLASS PUBLISHED - VIEW ONLY</div>

<select id="class" onchange="onClassChange()"></select>

<div id="publishBar">
  <button id="publishBtn" onclick="togglePublish()">PUBLISH</button>
  <button onclick="copyLink()">COPY VIEW LINK</button>
</div>

<button onclick="window.print()">PRINT</button>

<!-- TABLE 1 -->
<div class="table-wrap">
<table>
<thead>
<tr>
<th>SEX</th><th>A</th><th>B</th><th>C</th><th>D</th><th>E</th>
</tr>
</thead>
<tbody id="gradePerf"></tbody>
</table>
</div>

<!-- TABLE 2 -->
<div class="table-wrap">
<table>
<thead>
<tr id="mainHead"></tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

<!-- TABLE 3 -->
<div class="table-wrap">
<table>
<thead>
<tr>
<th>NO</th>
<th>SUBJECT</th>
<th>REGISTERED</th>
<th>SAT</th>
<th>PASSED</th>
<th>AVERAGE</th>
<th>GPA</th>
</tr>
</thead>
<tbody id="subtbody"></tbody>
</table>
</div>

<script>
const client = supabase.createClient(
"https://bslofdobcvxkjphbjyzb.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJzbG9mZG9iY3Z4a2pwaGJqeXpiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzODY5NTEsImV4cCI6MjA5Njk2Mjk1MX0.oZ8oxXGxKyN4qwBgWrgdp9JOCkNXtREf6epTAcQg45s"
);

/* ================= ROLE ================= */
let role = "admin";

function isPublic(){
  return !["admin","teacher","headteacher"].includes(role);
}

/* ================= STATE ================= */
let currentClass = null;
let isPublished = false;

/* ================= CLASS ================= */
function getClassFromURL(){
  return new URLSearchParams(window.location.search).get("class");
}

/* ================= LOAD CLASSES ================= */
async function loadClasses(){
  const { data } = await client.from("classes").select("*");

  const el = document.getElementById("class");
  el.innerHTML = `<option value="">Select Class</option>`;

  data.forEach(c=>{
    el.innerHTML += `<option value="${c.id}">${c.class_name}</option>`;
  });
}

/* ================= INIT ================= */
async function init(){
  const urlClass = getClassFromURL();
  await loadClasses();

  if(urlClass){
    currentClass = urlClass;
    document.getElementById("class").value = urlClass;
    document.getElementById("class").disabled = true;
    await checkPublishStatus();
    await loadReport();
  }
}

/* ================= CLASS CHANGE ================= */
async function onClassChange(){
  if(document.getElementById("class").disabled) return;

  currentClass = document.getElementById("class").value;
  if(!currentClass) return;

  await checkPublishStatus();
  loadReport();
}

/* ================= PUBLISH ================= */
async function checkPublishStatus(){

  const { data } = await client
    .from("published_reports")
    .select("*")
    .eq("class_id", currentClass)
    .maybeSingle();

  isPublished = data?.is_published || false;

  document.getElementById("publishBtn").innerText =
    isPublished ? "UNPUBLISH" : "PUBLISH";
}

/* ================= TOGGLE ================= */
async function togglePublish(){
  const { data } = await client
    .from("published_reports")
    .select("*")
    .eq("class_id", currentClass)
    .maybeSingle();

  if(data){
    await client.from("published_reports")
      .update({ is_published: !data.is_published })
      .eq("class_id", currentClass);
  } else {
    await client.from("published_reports")
      .insert([{ class_id: currentClass, is_published: true }]);
  }

  await checkPublishStatus();
}

/* ================= COPY LINK ================= */
function copyLink(){
  const link = window.location.origin + window.location.pathname + "?class=" + currentClass;
  navigator.clipboard.writeText(link);
  alert("Link copied");
}

/* ================= GRADE ================= */
function grade(m){
  if(m>=81) return "A";
  if(m>=61) return "B";
  if(m>=41) return "C";
  if(m>=21) return "D";
  return "E";
}

function gpa(g){
  return {A:5,B:4,C:3,D:2,E:1}[g] || 1;
}

/* ================= REPORT ================= */
async function loadReport(){

  if(!currentClass) return;

  // 🔥 IMPORTANT FIX: NO NAME FETCH FOR PUBLIC
  let students;

  if(isPublic()){
    const res = await client
      .from("students")
      .select("id,class_id,admission_no,prem_no,gender");
    students = res.data;
  } else {
    const res = await client
      .from("students")
      .select("*");
    students = res.data;
  }

  const { data:subjects } = await client.from("subjects").select("*");
  const { data:results } = await client.from("results").select("*");

  let filtered = students.filter(s =>
    String(s.class_id) === String(currentClass)
  );

  let final = [];

  filtered.forEach(stu=>{

    let total=0,count=0,detail=[];

    subjects.forEach(sub=>{
      let r = results.find(x =>
        String(x.student_id)===String(stu.id) &&
        String(x.subject_id)===String(sub.id)
      );

      if(!r) return;

      let m = Number(r.marks);

      total += m;
      count++;

      detail.push(sub.subject_name.slice(0,4)+"-"+grade(m));
    });

    if(count===0) return;

    final.push({
      adm: stu.admission_no,
      name: stu.student_name,
      prem: stu.prem_no,
      sex: stu.gender === "Female" ? "F" : "M",
      detail: detail.join(" ")
    });
  });

  // ================= HEADER =================
  let header = document.getElementById("mainHead");

  if(!isPublic()){
    header.innerHTML = `
      <th>CAND NO</th>
      <th>NAME</th>
      <th>PREM NO</th>
      <th>SEX</th>
      <th>SUBJECTS</th>
    `;
  } else {
    header.innerHTML = `
      <th>CAND NO</th>
      <th>PREM NO</th>
      <th>SEX</th>
      <th>SUBJECTS</th>
    `;
  }

  // ================= TABLE =================
  let tb = document.getElementById("tbody");
  tb.innerHTML = "";

  final.forEach(r=>{

    if(!isPublic()){
      tb.innerHTML += `
        <tr>
          <td>${r.adm}</td>
          <td>${r.name}</td>
          <td>${r.prem}</td>
          <td>${r.sex}</td>
          <td>${r.detail}</td>
        </tr>`;
    } else {
      tb.innerHTML += `
        <tr>
          <td>${r.adm}</td>
          <td>${r.prem}</td>
          <td>${r.sex}</td>
          <td>${r.detail}</td>
        </tr>`;
    }
  });
}

init();
</script>

</body>
  </html>
