<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NECTA PRO MAX REPORT</title>

<style>
body{
  font-family:Arial;
  margin:0;
  background:#c7e3ee;
}

.header{
  text-align:center;
  padding:10px;
  font-weight:bold;
  text-transform:uppercase;
}

.school{
  text-align:center;
  font-size:13px;
}

select,button{
  margin:10px;
  padding:8px;
}

button{cursor:pointer;}

.table-wrap{
  margin:10px;
  background:#fff7cc;
  border:1px solid #999;
  overflow-x:auto;
}

table{
  width:100%;
  border-collapse:collapse;
  font-size:12px;
}

th{
  background:#e6e6e6;
  border:1px solid #999;
  padding:5px;
}

td{
  border:1px solid #999;
  padding:4px;
  white-space:nowrap;
}

@media print{
  select,button{display:none;}
}
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<div class="header">NECTA REPORT SYSTEM</div>
<div class="school">KOROSHO ENGLISH MEDIUM PRE AND PRIMARY SCHOOL</div>

<select id="class" onchange="onClassChange()"></select>

<button onclick="window.print()">PRINT</button>

<!-- GRADE SUMMARY -->
<div class="table-wrap">
<table>
<thead>
<tr>
<th>SEX</th><th>A</th><th>B</th><th>C</th><th>D</th><th>E</th>
</tr>
</thead>
<tbody id="gradePerf"></tbody>
</table>
</div>

<!-- MAIN TABLE (NO NAME COLUMN) -->
<div class="table-wrap">
<table>
<thead>
<tr id="mainHead">
<th>CAND NO</th>
<th>PREM NO</th>
<th>SEX</th>
<th>SUBJECTS</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

<!-- SUBJECT SUMMARY -->
<div class="table-wrap">
<table>
<thead>
<tr>
<th>NO</th>
<th>SUBJECT</th>
<th>REGISTERED</th>
<th>SAT</th>
<th>PASSED</th>
<th>AVERAGE</th>
<th>GPA</th>
</tr>
</thead>
<tbody id="subtbody"></tbody>
</table>
</div>

<script>

const client = supabase.createClient(
"https://bslofdobcvxkjphbjyzb.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJzbG9mZG9iY3Z4a2pwaGJqeXpiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzODY5NTEsImV4cCI6MjA5Njk2Mjk1MX0.oZ8oxXGxKyN4qwBgWrgdp9JOCkNXtREf6epTAcQg45s"
);

/* ================= STATE ================= */
let currentClass = null;

/* ================= CLASS ================= */
function getClassFromURL(){
  return new URLSearchParams(window.location.search).get("class");
}

/* ================= LOAD CLASSES ================= */
async function loadClasses(){
  const { data } = await client.from("classes").select("*");

  const el = document.getElementById("class");
  el.innerHTML = `<option value="">Select Class</option>`;

  data.forEach(c=>{
    el.innerHTML += `<option value="${c.id}">${c.class_name}</option>`;
  });
}

/* ================= INIT ================= */
async function init(){
  await loadClasses();

  const urlClass = getClassFromURL();
  if(urlClass){
    currentClass = urlClass;
    document.getElementById("class").value = urlClass;
    loadReport();
  }
}

/* ================= CLASS CHANGE ================= */
async function onClassChange(){
  currentClass = document.getElementById("class").value;
  if(!currentClass) return;
  loadReport();
}

/* ================= GRADE ================= */
function grade(m){
  if(m>=81) return "A";
  if(m>=61) return "B";
  if(m>=41) return "C";
  if(m>=21) return "D";
  return "E";
}

function gpa(g){
  return {A:5,B:4,C:3,D:2,E:1}[g] || 1;
}

/* ================= REPORT ================= */
async function loadReport(){

  if(!currentClass) return;

  const { data:students } = await client.from("students").select("id,class_id,admission_no,prem_no,gender");
  const { data:subjects } = await client.from("subjects").select("*");
  const { data:results } = await client.from("results").select("*");

  let filtered = students.filter(s =>
    String(s.class_id) === String(currentClass)
  );

  let final = [];

  let gradePerf = {
    Male:{A:0,B:0,C:0,D:0,E:0},
    Female:{A:0,B:0,C:0,D:0,E:0}
  };

  filtered.forEach(stu=>{

    let total=0,count=0,detail=[];

    subjects.forEach(sub=>{
      let r = results.find(x =>
        String(x.student_id)===String(stu.id) &&
        String(x.subject_id)===String(sub.id)
      );

      if(!r) return;

      let m = Number(r.marks);

      total += m;
      count++;

      detail.push(sub.subject_name.slice(0,4)+"-"+grade(m));
    });

    if(count===0) return;

    let avg = total/count;
    let g = grade(avg);

    gradePerf[stu.gender||"Male"][g]++;

    final.push({
      adm: stu.admission_no,
      prem: stu.prem_no,
      sex: stu.gender==="Female" ? "F" : "M",
      detail: detail.join(" ")
    });
  });

  /* ================= MAIN TABLE ================= */
  let tb = document.getElementById("tbody");
  tb.innerHTML = "";

  final.forEach(r=>{
    tb.innerHTML += `
      <tr>
        <td>${r.adm}</td>
        <td>${r.prem}</td>
        <td>${r.sex}</td>
        <td>${r.detail}</td>
      </tr>`;
  });

  /* ================= GRADE TABLE ================= */
  let gp=document.getElementById("gradePerf");
  gp.innerHTML="";

  ["Female","Male"].forEach(s=>{
    let r=gradePerf[s];
    gp.innerHTML+=`
      <tr>
        <td>${s}</td>
        <td>${r.A}</td>
        <td>${r.B}</td>
        <td>${r.C}</td>
        <td>${r.D}</td>
        <td>${r.E}</td>
      </tr>`;
  });

  /* ================= SUBJECT TABLE ================= */
  let subbody=document.getElementById("subtbody");
  subbody.innerHTML="";

  let i=1;

  subjects.forEach(sub=>{
    let st={sat:0,pass:0,total:0};

    results.forEach(r=>{
      if(r.subject_id===sub.id){
        st.sat++;
        st.total += Number(r.marks);
        if(r.marks>=41) st.pass++;
      }
    });

    if(st.sat===0) return;

    let avg = st.total/st.sat;

    subbody.innerHTML+=`
      <tr>
        <td>${i++}</td>
        <td>${sub.subject_name}</td>
        <td>${st.sat}</td>
        <td>${st.sat}</td>
        <td>${st.pass}</td>
        <td>${avg.toFixed(1)}</td>
        <td>${gpa(grade(avg))}</td>
      </tr>`;
  });
}

init();

</script>

</body>
</html>
