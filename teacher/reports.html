<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NECTA Report Fixed Final</title>

<style>
body{
  font-family:Arial;
  margin:0;
  background:#f4f6f9;
}

.header{
  background:#1e3c72;
  color:white;
  padding:15px;
  text-align:center;
}

.school{
  text-align:center;
  padding:10px;
  font-weight:bold;
}

.container{
  padding:15px;
}

select{
  width:100%;
  padding:10px;
  margin:10px 0;
}

button{
  width:100%;
  padding:10px;
  margin:5px 0;
  border:none;
  background:#1e3c72;
  color:white;
  border-radius:6px;
  cursor:pointer;
}

.card{
  background:white;
  padding:10px;
  border-radius:10px;
  overflow-x:auto;
}

table{
  width:100%;
  border-collapse:collapse;
  font-size:13px;
  background:white;
}

th,td{
  border:1px solid #ddd;
  padding:8px;
  text-align:left;
  white-space:nowrap;
}

th{
  background:#1e3c72;
  color:white;
}

/* ANALYTICS */
.analytics{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  margin:10px 0;
}

.box{
  background:white;
  padding:10px;
  border-radius:8px;
  text-align:center;
}

/* PRINT */
@media print {
  button, select, .header{
    display:none;
  }
  body{
    background:white;
  }
}
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

<div class="header">
  <h2>NECTA STYLE REPORT CARD</h2>
</div>

<div class="school">
  KOROSHO ENGLISH MEDIUM PRE AND PRIMARY SCHOOL<br>
  P.O. Box 03, TANDAHIMBA
</div>

<div class="container">

<button onclick="window.print()">Print / Download Report</button>

<select id="class" onchange="loadReport()"></select>

<!-- ANALYTICS -->
<div class="analytics">
  <div class="box">
    <h3 id="totalStudents">0</h3>
    <p>Students</p>
  </div>
  <div class="box">
    <h3 id="avgScore">0</h3>
    <p>Avg Score</p>
  </div>
  <div class="box">
    <h3 id="topScore">0</h3>
    <p>Top Score</p>
  </div>
  <div class="box">
    <h3 id="passRate">0%</h3>
    <p>Pass Rate</p>
  </div>
</div>

<div class="card">
<table>
  <thead>
    <tr>
      <th>POS</th>
      <th>NAME</th>
      <th>GENDER</th>
      <th>DETAILED SUBJECTS</th>
      <th>TOTAL</th>
      <th>AVG</th>
      <th>GRADE</th>
    </tr>
  </thead>

  <tbody id="tbody"></tbody>
</table>
</div>

</div>

<script>

const supabaseUrl = "https://bslofdobcvxkjphbjyzb.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJzbG9mZG9iY3Z4a2pwaGJqeXpiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzODY5NTEsImV4cCI6MjA5Njk2Mjk1MX0.oZ8oxXGxKyN4qwBgWrgdp9JOCkNXtREf6epTAcQg45s";

const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

const subjectShort = {
  "ENGLISH": "ENGL",
  "GEOGRAPHY AND ENVIRONMENT": "GEOGR",
  "HISTORIA YA TANZANIA NA MAADILI": "H/TZ/MAADILI",
  "KISWAHILI": "KISW",
  "MATHEMATICS": "MATH",
  "SCIENCE": "SCIENCE",
  "ARTS AND SPORTS": "ARTS & SPORTS"
};

function normalize(n){
  return n.toUpperCase().trim();
}

/* GRADE */
function getGrade(avg){
  if(avg >= 81) return "A";
  if(avg >= 61) return "B";
  if(avg >= 41) return "C";
  if(avg >= 21) return "D";
  return "F";
}

async function init(){
  loadClasses();
}

async function loadClasses(){
  const { data } = await supabaseClient.from("classes").select("*");

  let el = document.getElementById("class");
  el.innerHTML = `<option value="">Select Class</option>`;

  data.forEach(c=>{
    el.innerHTML += `<option value="${c.id}">${c.class_name}</option>`;
  });
}

async function loadReport(){

  let class_id = document.getElementById("class").value;
  if(!class_id) return;

  const studentsRes = await supabaseClient
    .from("students")
    .select("*")
    .eq("class_id", class_id);

  let students = studentsRes.data || [];

  const subjectsRes = await supabaseClient
    .from("subjects")
    .select("*");

  let subjects = subjectsRes.data || [];

  const studentIds = students.map(s=>s.id);

  const resultsRes = await supabaseClient
    .from("results")
    .select("*")
    .in("student_id", studentIds);

  let results = resultsRes.data || [];

  let final = [];

  students.forEach(stu=>{

    let total = 0;
    let detail = [];

    subjects.forEach(sub=>{

      let r = results.find(x =>
        Number(x.student_id) === Number(stu.id) &&
        Number(x.subject_id) === Number(sub.id)
      );

      let mark = r ? Number(r.marks) : 0;
      total += mark;

      let grade =
        mark >= 81 ? "A" :
        mark >= 61 ? "B" :
        mark >= 41 ? "C" :
        mark >= 21 ? "D" : "F";

      let code = subjectShort[normalize(sub.subject_name)]
        || sub.subject_name.substring(0,4).toUpperCase();

      detail.push(`${code} - ${grade}`);
    });

    final.push({
      name: stu.student_name,
      gender: stu.gender,
      total,
      avg: subjects.length ? total/subjects.length : 0,
      detail: detail.join(" | ")
    });
  });

  final.sort((a,b)=>b.total-a.total);

  /* TABLE */
  let tbody = document.getElementById("tbody");
  tbody.innerHTML = "";

  final.forEach((s,i)=>{
    tbody.innerHTML += `
      <tr>
        <td>${i+1}</td>
        <td>${s.name}</td>
        <td>${s.gender || ""}</td>
        <td>${s.detail}</td>
        <td>${s.total}</td>
        <td>${s.avg.toFixed(1)}</td>
        <td>${getGrade(s.avg)}</td>
      </tr>
    `;
  });

  /* ANALYTICS */
  document.getElementById("totalStudents").innerText = final.length;

  let avg = final.reduce((a,b)=>a+b.avg,0)/final.length || 0;
  document.getElementById("avgScore").innerText = avg.toFixed(1);

  let top = Math.max(...final.map(s=>s.total),0);
  document.getElementById("topScore").innerText = top;

  let pass = final.filter(s=>s.avg>=41).length;
  let rate = (pass/final.length)*100 || 0;
  document.getElementById("passRate").innerText = rate.toFixed(1)+"%";
}

init();

</script>

</body>
</html>
