<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NECTA PRO MAX REPORT</title>

<style>
body{
  font-family:Arial;
  margin:0;
  background:#c7e3ee;
}

.header{
  text-align:center;
  padding:10px;
  font-weight:bold;
  text-transform:uppercase;
}

.school{
  text-align:center;
  font-size:13px;
}

select,button{
  margin:10px;
  padding:8px;
}

button{cursor:pointer;}

#publishBar{
  display:none;
  text-align:center;
}

.lock{
  display:none;
  color:red;
  font-weight:bold;
  text-align:center;
}

.table-wrap{
  margin:10px;
  background:#fff7cc;
  border:1px solid #999;
  overflow-x:auto;
}

table{
  width:100%;
  border-collapse:collapse;
  font-size:12px;
}

th{
  background:#e6e6e6;
  border:1px solid #999;
  padding:5px;
}

td{
  border:1px solid #999;
  padding:4px;
  white-space:nowrap;
}

@media print{
  select,button{display:none;}
}
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<div class="header">NECTA REPORT SYSTEM</div>
<div class="school">KOROSHO ENGLISH MEDIUM PRE AND PRIMARY SCHOOL</div>

<div id="lockNotice" class="lock">🔒 CLASS PUBLISHED - LOCKED</div>

<select id="class" onchange="onClassChange()"></select>

<div id="publishBar">
  <button id="publishBtn" onclick="togglePublish()">PUBLISH</button>
</div>

<button onclick="window.print()">PRINT</button>

<!-- ================= TABLES ================= -->
<div class="table-wrap">
<table>
<thead>
<tr>
<th>SEX</th><th>A</th><th>B</th><th>C</th><th>D</th><th>E</th>
</tr>
</thead>
<tbody id="gradePerf"></tbody>
</table>
</div>

<div class="table-wrap">
<table>
<thead>
<tr id="mainHead">
<th>CAND NO</th>
<th>PREM NO</th>
<th>SEX</th>
<th>SUBJECTS</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

<div class="table-wrap">
<table>
<thead>
<tr>
<th>NO</th>
<th>SUBJECT</th>
<th>REGISTERED</th>
<th>SAT</th>
<th>PASSED</th>
<th>AVERAGE</th>
<th>GPA</th>
</tr>
</thead>
<tbody id="subtbody"></tbody>
</table>
</div>

<script>
/* ================= SUPABASE ================= */
const client = supabase.createClient(
"https://bslofdobcvxkjphbjyzb.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJzbG9mZG9iY3Z4a2pwaGJqeXpiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzODY5NTEsImV4cCI6MjA5Njk2Mjk1MX0.oZ8oxXGxKyN4qwBgWrgdp9JOCkNXtREf6epTAcQg45s"
);

/* ================= ROLE SYSTEM ================= */
let role = "admin";

function isPublic(){
  return !["admin","teacher","headteacher"].includes(role);
}

/* ================= STATE ================= */
let currentClass = null;
let isPublished = false;

/* ================= LOAD CLASSES ================= */
async function loadClasses(){
  const { data } = await client.from("classes").select("*");

  const el = document.getElementById("class");
  el.innerHTML = `<option value="">Select Class</option>`;

  data.forEach(c=>{
    el.innerHTML += `<option value="${c.id}">${c.class_name}</option>`;
  });
}

/* ================= CLASS CHANGE ================= */
async function onClassChange(){
  currentClass = document.getElementById("class").value;
  if(!currentClass) return;

  document.getElementById("publishBar").style.display =
    role==="admin" ? "block":"none";

  await checkPublishStatus();

  if(isPublic() && !isPublished){
    document.getElementById("tbody").innerHTML =
      "<tr><td colspan='4'>RESULTS NOT PUBLISHED</td></tr>";
    return;
  }

  loadReport();
}

/* ================= PUBLISH STATUS ================= */
async function checkPublishStatus(){

  const { data } = await client
    .from("published_reports")
    .select("*")
    .eq("class_id", currentClass)
    .maybeSingle();

  isPublished = data?.is_published || false;

  document.getElementById("publishBtn").innerText =
    isPublished ? "UNPUBLISH" : "PUBLISH";

  document.getElementById("lockNotice").style.display =
    isPublished ? "block":"none";
}

/* ================= TOGGLE PUBLISH ================= */
async function togglePublish(){

  const { data } = await client
    .from("published_reports")
    .select("*")
    .eq("class_id", currentClass)
    .maybeSingle();

  if(data){
    await client.from("published_reports")
      .update({ is_published: !data.is_published })
      .eq("class_id", currentClass);
  } else {
    await client.from("published_reports")
      .insert([{ class_id: currentClass, is_published: true }]);
  }

  await checkPublishStatus();
}

/* ================= GRADE FUNCTIONS ================= */
function grade(m){
  if(m>=81) return "A";
  if(m>=61) return "B";
  if(m>=41) return "C";
  if(m>=21) return "D";
  return "E";
}

function gpa(g){
  if(g==="A") return 5;
  if(g==="B") return 4;
  if(g==="C") return 3;
  if(g==="D") return 2;
  return 1;
}


/* ================= LOAD REPORT (NECTA FULL CORE) ================= */
async function loadReport(){

  if(!currentClass) return;

  const { data:students } = await client.from("students").select("*");
  const { data:subjects } = await client.from("subjects").select("*");
  const { data:results } = await client.from("results").select("*");

  let filteredStudents = students.filter(s =>
    String(s.class_id) === String(currentClass)
  );

  /* ================= INIT ================= */
  let subStats = {};
  subjects.forEach(sub=>{
    subStats[sub.id] = {sat:0, pass:0, total:0};
  });

  let gradePerf = {
    Male:{A:0,B:0,C:0,D:0,E:0},
    Female:{A:0,B:0,C:0,D:0,E:0}
  };

  let final = [];

  /* ================= STUDENT LOOP ================= */
  filteredStudents.forEach(stu=>{

    let total = 0;
    let count = 0;
    let detail = [];

    subjects.forEach(sub=>{

      let r = results.find(x =>
        String(x.student_id) === String(stu.id) &&
        String(x.subject_id) === String(sub.id)
      );

      if(!r || r.marks == null) return;

      let m = Number(r.marks);

      subStats[sub.id].sat++;
      subStats[sub.id].total += m;

      if(m >= 41) subStats[sub.id].pass++;

      total += m;
      count++;

      detail.push(`${sub.subject_name.slice(0,4)}-${grade(m)}`);
    });

    if(count === 0) return;

    let avg = total / count;
    let avgGrade = grade(avg);

    let sex = stu.gender === "Female" ? "Female" : "Male";
    gradePerf[sex][avgGrade]++;

    detail.push("AVG-" + avgGrade);

    final.push({
      adm: stu.admission_no,
      name: stu.student_name,
      prem: stu.prem_no || "",
      sex: stu.gender === "Female" ? "F" : "M",
      detail: detail.join(" ")
    });
  });

  /* ================= PUBLIC CHECK ================= */
  if(isPublic() && !isPublished){
    document.getElementById("tbody").innerHTML =
      "<tr><td colspan='4' style='color:red;text-align:center'>RESULTS NOT PUBLISHED</td></tr>";

    document.getElementById("gradePerf").innerHTML = "";
    document.getElementById("subtbody").innerHTML = "";
    return;
  }

  /* ================= MAIN TABLE ================= */
  let tb = document.getElementById("tbody");
  tb.innerHTML = "";

  const head = document.getElementById("mainHead");

  if(!isPublic()){
    head.innerHTML = `
      <th>CAND NO</th>
      <th>NAME</th>
      <th>PREM NO</th>
      <th>SEX</th>
      <th>SUBJECTS</th>
    `;
  } else {
    head.innerHTML = `
      <th>CAND NO</th>
      <th>PREM NO</th>
      <th>SEX</th>
      <th>SUBJECTS</th>
    `;
  }

  final.forEach(r=>{

    if(!isPublic()){
      tb.innerHTML += `
        <tr>
          <td>${r.adm}</td>
          <td>${r.name}</td>
          <td>${r.prem}</td>
          <td>${r.sex}</td>
          <td>${r.detail}</td>
        </tr>
      `;
    } else {
      tb.innerHTML += `
        <tr>
          <td>${r.adm}</td>
          <td>${r.prem}</td>
          <td>${r.sex}</td>
          <td>${r.detail}</td>
        </tr>
      `;
    }
  });

  /* ================= GRADE PERFORMANCE ================= */
  let gp = document.getElementById("gradePerf");
  gp.innerHTML = "";

  ["Female","Male"].forEach(sex=>{
    let r = gradePerf[sex];
    gp.innerHTML += `
      <tr>
        <td>${sex}</td>
        <td>${r.A}</td>
        <td>${r.B}</td>
        <td>${r.C}</td>
        <td>${r.D}</td>
        <td>${r.E}</td>
      </tr>
    `;
  });

  /* ================= SUBJECT PERFORMANCE ================= */
  let subbody = document.getElementById("subtbody");
  subbody.innerHTML = "";

  let i = 1;

  subjects.forEach(sub=>{

    let st = subStats[sub.id];

    if(st.sat === 0) return;

    let avg = st.total / st.sat;

    subbody.innerHTML += `
      <tr>
        <td>${i++}</td>
        <td>${sub.subject_name}</td>
        <td>${st.sat}</td>
        <td>${st.sat}</td>
        <td>${st.pass}</td>
        <td>${avg.toFixed(1)}</td>
        <td>${gpa(grade(avg)).toFixed(2)}</td>
      </tr>
    `;
  });
}

/* ================= LOAD ================= */
loadClasses();
</script>

</body>
</html>
