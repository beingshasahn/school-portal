<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NECTA PRO MAX REPORT</title>

<style>
body{
  font-family:Arial;
  margin:0;
  background:#c7e3ee;
}

.header{
  text-align:center;
  padding:10px;
  font-weight:bold;
  text-transform:uppercase;
}

.school{
  text-align:center;
  font-size:13px;
}

select,button{
  margin:10px;
  padding:8px;
  cursor:pointer;
}

#publishBar{
  display:none;
  text-align:center;
}

.table-wrap{
  margin:10px;
  background:#fff7cc;
  border:1px solid #999;
  overflow-x:auto;
}

table{
  width:100%;
  border-collapse:collapse;
  font-size:12px;
}

th{
  background:#e6e6e6;
  border:1px solid #999;
  padding:5px;
}

td{
  border:1px solid #999;
  padding:4px;
  white-space:nowrap;
}

#lockNotice{
  display:none;
  color:red;
  font-weight:bold;
  text-align:center;
}

@media print{
  select,button{display:none;}
}
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<div class="header">NECTA REPORT SYSTEM</div>
<div class="school">KOROSHO ENGLISH MEDIUM PRE AND PRIMARY SCHOOL</div>

<div id="lockNotice">🔒 This class is PUBLISHED. Editing is locked.</div>

<select id="class" onchange="onClassChange()"></select>

<div id="publishBar">
  <button id="publishBtn" onclick="togglePublish()">PUBLISH</button>
</div>

<button onclick="window.print()">PRINT</button>

<!-- GRADE -->
<div class="table-wrap">
<table>
<thead>
<tr>
<th>SEX</th><th>A</th><th>B</th><th>C</th><th>D</th><th>E</th>
</tr>
</thead>
<tbody id="gradePerf"></tbody>
</table>
</div>

<!-- MAIN -->
<div class="table-wrap">
<table>
<thead>
<tr id="mainHead">
<th>CAND NO</th>
<th>PREM NO</th>
<th>SEX</th>
<th>SUBJECTS</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

<!-- SUBJECT -->
<div class="table-wrap">
<table>
<thead>
<tr>
<th>NO</th>
<th>SUBJECT</th>
<th>REGISTERED</th>
<th>SAT</th>
<th>PASSED (A-C)</th>
<th>AVER. MARKS</th>
<th>GPA</th>
</tr>
</thead>
<tbody id="subtbody"></tbody>
</table>
</div>

<script>

const client = supabase.createClient(
"https://bslofdobcvxkjphbjyzb.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJzbG9mZG9iY3Z4a2pwaGJqeXpiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzODY5NTEsImV4cCI6MjA5Njk2Mjk1MX0.oZ8oxXGxKyN4qwBgWrgdp9JOCkNXtREf6epTAcQg45s"
);

/* ================= ROLE ================= */
let role = "admin"; // admin | teacher | headteacher | public

function isPublicUser(){
  return !(role === "admin" || role === "teacher" || role === "headteacher");
}

/* ================= STATE ================= */
let currentClass = null;
let isPublished = false;

/* ================= LOAD CLASSES ================= */
async function loadClasses(){
  const { data } = await client.from("classes").select("*");

  let el = document.getElementById("class");
  el.innerHTML = `<option value="">Select Class</option>`;

  data.forEach(c=>{
    el.innerHTML += `<option value="${c.id}">${c.class_name}</option>`;
  });
}

/* ================= CLASS CHANGE ================= */
async function onClassChange(){

  currentClass = document.getElementById("class").value;
  if(!currentClass) return;

  await checkPublishStatus();

  if(role === "admin"){
    document.getElementById("publishBar").style.display = "block";
  }

  loadReport();
}

/* ================= CHECK PUBLISH ================= */
async function checkPublishStatus(){

  const { data } = await client
    .from("published_reports")
    .select("is_published")
    .eq("class_id", currentClass)
    .maybeSingle();

  isPublished = data?.is_published === true;

  const btn = document.getElementById("publishBtn");

  if(btn){
    btn.innerText = isPublished ? "PUBLISHED" : "PUBLISH";
    btn.style.background = isPublished ? "green" : "#1e3c72";
  }

  applyLockState();
}

/* ================= TOGGLE PUBLISH ================= */
async function togglePublish(){

  const { data } = await client
    .from("published_reports")
    .select("*")
    .eq("class_id", currentClass)
    .maybeSingle();

  if(data){
    await client
      .from("published_reports")
      .update({ is_published: !data.is_published })
      .eq("class_id", currentClass);
  } else {
    await client
      .from("published_reports")
      .insert([{ class_id: currentClass, is_published: true }]);
  }

  await checkPublishStatus();
}

/* ================= LOAD REPORT ================= */
async function loadReport(){

  if(!currentClass) return;

  // PUBLIC BLOCK
  if(isPublicUser() && !isPublished){
    document.getElementById("tbody").innerHTML =
      "<tr><td colspan='4' style='color:red;text-align:center'>RESULTS NOT PUBLISHED</td></tr>";

    return;
  }

  const { data:students } = await client.from("students").select("*");
  const { data:subjects } = await client.from("subjects").select("*");
  const { data:results } = await client.from("results").select("*");

  let filtered = students.filter(s => s.class_id == currentClass);

  let final = [];
  let gradePerf = {Male:{A:0,B:0,C:0,D:0,E:0},Female:{A:0,B:0,C:0,D:0,E:0}};
  let subStats = {};

  subjects.forEach(s=>{
    subStats[s.id]={sat:0,pass:0,total:0};
  });

  filtered.forEach(stu=>{

    let total=0,count=0,detail=[];

    subjects.forEach(sub=>{

      let r = results.find(x =>
        x.student_id === stu.id &&
        x.subject_id === sub.id
      );

      if(!r) return;

      let m = Number(r.marks);

      subStats[sub.id].sat++;
      subStats[sub.id].total += m;
      if(m>=41) subStats[sub.id].pass++;

      total += m;
      count++;

      detail.push(sub.subject_name.substring(0,4)+"-"+grade(m));
    });

    if(count===0) return;

    let avg = total/count;
    let g = grade(avg);

    gradePerf[stu.gender||"Male"][g]++;

    final.push({
      adm: stu.admission_no,
      prem: stu.prem_no||"",
      sex: stu.gender==="Female"?"F":"M",
      name: stu.student_name,
      detail: detail.join(" ")+" AVG-"+g
    });
  });

  let tb=document.getElementById("tbody");
  let head=document.getElementById("mainHead");

  if(role==="admin"||role==="teacher"||role==="headteacher"){
    head.innerHTML=`
      <th>CAND NO</th><th>NAME</th><th>PREM NO</th><th>SEX</th><th>SUBJECTS</th>`;
  }else{
    head.innerHTML=`
      <th>CAND NO</th><th>PREM NO</th><th>SEX</th><th>SUBJECTS</th>`;
  }

  tb.innerHTML="";

  final.forEach(s=>{
    tb.innerHTML += role==="admin"||role==="teacher"||role==="headteacher"
    ? `<tr><td>${s.adm}</td><td>${s.name}</td><td>${s.prem}</td><td>${s.sex}</td><td>${s.detail}</td></tr>`
    : `<tr><td>${s.adm}</td><td>${s.prem}</td><td>${s.sex}</td><td>${s.detail}</td></tr>`;
  });

  let gp=document.getElementById("gradePerf");
  gp.innerHTML="";
  ["Female","Male"].forEach(sex=>{
    let r=gradePerf[sex];
    gp.innerHTML+=`<tr><td>${sex}</td><td>${r.A}</td><td>${r.B}</td><td>${r.C}</td><td>${r.D}</td><td>${r.E}</td></tr>`;
  });
}

/* ================= LOCK UI ================= */
function applyLockState(){

  const locked = isPublished;

  document.querySelectorAll("input, select").forEach(el=>{
    if(el.id!=="class"){
      el.disabled = locked;
    }
  });

  document.getElementById("lockNotice").style.display =
    locked ? "block" : "none";
}

/* ================= UTIL ================= */
function grade(m){
  if(m>=81) return "A";
  if(m>=61) return "B";
  if(m>=41) return "C";
  if(m>=21) return "D";
  return "E";
}

loadClasses();

</script>

</body>
  </html>
