let role = "admin";
let currentClass = null;
let isPublished = false;

function isPublic(){
  return !["admin","teacher","headteacher"].includes(role);
}

/* ---------------- AUTO COLUMN FIT ---------------- */
function autoFitTable(tableId){
  const table = document.getElementById(tableId);
  const cols = table.querySelectorAll("th");

  cols.forEach((th, i)=>{
    let max = th.innerText.length;

    table.querySelectorAll("tr").forEach(tr=>{
      const cell = tr.children[i];
      if(cell){
        max = Math.max(max, cell.innerText.length);
      }
    });

    th.style.minWidth = (max * 7) + "px";
  });
}

/* ---------------- GRADE ---------------- */
function grade(m){
  if(m>=81) return "A";
  if(m>=61) return "B";
  if(m>=41) return "C";
  if(m>=21) return "D";
  return "E";
}

function gpa(g){
  return {A:5,B:4,C:3,D:2,E:1}[g] || 1;
}

/* ---------------- LOAD REPORT ---------------- */
async function loadReport(){

  const { data:students } = await client.from("students").select("*");
  const { data:subjects } = await client.from("subjects").select("*");
  const { data:results } = await client.from("results").select("*");

  let filtered = students
    .filter(s => String(s.class_id) === String(currentClass))
    .sort((a,b)=>{
      const g1 = (a.gender||"Male");
      const g2 = (b.gender||"Male");
      if(g1!==g2) return g1==="Male"?-1:1;
      return (a.student_name||"").localeCompare(b.student_name||"");
    });

  let final = [];
  let subStats = {};

  subjects.forEach(s=>{
    subStats[s.id]={sat:0,pass:0,total:0};
  });

  filtered.forEach(stu=>{

    let total=0,count=0,detail=[];

    subjects.forEach(sub=>{
      let r = results.find(x =>
        x.student_id==stu.id && x.subject_id==sub.id
      );

      if(!r) return;

      let m = Number(r.marks);

      subStats[sub.id].sat++;
      subStats[sub.id].total+=m;
      if(m>=41) subStats[sub.id].pass++;

      total+=m;
      count++;

      detail.push(sub.subject_name+"-"+grade(m));
    });

    if(count===0) return;

    final.push({
      adm:stu.admission_no,
      name:stu.student_name,
      prem:stu.prem_no,
      sex:stu.gender==="Female"?"F":"M",
      detail:detail.join(" ")
    });
  });

  let tb=document.getElementById("tbody");
  tb.innerHTML="";

  final.forEach(r=>{
    tb.innerHTML+=`
    <tr>
      <td>${r.adm}</td>
      <td>${r.name}</td>
      <td>${r.prem}</td>
      <td>${r.sex}</td>
      <td>${r.detail}</td>
    </tr>`;
  });

  let gp=document.getElementById("gradePerf");
  gp.innerHTML="";
}

/* ---------------- PDF EXPORT (NECTA STYLE) ---------------- */
async function exportPDF(){
  const el = document.body;

  const canvas = await html2canvas(el,{scale:2});
  const img = canvas.toDataURL("image/png");

  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF("p","mm","a4");

  const w = pdf.internal.pageSize.getWidth();
  const h = (canvas.height * w)/canvas.width;

  pdf.addImage(img,"PNG",0,0,w,h);
  pdf.save("NECTA_REPORT.pdf");
}
</script>
