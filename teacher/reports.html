<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NECTA PRO MAX REPORT</title>

<style>
body{
  font-family:Arial;
  margin:0;
  background:#c7e3ee;
}

.header{
  text-align:center;
  padding:10px;
  font-weight:bold;
  text-transform:uppercase;
}

.school{
  text-align:center;
  font-size:13px;
}

.table-wrap{
  margin:10px;
  background:#fff7cc;
  border:1px solid #999;
  overflow-x:auto;
}

table{
  width:100%;
  border-collapse:collapse;
  font-size:12px;
}

th{
  background:#e6e6e6;
  border:1px solid #999;
  padding:5px;
}

td{
  border:1px solid #999;
  padding:4px;
  white-space:nowrap;
}

select,button{
  margin:10px;
  padding:8px;
}

@media print{
  select,button{display:none;}
}
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<div class="header">NATIONAL EXAMINATIONS COUNCIL OF TANZANIA</div>
<div class="header">PSLE / SCHOOL EXAMINATION REPORT</div>
<div class="school">KOROSHO ENGLISH MEDIUM PRE AND PRIMARY SCHOOL</div>

<select id="class" onchange="loadReport()"></select>
<button onclick="window.print()">PRINT</button>

<!-- GRADE PERFORMANCE -->
<div class="table-wrap">
<table>
<thead>
<tr>
<th>SEX</th><th>A</th><th>B</th><th>C</th><th>D</th><th>E</th>
</tr>
</thead>
<tbody id="gradePerf"></tbody>
</table>
</div>

<!-- MAIN TABLE -->
<div class="table-wrap">
<table>
<thead>
<tr>
<th>CAND NO</th>
<th>PREM NO</th>
<th>SEX</th>
<th>SUBJECTS</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

<!-- SUBJECT PERFORMANCE -->
<div class="table-wrap">
<table>
<thead>
<tr>
<th>NO</th>
<th>SUBJECT</th>
<th>REGISTERED</th>
<th>SAT</th>
<th>PASSED (A-C)</th>
<th>AVER. MARKS</th>
<th>COMPETENCY (GPA)</th>
</tr>
</thead>
<tbody id="subtbody"></tbody>
</table>
</div>

<script>

/* ================= SUPABASE ================= */
const supabaseUrl = "https://bslofdobcvxkjphbjyzb.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJzbG9mZG9iY3Z4a2pwaGJqeXpiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzODY5NTEsImV4cCI6MjA5Njk2Mjk1MX0.oZ8oxXGxKyN4qwBgWrgdp9JOCkNXtREf6epTAcQg45s";
const client = supabase.createClient(supabaseUrl, supabaseKey);

/* ================= HELPERS ================= */
function grade(m){
  if(m>=81) return "A";
  if(m>=61) return "B";
  if(m>=41) return "C";
  if(m>=21) return "D";
  return "E";
}

function gpa(g){
  if(g==="A") return 5;
  if(g==="B") return 4;
  if(g==="C") return 3;
  if(g==="D") return 2;
  return 1;
}

/* ================= LOAD CLASSES ================= */
async function loadClasses(){
  const { data } = await client.from("classes").select("*");

  let el = document.getElementById("class");
  el.innerHTML = `<option value="">Select Class</option>`;

  data.forEach(c=>{
    el.innerHTML += `<option value="${String(c.id).trim()}">${c.class_name}</option>`;
  });
}

/* ================= LOAD REPORT ================= */
async function loadReport(){

  let classId = String(document.getElementById("class").value).trim();
  if(!classId) return;

  const { data:students } = await client.from("students").select("*");
  const { data:subjects } = await client.from("subjects").select("*");
  const { data:results } = await client.from("results").select("*");

  let filteredStudents = students.filter(s =>
    String(s.class_id).trim() === classId
  );

  if(filteredStudents.length === 0){
    document.getElementById("tbody").innerHTML =
      "<tr><td colspan='4'>NO STUDENTS FOUND</td></tr>";
    return;
  }

  /* ================= SUBJECT STATS ================= */
  let subStats = {};
  subjects.forEach(sub=>{
    subStats[sub.id] = {
      sat:0,
      pass:0,
      total:0
    };
  });

  let final = [];

  let gradePerf = {
    Male:{A:0,B:0,C:0,D:0,E:0},
    Female:{A:0,B:0,C:0,D:0,E:0}
  };

  /* ================= STUDENTS LOOP ================= */
  filteredStudents.forEach(stu=>{

    let total = 0;
    let count = 0;
    let detail = [];

    subjects.forEach(sub=>{

      let r = results.find(x =>
        String(x.student_id).trim() === String(stu.id).trim() &&
        String(x.subject_id).trim() === String(sub.id).trim()
      );

      if(!r || r.marks === null || r.marks === "" || r.marks === undefined) return;

      let m = Number(r.marks);
      if(isNaN(m)) return;

      subStats[sub.id].sat += 1;
      subStats[sub.id].total += m;

      if(m >= 41){
        subStats[sub.id].pass += 1;
      }

      total += m;
      count++;

      let code = sub.subject_name.substring(0,4).toUpperCase();
      detail.push(`${code} - ${grade(m)}`);
    });

    if(count === 0) return;

    let avg = total / count;
    let avgGrade = grade(avg);

    let sex = stu.gender === "Male" ? "Male" : "Female";
    gradePerf[sex][avgGrade]++;

    detail.push(`AVERAGE - ${avgGrade}`);

    final.push({
      adm: stu.admission_no,
      prem: stu.admission_no,
      sex: sex === "Male" ? "M" : "F",
      detail: detail.join(" ")
    });
  });

  /* ================= MAIN TABLE ================= */
  let tb = document.getElementById("tbody");
  tb.innerHTML = "";

  final.forEach((s,i)=>{
    tb.innerHTML += `
    <tr>
      <td>${i+1}</td>
      <td>${s.prem}</td>
      <td>${s.sex}</td>
      <td>${s.detail}</td>
    </tr>`;
  });

  /* ================= GRADE PERFORMANCE ================= */
  let gp = document.getElementById("gradePerf");
  gp.innerHTML = "";

  ["Female","Male"].forEach(sex=>{
    let r = gradePerf[sex];
    gp.innerHTML += `
    <tr>
      <td>${sex}</td>
      <td>${r.A}</td>
      <td>${r.B}</td>
      <td>${r.C}</td>
      <td>${r.D}</td>
      <td>${r.E}</td>
    </tr>`;
  });

  /* ================= SUBJECT PERFORMANCE ================= */
  let subbody = document.getElementById("subtbody");
  subbody.innerHTML = "";

  let i = 1;

  // 🔥 IMPORTANT FILTER: ONLY SUBJECTS WITH DATA
  subjects
    .filter(sub => subStats[sub.id].sat > 0)
    .forEach(sub=>{

      let st = subStats[sub.id];

      let avg = st.sat ? (st.total / st.sat) : 0;
      let letter = grade(avg);

      subbody.innerHTML += `
      <tr>
        <td>${i++}</td>
        <td>${sub.subject_name}</td>
        <td>${st.sat}</td>
        <td>${st.sat}</td>
        <td>${st.pass}</td>
        <td>${avg.toFixed(1)}</td>
        <td>${gpa(letter).toFixed(2)}</td>
      </tr>
      `;
    });
}

/* INIT */
loadClasses();

</script>

</body>
</html>
