<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Class Teacher Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{box-sizing:border-box;font-family:Arial}

body{margin:0;background:#f4f6f9}

/* HEADER */
.header{
  background:#1e3c72;
  color:white;
  padding:12px;
  text-align:center;
}

/* T.O.D SCROLL */
.tod-wrapper{
  overflow:hidden;
  white-space:nowrap;
  width:100%;
  background:#000;
}

.tod-scroll{
  display:inline-block;
  white-space:nowrap;
  animation:scrollLeft 12s linear infinite;
  color:#00ff6a;
  font-weight:bold;
  padding:6px;
}

@keyframes scrollLeft{
  0%{transform:translateX(100%)}
  100%{transform:translateX(-100%)}
}

/* TOP BAR */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px;
  background:#fff;
}

/* LEFT BUTTON GROUP */
.left-actions{
  display:flex;
  gap:8px;
  align-items:center;
}

.btn{
  padding:8px 12px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  background:#1e3c72;
  color:white;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:10px;
  padding:10px;
}

/* CARD - PRO LIVE DESIGN */
.card{
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(30,60,114,0.1);
  padding:16px;
  border-radius:14px;
  box-shadow:0 8px 20px rgba(0,0,0,0.08);
  transition: all 0.25s ease;
  position:relative;
  overflow:hidden;
}

/* hover effect */
.card:hover{
  transform: translateY(-4px);
  box-shadow:0 12px 28px rgba(0,0,0,0.15);
}

/* live glow line */
.card::before{
  content:"";
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:3px;
  background: linear-gradient(90deg,#1e3c72,#00c6ff,#1e3c72);
  background-size:200% 100%;
  animation:moveLine 3s linear infinite;
}

@keyframes moveLine{
  0%{background-position:0% 0%}
  100%{background-position:200% 0%}
}

/* numbers styling */
.card h4{
  margin:0;
  font-size:14px;
  color:#555;
  font-weight:600;
}

.card div{
  font-size:26px;
  font-weight:bold;
  color:#1e3c72;
  margin-top:6px;
}

/* LIVE DOT */
.live-dot{
  width:8px;
  height:8px;
  background:#00ff6a;
  border-radius:50%;
  display:inline-block;
  margin-left:6px;
  animation:pulse 1.2s infinite;
}

@keyframes pulse{
  0%{transform:scale(1);opacity:1}
  50%{transform:scale(1.6);opacity:0.5}
  100%{transform:scale(1);opacity:1}
}

/* TABLE */
table{width:100%;border-collapse:collapse}
th,td{padding:8px;border-bottom:1px solid #eee}

/* BUTTONS */
.present{background:#28a745;color:white;border:none;padding:6px;border-radius:6px}
.absent{background:#dc3545;color:white;border:none;padding:6px;border-radius:6px}

.hidden{display:none}
</style>
</head>

<body>

<div class="header">
  <h3>CLASS TEACHER DASHBOARD</h3>
</div>

<div class="tod-wrapper">
  <div id="todText" class="tod-scroll">Loading T.O.D...</div>
</div>

<div class="topbar">

  <!-- LEFT: BACK BUTTON + INFO -->
  <div class="left-actions">
    <button class="btn" onclick="location.href='dashboard.html'">⬅ Back</button>
    <div id="teacherInfo">Loading...</div>
  </div>

  <!-- RIGHT: LOGOUT -->
  <button class="btn" onclick="logout()">Logout</button>

</div>

<!-- NOT ASSIGNED -->
<div id="notAssigned" class="card hidden">
  ❌ You are not assigned as a Class Teacher
</div>

<!-- DASHBOARD -->
<div id="dashboard">

  <div class="grid">

    <div class="card">
      <h4>Class</h4>
      <div id="className">-</div>
    </div>

    <div class="card">
      <h4>Total Students <span class="live-dot"></span></h4>
      <div id="totalStudents">0</div>
    </div>

    <div class="card">
      <h4>Present Today <span class="live-dot"></span></h4>
      <div id="presentCount">0</div>
    </div>

    <div class="card">
      <h4>Absent Today <span class="live-dot"></span></h4>
      <div id="absentCount">0</div>
    </div>

  </div>

  <div class="card">
    <h3>Mark Attendance</h3>
    <table>
      <thead>
        <tr>
          <th>Adm No</th>
          <th>Name</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="students"></tbody>
    </table>
  </div>

</div>

<script>

const supabaseUrl = "https://bslofdobcvxkjphbjyzb.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJzbG9mZG9iY3Z4a2pwaGJqeXpiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzODY5NTEsImV4cCI6MjA5Njk2Mjk1MX0.oZ8oxXGxKyN4qwBgWrgdp9JOCkNXtREf6epTAcQg45s";

const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

let teacherId = null;
let classId = null;
let today = new Date().toISOString().split("T")[0];

/* INIT */
async function init(){

  const { data:{ user } } = await supabaseClient.auth.getUser();

  if(!user){
    location.href="../index.html";
    return;
  }

  teacherId = user.id;

  const name = profile?.full_name || "Teacher";

const hour = new Date().getHours();

let greeting = "Good morning";
if(hour >= 12 && hour < 17){
  greeting = "Good afternoon";
}else if(hour >= 17){
  greeting = "Good evening";
}

document.getElementById("teacherInfo").innerText =
  `🌅 ${greeting}, Mr/Ms ${name}`;

  await loadTOD();
  await loadClassTeacher();
}

function getWeekStart(){
  const d = new Date();
  const day = d.getDay();
  const diff = day === 0 ? -6 : 1 - day;

  const monday = new Date(d);
  monday.setDate(d.getDate() + diff);

  return monday.toISOString().split("T")[0];
}

async function loadTOD(){

  const start = getWeekStart();

  const { data } = await supabaseClient
    .from("tod_rotation")
    .select("teacher_id")
    .eq("week_start", start)
    .maybeSingle();

  if(data?.teacher_id === teacherId){
    document.getElementById("todText").innerText =
      "YOU ARE A T.O.D THIS WEEK";
  }else{
    document.getElementById("todText").innerText =
      "School Running Normally";
  }
}

async function loadClassTeacher(){

  const { data } = await supabaseClient
    .from("teacher_assignments")
    .select("class_id, classes(id,class_name)")
    .eq("teacher_id", teacherId)
    .eq("is_class_teacher", true)
    .maybeSingle();

  if(!data){
    document.getElementById("notAssigned").classList.remove("hidden");
    document.getElementById("dashboard").style.display = "none";
    return;
  }

  classId = data.class_id;

  document.getElementById("className").innerText =
    data.classes.class_name;

  loadStudents();
  loadStats();
}

async function loadStudents(){

  const { data } = await supabaseClient
    .from("students")
    .select("*")
    .eq("class_id", classId);

  const tbody = document.getElementById("students");
  tbody.innerHTML = "";

  (data || []).forEach(s=>{
    tbody.innerHTML += `
      <tr>
        <td>${s.admission_no}</td>
        <td>${s.student_name}</td>
        <td>
          <button class="present" onclick="mark('${s.id}','P')">P</button>
          <button class="absent" onclick="mark('${s.id}','A')">A</button>
        </td>
      </tr>
    `;
  });

  document.getElementById("totalStudents").innerText = data?.length || 0;
}

async function mark(studentId,status){

  await supabaseClient
    .from("attendance")
    .upsert([{
      student_id: studentId,
      class_id: classId,
      date: today,
      status: status
    }],{
      onConflict: "student_id,class_id,date"
    });

  loadStats();
}

function animateNumber(el, value){
  el.style.transform = "scale(1.2)";
  setTimeout(()=> {
    el.innerText = value;
    el.style.transform = "scale(1)";
  }, 150);
}

async function loadStats(){

  const { data } = await supabaseClient
    .from("attendance")
    .select("status")
    .eq("class_id", classId)
    .eq("date", today);

  const present = (data || []).filter(x=>x.status==="P").length;
  const absent = (data || []).filter(x=>x.status==="A").length;

  animateNumber(document.getElementById("presentCount"), present);
  animateNumber(document.getElementById("absentCount"), absent);
}

/* LOGOUT */
async function logout(){
  await supabaseClient.auth.signOut();
  location.href="../index.html";
}

init();

// LIVE AUTO REFRESH
setInterval(()=>{
  if(classId){
    loadStats();
  }
}, 5000); // kila sekunde 5
</script>

</body>
</html>
