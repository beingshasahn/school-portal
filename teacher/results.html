<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RESULTS DASHBOARD</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  font-family: Arial;
  margin: 0;
  background: #f5f6fa;
}

.header{
  padding: 10px;
  font-weight: bold;
  text-transform: uppercase;
  background: #c7e3ee;
}

select{
  margin: 10px;
  padding: 8px;
}

.table-wrap{
  margin: 10px;
  background: #fff;
  border: 1px solid #ccc;
  overflow-x: auto;
  display: inline-block;   /* 🔴 hii inazuia stretching */
  max-width: 100%;
}
  
table{
  border-collapse: collapse;
  width: auto;          /* 🔴 badala ya 100% */
  font-size: 12px;
  table-layout: auto;   /* 🔴 muhimu sana */
}

th, td{
  border: 1px solid #ccc;
  padding: 4px 6px;     /* 🔴 kupunguza spacing */
  white-space: nowrap;
  width: fit-content;   /* 🔴 muhimu */
}

  th{
  background: #eee;
  text-align: left;
  font-size: 11px;
  }

#status{
  margin: 10px;
  font-weight: bold;
  color: red;
}
</style>
</head>

<body>

<div class="header">RESULTS DASHBOARD (VIEW ONLY)</div>

<select id="class" onchange="onClassChange()">
  <option value="">Select Class</option>
</select>

<div id="status"></div>

<!-- ================= TABLE 1: GRADE PERF ================= -->
<div class="table-wrap">
<table>
<thead>
<tr>
<th>SEX</th>
<th>A</th>
<th>B</th>
<th>C</th>
<th>D</th>
<th>E</th>
</tr>
</thead>
<tbody id="gradePerf"></tbody>
</table>
</div>

<!-- ================= TABLE 2: STUDENTS ================= -->
<div class="table-wrap">
<table>
<thead>
<tr>
<th>CAND NO</th>
<th>PREM NO</th>
<th>NAME</th>
<th>SEX</th>
<th>SUBJECTS</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

<!-- ================= TABLE 3: SUBJECT PERF ================= -->
<div class="table-wrap">
<table>
<thead>
<tr>
<th>NO</th>
<th>SUBJECT</th>
<th>REGISTERED</th>
<th>SAT</th>
<th>PASSED</th>
<th>AVERAGE</th>
<th>GPA</th>
</tr>
</thead>
<tbody id="subtbody"></tbody>
</table>
</div>

<script>

const client = supabase.createClient(
  "https://bslofdobcvxkjphbjyzb.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJzbG9mZG9iY3Z4a2pwaGJqeXpiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzODY5NTEsImV4cCI6MjA5Njk2Mjk1MX0.oZ8oxXGxKyN4qwBgWrgdp9JOCkNXtREf6epTAcQg45s"
);

let currentClass = null;
let isPublished = false;
function formatSubject(name){

  const map = {
    "Geography and the environment": "GEOGRAPHY",
    "Historia ya Tanzania na Maadili": "HIST.TZ",
    "Arts and Sports": "ARTS & SPORTS"
  };

  return map[name] || name;
}
  
/* ================= GRADES ================= */
function grade(m){
  if(m >= 81) return "A";
  if(m >= 61) return "B";
  if(m >= 41) return "C";
  if(m >= 21) return "D";
  return "E";
}

function gpa(g){
  return {A:1,B:2,C:3,D:4,E:5}[g] || 5;
}

/* ================= LOAD CLASSES ================= */
async function loadClasses(){
  const { data } = await client.from("classes").select("*");

  const el = document.getElementById("class");
  el.innerHTML = `<option value="">Select Class</option>`;

  data.forEach(c=>{
    el.innerHTML += `<option value="${c.id}">${c.class_name}</option>`;
  });
}

/* ================= PUBLISH CHECK ================= */
async function checkPublishStatus(){

  const { data } = await client
    .from("published_reports")
    .select("*")
    .eq("class_id", currentClass)
    .maybeSingle();

  isPublished = data?.is_published || false;

  if(!isPublished){
    document.getElementById("status").innerText =
      "⚠ RESULTS NOT PUBLISHED";
    return false;
  }

  document.getElementById("status").innerText = "";
  return true;
}

/* ================= CLASS CHANGE ================= */
async function onClassChange(){

  currentClass = document.getElementById("class").value;
  if(!currentClass) return;

  const ok = await checkPublishStatus();

  if(!ok){
    document.getElementById("tbody").innerHTML = "";
    document.getElementById("gradePerf").innerHTML = "";
    document.getElementById("subtbody").innerHTML = "";
    return;
  }

  loadReport();
}

/* ================= MAIN REPORT ================= */
async function loadReport(){

  const { data:students } = await client.from("students").select("*");
  const { data:subjects } = await client.from("subjects").select("*");
  const { data:results } = await client.from("results").select("*");

  let filtered = students
  .filter(s =>
    String(s.class_id) === String(currentClass)
  )
  .sort((a, b) => {

    if ((a.gender || "Male") !== (b.gender || "Male")) {
      return (a.gender === "Female") ? 1 : -1;
    }

    return (a.admission_no || "").localeCompare(b.admission_no || "");
  });

  let final = [];

  let gradePerf = {
    Male:{A:0,B:0,C:0,D:0,E:0},
    Female:{A:0,B:0,C:0,D:0,E:0}
  };

  /* ================= STUDENT LOOP ================= */
  filtered.forEach(stu=>{

  let total = 0;
  let count = 0;
  let detail = [];

  subjects.forEach(sub=>{

    let r = results.find(x =>
      String(x.student_id) === String(stu.id) &&
      String(x.subject_id) === String(sub.id)
    );

    if(!r) return;

    let m = Number(r.marks);

    total += m;
    count++;

    const shortName = formatSubject(sub.subject_name);
    detail.push(shortName + " - " + grade(m));
  });

  if(count === 0) return;

  let avg = total / count;
  let g = grade(avg);

  detail.push("Average - " + g);

  gradePerf[stu.gender || "Male"][g]++;

  final.push({
    adm: stu.admission_no,
    prem: stu.prem_no,
    name: stu.student_name || "-",
    sex: stu.gender === "Female" ? "F" : "M",
    detail: detail.join(", ")
  });

});

  /* ================= TABLE 2 ================= */
  document.getElementById("tbody").innerHTML =
    final.map(r=>`
      <tr>
        <td>${r.adm}</td>
        <td>${r.prem}</td>
        <td>${r.name}</td>
        <td>${r.sex}</td>
        <td>${r.detail}</td>
      </tr>
    `).join("");

  /* ================= TABLE 1 (GRADE PERF) ================= */
  document.getElementById("gradePerf").innerHTML =
    Object.entries(gradePerf).map(([k,v])=>`
      <tr>
        <td>${k}</td>
        <td>${v.A}</td>
        <td>${v.B}</td>
        <td>${v.C}</td>
        <td>${v.D}</td>
        <td>${v.E}</td>
      </tr>
    `).join("");

  /* ================= TABLE 3 (SUBJECT PERF) ================= */

      let subjectRows = [];
let i = 1;

subjects.forEach(sub => {

  const st = results.filter(r =>
    String(r.subject_id) === String(sub.id) &&
    filtered.some(s => String(s.id) === String(r.student_id))
  );

  if (st.length === 0) return;

  let total = st.reduce((a,b)=>a + Number(b.marks), 0);
  let avg = total / st.length;

  subjectRows.push(`
    <tr>
      <td>${i++}</td>
      <td>${sub.subject_name}</td>
      <td>${st.length}</td>
      <td>${st.length}</td>
      <td>${st.filter(x => x.marks >= 41).length}</td>
      <td>${avg.toFixed(1)}</td>
      <td>${gpa(grade(avg))}</td>
    </tr>
  `);
});

document.getElementById("subtbody").innerHTML =
  subjectRows.length
    ? subjectRows.join("")
    : `<tr><td colspan="7" style="text-align:center;">
        NO SUBJECT PERFORMANCE DATA
      </td></tr>`;
}
function startRealtime(){

  client
    .channel('results-changes')
    .on(
      'postgres_changes',
      {
        event: '*',
        schema: 'public',
        table: 'results'
      },
      (payload) => {
        console.log("Results changed:", payload);

        if(currentClass){
          loadReport(); // refresh automatically
        }
      }
    )
    .subscribe();


  client
    .channel('students-changes')
    .on(
      'postgres_changes',
      {
        event: '*',
        schema: 'public',
        table: 'students'
      },
      () => {
        if(currentClass){
          loadReport();
          setInterval(() => {
  if(currentClass){
    loadReport();
  }
}, 5000); // kila sekunde 5
        }
      }
    )
    .subscribe();

}
/* ================= INIT ================= */
async function init(){
  await loadClasses();
  startRealtime();
}

init();

</script>

</body>
</html>
