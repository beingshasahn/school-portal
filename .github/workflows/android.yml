name: Build APK

on:
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v4


    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 20


    - name: Install packages
      run: npm install


    - name: Install Capacitor Android
      run: |
        npm install @capacitor/android@6.2.0
        npx cap add android


    - name: Build APK
      run: |
        npx cap copy
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug


    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: school-app-apk
        path: android/app/build/outputs/apk/debug/*.apk
