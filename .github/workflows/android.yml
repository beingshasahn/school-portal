name: Build APK

on:
  workflow_dispatch:

jobs:

 build:

  runs-on: ubuntu-latest

  steps:

  - name: Checkout
    uses: actions/checkout@v4


  - name: Setup Node
    uses: actions/setup-node@v4
    with:
      node-version: 20


  - name: Install
    run: npm install


  - name: Add Android
    run: |
      npx cap add android || true
      npx cap copy


  - name: Build APK
    run: |
      cd android
      chmod +x gradlew
      ./gradlew assembleDebug


  - name: Upload APK
    uses: actions/upload-artifact@v4
    with:
      name: school-app
      path: android/app/build/outputs/apk/debug/*.apk
