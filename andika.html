<style>
:root{--primary:#047857;--primary-light:#10B981;--primary-dark:#065F46;--accent:#D97706;--accent-light:#F59E0B;--sidebar:#0F172A;--sidebar-hover:#1E293B;--bg:#F1F5F9;--card:#fff;--text:#0F172A;--muted:#64748B;--border:#E2E8F0;--danger:#DC2626;--success:#16A34A;--warning:#F59E0B}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Outfit',sans-serif}
body{background:var(--bg);color:var(--text);overflow-x:hidden}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:3px}
/* Login */
.login-bg{min-height:100vh;background:linear-gradient(135deg,#0F172A 0%,#065F46 50%,#0F172A 100%);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.login-bg::before{content:'';position:absolute;width:600px;height:600px;background:radial-gradient(circle,rgba(16,185,129,.15),transparent 70%);top:-100px;right:-100px;animation:floatBlob 8s ease-in-out infinite}
.login-bg::after{content:'';position:absolute;width:400px;height:400px;background:radial-gradient(circle,rgba(217,119,6,.1),transparent 70%);bottom:-50px;left:-50px;animation:floatBlob 10s ease-in-out infinite reverse}
@keyframes floatBlob{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(30px,-20px) scale(1.1)}}
.login-card{background:rgba(255,255,255,.05);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:48px;width:420px;max-width:92vw;position:relative;z-index:2}
.login-card input{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:14px 16px;color:#fff;width:100%;font-size:15px;transition:.3s}
.login-card input:focus{outline:none;border-color:var(--primary-light);background:rgba(255,255,255,.12);box-shadow:0 0 0 3px rgba(16,185,129,.2)}
.login-card input::placeholder{color:rgba(255,255,255,.4)}
.btn-primary{background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff;border:none;padding:14px 28px;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;transition:.3s;display:inline-flex;align-items:center;gap:8px}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 8px 25px rgba(4,120,87,.35)}
.btn-secondary{background:var(--bg);color:var(--text);border:1px solid var(--border);padding:10px 20px;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;transition:.2s}
.btn-secondary:hover{background:#E2E8F0}
.btn-danger{background:var(--danger);color:#fff;border:none;padding:10px 20px;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;transition:.2s}
.btn-danger:hover{background:#B91C1C}
.btn-accent{background:var(--accent);color:#fff;border:none;padding:10px 20px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:.2s}
.btn-accent:hover{background:#B45309}
.btn-sm{padding:6px 14px;font-size:13px;border-radius:6px}
/* Layout */
.app-layout{display:flex;min-height:100vh}
.sidebar{width:260px;background:var(--sidebar);color:#fff;display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:40;transition:transform .3s}
.sidebar-header{padding:24px 20px;border-bottom:1px solid rgba(255,255,255,.08)}
.sidebar-nav{flex:1;padding:12px 10px;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:10px;color:rgba(255,255,255,.6);cursor:pointer;transition:.2s;font-size:14px;font-weight:500;margin-bottom:2px}
.nav-item:hover{background:var(--sidebar-hover);color:rgba(255,255,255,.9)}
.nav-item.active{background:linear-gradient(135deg,rgba(16,185,129,.2),rgba(16,185,129,.08));color:var(--primary-light);border:1px solid rgba(16,185,129,.2)}
.nav-item i{width:20px;text-align:center;font-size:15px}
.main-content{margin-left:260px;flex:1;min-height:100vh}
.topbar{background:var(--card);border-bottom:1px solid var(--border);padding:16px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:30}
.page-content{padding:28px 32px}
/* Cards */
.stat-card{background:var(--card);border-radius:14px;padding:24px;border:1px solid var(--border);transition:.3s;position:relative;overflow:hidden}
.stat-card:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,0,0,.08)}
.stat-card::after{content:'';position:absolute;top:0;right:0;width:80px;height:80px;border-radius:0 0 0 80px;opacity:.08}
.card{background:var(--card);border-radius:14px;border:1px solid var(--border);overflow:hidden}
.card-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-body{padding:24px}
/* Tables */
.data-table{width:100%;border-collapse:collapse}
.data-table th{text-align:left;padding:12px 16px;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);border-bottom:1px solid var(--border);background:#F8FAFC}
.data-table td{padding:14px 16px;border-bottom:1px solid var(--border);font-size:14px;vertical-align:middle}
.data-table tr:hover td{background:#F8FAFC}
.data-table tr:last-child td{border-bottom:none}
/* Badge */
.badge{display:inline-flex;align-items:center;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600}
.badge-green{background:#DCFCE7;color:#166534}.badge-amber{background:#FEF3C7;color:#92400E}
.badge-red{background:#FEE2E2;color:#991B1B}.badge-blue{background:#DBEAFE;color:#1E40AF}
.badge-gray{background:#F1F5F9;color:#475569}
/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:.3s}
.modal-overlay.show{opacity:1;pointer-events:all}
.modal-box{background:var(--card);border-radius:16px;width:520px;max-width:92vw;max-height:85vh;overflow-y:auto;transform:translateY(20px);transition:.3s}
.modal-overlay.show .modal-box{transform:translateY(0)}
.modal-header{padding:24px 24px 0;display:flex;align-items:center;justify-content:space-between}
.modal-body{padding:20px 24px}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:8px;font-size:14px;font-family:'Outfit';transition:.2s;background:#fff}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--primary-light);box-shadow:0 0 0 3px rgba(16,185,129,.15)}
.form-group textarea{resize:vertical;min-height:80px}
/* Toast */
.toast-container{position:fixed;top:20px;right:20px;z-index:200;display:flex;flex-direction:column;gap:8px}
.toast{padding:14px 20px;border-radius:10px;color:#fff;font-size:14px;font-weight:500;display:flex;align-items:center;gap:10px;animation:slideIn .3s ease;min-width:280px;box-shadow:0 8px 30px rgba(0,0,0,.15)}
.toast-success{background:var(--success)}.toast-error{background:var(--danger)}.toast-info{background:#0284C7}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(15px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .4s ease both}
.fade-up-1{animation-delay:.05s}.fade-up-2{animation-delay:.1s}.fade-up-3{animation-delay:.15s}.fade-up-4{animation-delay:.2s}.fade-up-5{animation-delay:.25s}.fade-up-6{animation-delay:.3s}
/* Bar chart */
.bar-chart{display:flex;align-items:flex-end;gap:12px;height:180px;padding-top:10px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px}
.bar{width:100%;border-radius:6px 6px 0 0;transition:.5s;min-height:4px}
.bar-label{font-size:11px;color:var(--muted);text-align:center;font-weight:500}
.bar-value{font-size:12px;font-weight:700;color:var(--text)}
/* Timetable grid */
.tt-grid{display:grid;grid-template-columns:100px repeat(7,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.tt-cell{background:var(--card);padding:8px;font-size:12px;min-height:48px;display:flex;align-items:center;justify-content:center;text-align:center}
.tt-header{background:#F8FAFC;font-weight:600;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.3px}
.tt-cell.has-class{background:#ECFDF5;border:1px solid #A7F3D0;cursor:pointer;border-radius:0;flex-direction:column;gap:2px}
.tt-cell.has-class:hover{background:#D1FAE5}
.tt-cell.break-cell{background:#FEF3C7;color:#92400E;font-weight:600;font-size:11px}
/* Publish toggle */
.toggle{width:44px;height:24px;border-radius:12px;background:#CBD5E1;position:relative;cursor:pointer;transition:.3s;border:none}
.toggle.on{background:var(--primary-light)}
.toggle::after{content:'';position:absolute;width:20px;height:20px;border-radius:50%;background:#fff;top:2px;left:2px;transition:.3s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle.on::after{left:22px}
/* Mobile */
.mobile-toggle{display:none;background:none;border:none;color:var(--text);font-size:20px;cursor:pointer}
@media(max-width:768px){
.sidebar{transform:translateX(-100%)}
.sidebar.open{transform:translateX(0)}
.main-content{margin-left:0}
.mobile-toggle{display:block}
.page-content{padding:16px}
.topbar{padding:12px 16px}
.tt-grid{font-size:10px;grid-template-columns:60px repeat(7,1fr)}
}
/* Avatar */
.avatar{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#fff;flex-shrink:0}
.avatar-lg{width:56px;height:56px;font-size:20px;border-radius:14px}
/* Notice card */
.notice-card{border-left:4px solid var(--primary);padding:20px 24px;background:var(--card);border-radius:0 12px 12px 0;margin-bottom:12px;border:1px solid var(--border);border-left:4px solid var(--primary);transition:.2s}
.notice-card:hover{box-shadow:0 4px 15px rgba(0,0,0,.06)}
/* Empty state */
.empty-state{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-state i{font-size:48px;margin-bottom:16px;opacity:.3}
/* Results marks input */
.marks-input{width:70px;padding:8px;text-align:center;border:1px solid var(--border);border-radius:6px;font-size:14px;font-weight:600}
.marks-input:focus{outline:none;border-color:var(--primary-light);box-shadow:0 0 0 3px rgba(16,185,129,.15)}
</style>
</head>

let S;
try {

} catch(e){ S = JSON.parse(JSON.stringify(DEFAULT_STATE)); }

function saveState(){ try{ localStorage.setItem('andika_state', JSON.stringify(S)); }catch(e){} }

/* ==============================
   UTILITIES
   ============================== */
function getUser(id){ return S.users.find(u=>u.id===id); }
function getClass(id){ return S.classes.find(c=>c.id===id); }
function getSubject(id){ return S.subjects.find(s=>s.id===id); }
function getStudent(id){ return S.students.find(s=>s.id===id); }
function initials(name){ return name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2); }
function roleLabel(r){ return {admin:'Administrator',headteacher:'Head Teacher',academic:'Academic Director',teacher:'Teacher'}[r]||r; }
function roleBadge(r){ const c={admin:'badge-red',headteacher:'badge-amber',academic:'badge-blue',teacher:'badge-green'}; return `<span class="badge ${c[r]||'badge-gray'}">${roleLabel(r)}</span>`; }
function gradeMarks(m){ if(m>=80)return'A';if(m>=70)return'B';if(m>=60)return'C';if(m>=50)return'D';return'E'; }
function gradeColor(g){ return {A:'#16A34A',B:'#059669',C:'#D97706',D:'#DC2626',E:'#991B1B'}[g]||'#64748B'; }
function formatDate(d){ if(!d)return''; const dt=new Date(d); return dt.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}); }

/* ==============================
   TOAST
   ============================== */
function toast(msg, type='success'){
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  const icons = {success:'fa-check-circle',error:'fa-times-circle',info:'fa-info-circle'};
  el.innerHTML = `<i class="fas ${icons[type]||icons.info}"></i><span>${msg}</span>`;
  document.getElementById('toast-root').appendChild(el);
  setTimeout(()=>{ el.style.opacity='0'; el.style.transform='translateX(100%)'; el.style.transition='.3s'; setTimeout(()=>el.remove(),300); },3000);
}

function openModal(title, bodyHTML, footerHTML=''){
  const root = document.getElementById('modal-root');
  root.innerHTML = `
    <div class="modal-overlay" id="modal-overlay">
      <div class="modal-box">
        <div class="modal-header">
          <h3 style="font-size:18px;font-weight:700">${title}</h3>
          <button onclick="closeModal()" style="background:none;border:none;font-size:20px;color:var(--muted);cursor:pointer;padding:4px"><i class="fas fa-times"></i></button>
        </div>
        <div class="modal-body">${bodyHTML}</div>
        ${footerHTML?`<div class="modal-footer">${footerHTML}</div>`:''}
      </div>
    </div>`;
  setTimeout(()=>document.getElementById('modal-overlay').classList.add('show'),10);
}
function closeModal(){ document.getElementById('modal-root').innerHTML=''; }

/* ==============================
   AUTH
   ============================== */
function login(email, password){
  const user = S.users.find(u=>u.email===email && u.password===password);
  if(!user) return false;
  S.currentUser = user;
  S.currentPage = 'dashboard';
  saveState();
  render();
  return true;
}
function logout(){
  S.currentUser = null;
  S.currentPage = 'dashboard';
  saveState();
  render();
}

/* ==============================

   ============================== */
function renderDashboard(el){
  const u = S.currentUser;
  const role = u.role;
  const teacherCount = S.users.filter(x=>x.role==='teacher').length;
  const studentCount = S.students.length;
  const classCount = S.classes.length;
  const subjectCount = S.subjects.length;
  const publishedResults = S.results.filter(r=>r.published).length;
  const draftResults = S.results.filter(r=>!r.published).length;
  const notices = S.announcements.length;

  let cards = '';
  if(role==='admin'){
    cards = `
      ${statCard('fa-chalkboard-user','Teachers',teacherCount,'--primary',1)}
      ${statCard('fa-user-graduate','Students',studentCount,'--accent',2)}
      ${statCard('fa-school','Classes',classCount,'#7C3AED',3)}
      ${statCard('fa-book','Subjects',subjectCount,'#0284C7',4)}
      ${statCard('fa-file-circle-check','Published Results',publishedResults,'--success',5)}
      ${statCard('fa-file-pen','Draft Results',draftResults,'--warning',6)}`;
  } else if(role==='teacher'){
    const mySubjects = (u.subjectIds||[]).map(getSubject).filter(Boolean);
    const myClass = u.classTeacherId ? getClass(u.classTeacherId) : null;
    cards = `
      ${statCard('fa-book','My Subjects',mySubjects.length,'--primary',1)}

   ============================== */
function renderTimetable(el){
  const u = S.currentUser;
  const isAdmin = u.role==='admin';
  const days = ['Monday','Tuesday','Wednesday','Thursday','Friday'];
  const periods = [1,2,3,4,5,6,7];
  const periodLabels = {1:'8:00-8:40',2:'8:40-9:20',3:'9:20-10:00',4:'10:00-10:40',5:'BREAK',6:'11:00-11:40',7:'11:40-12:20'};

  /* Determine which classes to show */
  let classIds;
  if(u.role==='teacher'){
    /* Show classes where this teacher teaches */
    const myTT = S.timetable.filter(t=>t.teacherId===u.id);
    classIds = [...new Set(myTT.map(t=>t.classId))];
    if(classIds.length===0) classIds = S.classes.map(c=>c.id);
  } else {
    classIds = S.classes.map(c=>c.id);
  }

  let html = `<div style="margin-bottom:16px;display:flex;flex-wrap:wrap;gap:8px;align-items:center">
    <span style="font-weight:600;font-size:14px;margin-right:8px">Select Class:</span>
    ${classIds.map((cid,i)=>`<button class="btn-sm ${i===0?'btn-primary':'btn-secondary'} tt-class-btn" data-class-id="${cid}">${getClass(cid).name}</button>`).join('')}
  </div>`;

  classIds.forEach((cid,ci)=>{
    const cls = getClass(cid);
    let grid = `<div class="tt-grid tt-class-grid" data-grid-class="${cid}" style="${ci>0?'display:none':''}">
      <div class="tt-cell tt-header">Day / Time</div>
      ${periods.map(p=>`<div class="tt-cell tt-header">${p===5?'BREAK':`P${p}<br><span style="font-size:9px;font-weight:400">${periodLabels[p]}</span>`}</div>`).join('')}`;
    days.forEach(day=>{
      grid += `<div class="tt-cell tt-header" style="font-weight:600;color:var(--text);font-size:12px">${day}</div>`;
      periods.forEach(p=>{
        if(p===5){ grid += `<div class="tt-cell break-cell">TEA BREAK</div>`; return; }
        const entry = S.timetable.find(t=>t.classId===cid && t.day===day && t.period===p);
        if(entry){
          const subj = getSubject(entry.subjectId);
          const tchr = getUser(entry.teacherId);
          grid += `<div class="tt-cell has-class" ${isAdmin?`data-action="edit-tt" data-tt-id="${entry.id}" data-class-id="${cid}" data-day="${day}" data-period="${p}"`:''}>
            <span style="font-weight:700;font-size:11px;color:var(--primary)">${subj?subj.code:'?'}</span>
            <span style="font-size:10px;color:var(--muted)">${tchr?tchr.name.split(' ')[0]:''}</span>
          </div>`;
        } else {
          grid += `<div class="tt-cell" ${isAdmin?`data-action="edit-tt" data-class-id="${cid}" data-day="${day}" data-period="${p}" style="cursor:pointer;opacity:.4"`:''}>—</div>`;
        }
      });
    });
    grid += '</div>';
    html += grid;
  });

  el.innerHTML = `<div class="card fade-up">
    <div class="card-header">
      <h3 style="font-size:16px;font-weight:700">Weekly Timetable</h3>
      ${isAdmin?'<span style="font-size:12px;color:var(--muted)"><i class="fas fa-info-circle"></i> Click any cell to edit</span>':''}
    </div>
    <div class="card-body" style="overflow-x:auto">${html}</div>
  </div>`;
}

function buildResultsTable(term, classId, subjectId, isAdmin, isTeacher){
  const students = S.students.filter(s=>s.classId==classId);
  if(students.length===0) return '<div class="empty-state"><i class="fas fa-user-graduate"></i><p>No students in this class</p></div>';

  let results = S.results.filter(r=>r.term===term && students.some(s=>s.id===r.studentId));
  if(subjectId) results = results.filter(r=>r.subjectId==subjectId);
  if(!isAdmin && !isTeacher) results = results.filter(r=>r.published);
  if(isTeacher && !isAdmin) results = results.filter(r=>r.published || (u_subjectCheck(S.currentUser, r)));

  /* If no subject filter, show summary per student */
  if(!subjectId){
    const subjectsInClass = [...new Set(results.map(r=>r.subjectId))].map(getSubject).filter(Boolean);
    let headerCols = subjectsInClass.map(s=>`<th>${s.code}<br><span style="font-weight:400;font-size:10px">${s.name}</span></th>`).join('');
    headerCols += '<th>Total</th><th>Mean</th><th>Grade</th>';

    let rows = students.map(st=>{
      const stResults = results.filter(r=>r.studentId===st.id);
      let cells = subjectsInClass.map(s=>{
        const r = stResults.find(x=>x.subjectId===s.id);
        if(!r) return `<td style="color:var(--muted)">—</td>`;
        if(!r.published && !isAdmin) return `<td style="color:var(--muted)">—</td>`;
        return `<td style="font-weight:600">${isAdmin&&!r.published?`<span style="opacity:.5">${r.marks}</span> <i class="fas fa-eye-slash" style="font-size:9px;color:var(--warning)"></i>`:r.marks}</td>`;
      }).join('');
      const total = stResults.reduce((a,r)=>a+(r.published||isAdmin?r.marks:0),0);
      const count = stResults.filter(r=>r.published||isAdmin).length;
      const mean = count>0?(total/count).toFixed(1):'—';
      const grade = count>0?gradeMarks(total/count):'—';
      return `<tr><td style="font-weight:600">${st.name}</td>${cells}<td style="font-weight:700">${total||'—'}</td><td style="font-weight:600">${mean}</td><td><span style="color:${gradeColor(grade)};font-weight:800">${grade}</span></td></tr>`;
    }).join('');

    return `<div style="overflow-x:auto"><table class="data-table"><thead><tr><th>Student</th>${headerCols}</tr></thead><tbody>${rows}</tbody></table></div>`;
  } else {
    /* Single subject view */
    let rows = students.map(st=>{
      const r = results.find(x=>x.studentId===st.id && x.subjectId==subjectId);
      const marks = r?r.marks:null;
      const grade = marks!==null?gradeMarks(marks):'—';
      return `<tr>
        <td style="font-weight:600">${st.name}</td>
        <td style="font-weight:700;font-size:16px;color:${gradeColor(grade)}">${marks!==null?(isAdmin&&!r.published?`<span style="opacity:.5">${marks}</span>`:marks):'—'}</td>
        <td><span style="color:${gradeColor(grade)};font-weight:800;font-size:15px">${grade}</span></td>
        ${isAdmin?`<td><button class="toggle ${r&&r.published?'on':''}" data-action="toggle-publish" data-rid="${r?r.id:''}" data-sid="${st.id}" data-subj="${subjectId}" data-term="${term}"></button></td>`:''}
      </tr>`;
    }).join('');
    if(isAdmin) return `<div style="overflow-x:auto"><table class="data-table"><thead><tr><th>Student</th><th>Marks</th><th>Grade</th><th>Published</th></tr></thead><tbody>${rows}</tbody></table></div>`;
    return `<div style="overflow-x:auto"><table class="data-table"><thead><tr><th>Student</th><th>Marks</th><th>Grade</th></tr></thead><tbody>${rows}</tbody></table></div>`;
  }
}

function u_subjectCheck(user, result){
  if(!user.subjectIds) return false;
  return user.subjectIds.includes(result.subjectId);
}

/* ==============================
   REPORTS PAGE
   ============================== */
function renderReports(el){
  const published = S.results.filter(r=>r.published);
  const students = S.students;

  /* Overall stats */
  const totalEntries = published.length;
  const allMarks = published.map(r=>r.marks);
  const avgMark = totalEntries>0?(allMarks.reduce((a,b)=>a+b,0)/totalEntries).toFixed(1):0;
  const highest = totalEntries>0?Math.max(...allMarks):0;
  const lowest = totalEntries>0?Math.min(...allMarks):0;

  /* Subject averages */
  const subjAvgs = S.subjects.map(s=>{
    const marks = published.filter(r=>r.subjectId===s.id).map(r=>r.marks);
    return {name:s.code, full:s.name, avg:marks.length>0?(marks.reduce((a,b)=>a+b,0)/marks.length).toFixed(1):0, count:marks.length};
  }).filter(s=>s.count>0);

  /* Class averages */
  const classAvgs = S.classes.map(c=>{
    const stIds = students.filter(s=>s.classId===c.id).map(s=>s.id);
    const marks = published.filter(r=>stIds.includes(r.studentId)).map(r=>r.marks);
    return {name:c.name, avg:marks.length>0?(marks.reduce((a,b)=>a+b,0)/marks.length).toFixed(1):0, count:marks.length};
  });

  /* Top students */
  const studentTotals = students.map(st=>{
    const marks = published.filter(r=>r.studentId===st.id).map(r=>r.marks);
    const total = marks.reduce((a,b)=>a+b,0);
    const mean = marks.length>0?total/marks.length:0;
    return {name:st.name, class:getClass(st.classId)?.name||'', total, mean:mean.toFixed(1), count:marks.length};
  }).filter(s=>s.count>0).sort((a,b)=>b.mean-a.mean).slice(0,10);

  /* Grade distribution */
  const grades = {A:0,B:0,C:0,D:0,E:0};
  published.forEach(r=>{ grades[gradeMarks(r.marks)]++; });

  const maxBar = Math.max(...subjAvgs.map(s=>parseFloat(s.avg)),1);

  el.innerHTML = `
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;margin-bottom:24px">
      ${statCard('fa-chart-line','Average Score',avgMark,'--primary',1)}
      ${statCard('fa-arrow-up','Highest Score',highest,'--success',2)}
      ${statCard('fa-arrow-down','Lowest Score',lowest,'--danger',3)}
      ${statCard('fa-database','Total Entries',totalEntries,'--accent',4)}
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px">
      <div class="card fade-up-2">
        <div class="card-header"><h3 style="font-size:15px;font-weight:700">Subject Performance</h3></div>
        <div class="card-body">
          <div class="bar-chart">${subjAvgs.map(s=>`<div class="bar-col">
            <div class="bar-value">${s.avg}</div>
            <div class="bar" style="height:${(parseFloat(s.avg)/maxBar)*150}px;background:linear-gradient(180deg,var(--primary),var(--primary-light))"></div>
            <div class="bar-label">${s.name}</div>
          </div>`).join('')}</div>
        </div>
      </div>
      <div class="card fade-up-3">
        <div class="card-header"><h3 style="font-size:15px;font-weight:700">Grade Distribution</h3></div>
        <div class="card-body">
          <div style="display:flex;flex-direction:column;gap:12px;margin-top:10px">
            ${Object.entries(grades).map(([g,count])=>{
              const pct = totalEntries>0?((count/totalEntries)*100).toFixed(0):0;
              return `<div>
                <div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-weight:700;color:${gradeColor(g)};font-size:14px">Grade ${g}</span><span style="font-size:13px;color:var(--muted)">${count} students (${pct}%)</span></div>
                <div style="height:10px;background:var(--bg);border-radius:5px;overflow:hidden"><div style="height:100%;width:${pct}%;background:${gradeColor(g)};border-radius:5px;transition:.5s"></div></div>
              </div>`;
            }).join('')}
          </div>
        </div>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
      <div class="card fade-up-4">
        <div class="card-header"><h3 style="font-size:15px;font-weight:700">Class Averages</h3></div>
        <div style="overflow-x:auto">
          <table class="data-table"><thead><tr><th>Class</th><th>Average</th><th>Entries</th></tr></thead>
          <tbody>${classAvgs.map(c=>`<tr><td style="font-weight:600">${c.name}</td><td style="font-weight:700;color:var(--primary)">${c.avg}</td><td>${c.count}</td></tr>`).join('')}</tbody></table>
        </div>
      </div>
      <div class="card fade-up-5">
        <div class="card-header"><h3 style="font-size:15px;font-weight:700">Top 10 Students</h3></div>
        <div style="overflow-x:auto">
          <table class="data-table"><thead><tr><th>#</th><th>Student</th><th>Class</th><th>Mean</th><th>Grade</th></tr></thead>
          <tbody>${studentTotals.map((s,i)=>`<tr><td style="font-weight:700;color:${i<3?'var(--accent)':'var(--muted)'}">${i+1}</td><td style="font-weight:600">${s.name}</td><td><span class="badge badge-amber">${s.class}</span></td><td style="font-weight:700">${s.mean}</td><td><span style="color:${gradeColor(gradeMarks(parseFloat(s.mean)))};font-weight:800">${gradeMarks(parseFloat(s.mean))}</span></td></tr>`).join('')}</tbody></table>
        </div>
      </div>
    </div>`;
}

/* ==============================
   EVENT DELEGATION
   ============================== */
document.addEventListener('click', function(e){
  const btn = e.target.closest('[data-action]');
  if(!btn) {
    /* Nav items */
    const nav = e.target.closest('[data-page]');
    if(nav){ navigate(nav.dataset.page); document.getElementById('sidebar')?.classList.remove('open'); }
    /* Timetable class tabs */
    const ttBtn = e.target.closest('.tt-class-btn');
    if(ttBtn){
      const cid = ttBtn.dataset.classId;
      ttBtn.parentElement.querySelectorAll('.tt-class-btn').forEach(b=>{b.className='btn-sm btn-secondary tt-class-btn';});
      ttBtn.className='btn-sm btn-primary tt-class-btn';
      document.querySelectorAll('.tt-class-grid').forEach(g=>{g.style.display=g.dataset.gridClass===cid?'':'none';});
    }
    return;
  }
  const action = btn.dataset.action;
  const id = parseInt(btn.dataset.id);

  switch(action){
    case 'logout': logout(); break;
    case 'reset-data':
      if(confirm('Reset all data to demo defaults? This cannot be undone.')){ resetState(); toast('Data reset to defaults','info'); }
      break;

    /* === ADMIN: ADD TEACHER === */
    case 'open-add-teacher': openTeacherForm(); break;
    case 'edit-teacher': openTeacherForm(id); break;
    case 'delete-teacher':
      if(confirm('Remove this staff member?')){
        S.users = S.users.filter(u=>u.id!==id);
        saveState(); renderContent(); toast('Staff member removed');
      } break;

    /* === ADMIN: ADD SUBJECT === */
    case 'open-add-subject': openSubjectForm(); break;
    case 'edit-subject': openSubjectForm(id); break;
    case 'delete-subject':
      if(confirm('Delete this subject?')){
        S.subjects = S.subjects.filter(s=>s.id!==id);
        saveState(); renderContent(); toast('Subject deleted');
      } break;

    /* === ADMIN: ADD CLASS === */
    case 'open-add-class': openClassForm(); break;
    case 'edit-class': openClassForm(id); break;
    case 'delete-class':
      if(confirm('Delete this class? Students will become unassigned.')){
        S.classes = S.classes.filter(c=>c.id!==id);
        S.students.forEach(s=>{if(s.classId===id)s.classId=null;});
        saveState(); renderContent(); toast('Class deleted');
      } break;
    case 'assign-class-teacher': openAssignCT(id); break;

    /* === ADMIN: ADD STUDENT === */
    case 'open-add-student': openStudentForm(); break;
    case 'edit-student': openStudentForm(id); break;
    case 'delete-student':
      if(confirm('Delete this student? All their results will be removed.')){
        S.students = S.students.filter(s=>s.id!==id);
        S.results = S.results.filter(r=>r.studentId!==id);
        saveState(); renderContent(); toast('Student deleted');
      } break;

    /* === TIMETABLE EDIT === */
    case 'edit-tt': openTTForm(btn.dataset); break;

    /* === RESULTS === */
    case 'filter-results': filterResults(); break;
    case 'toggle-publish': togglePublish(btn); break;
    case 'bulk-publish': bulkPublish(); break;
    case 'open-enter-marks': openEnterMarks(); break;

    /* === ANNOUNCEMENTS === */
    case 'open-post-announcement': openAnnouncementForm(); break;
    case 'delete-announcement':
      if(confirm('Delete this announcement?')){
        S.announcements = S.announcements.filter(a=>a.id!==id);
        saveState(); renderContent(); toast('Announcement deleted');
      } break;
  }
});

function saveTeacher(editId){
  const name = document.getElementById('f-name').value.trim();
  const email = document.getElementById('f-email').value.trim();
  const pw = document.getElementById('f-pw').value;
  const phone = document.getElementById('f-phone').value.trim();
  const role = document.getElementById('f-role').value;
  const subjectIds = [...document.querySelectorAll('.f-subj:checked')].map(c=>parseInt(c.value));
  if(!name||!email){ toast('Name and email are required','error'); return; }
  if(editId){
    const u = getUser(editId);
    Object.assign(u, {name,email,phone,role,subjectIds});
    if(pw) u.password = pw;
    toast('Staff member updated');
  } else {
    if(!pw){ toast('Password is required','error'); return; }
    S.users.push({id:S.nextId.users++,name,email,password:pw,role,phone,subjectIds,classTeacherId:null});
    toast('Staff member added');
  }
  saveState(); closeModal(); renderContent();
}

function openTTForm(data){
  const ttId = data.ttId ? parseInt(data.ttId) : null;
  const classId = parseInt(data.classId);
  const day = data.day;
  const period = parseInt(data.period);
  const existing = ttId ? S.timetable.find(t=>t.id===ttId) : null;
  const cls = getClass(classId);
  const body = `
    <div style="margin-bottom:16px;padding:12px;background:var(--bg);border-radius:8px;font-size:13px">
      <strong>${cls.name}</strong> &mdash; ${day} &mdash; Period ${period}
    </div>
    <div class="form-group"><label>Subject</label><select id="f-tt-subj">
      <option value="">-- Free Period --</option>
      ${S.subjects.map(s=>`<option value="${s.id}" ${existing&&existing.subjectId===s.id?'selected':''}>${s.code} - ${s.name}</option>`).join('')}
    </select></div>
    <div class="form-group"><label>Teacher</label><select id="f-tt-teacher">
      <option value="">-- None --</option>
      ${S.users.filter(u=>u.role==='teacher').map(t=>`<option value="${t.id}" ${existing&&existing.teacherId===t.id?'selected':''}>${t.name}</option>`).join('')}
    </select></div>`;
  const footer = `<button class="btn-secondary" onclick="closeModal()">Cancel</button>
    ${existing?`<button class="btn-danger" onclick="deleteTT(${ttId})">Remove</button>`:''}
    <button class="btn-primary" onclick="saveTT(${ttId||'null'},${classId},'${day}',${period})">Save</button>`;
  openModal('Edit Timetable Slot', body, footer);
}

function saveTT(ttId, classId, day, period){
  const subjId = parseInt(document.getElementById('f-tt-subj').value)||null;
  const teacherId = parseInt(document.getElementById('f-tt-teacher').value)||null;
  if(!subjId){
    /* Remove the slot */
    if(ttId) S.timetable = S.timetable.filter(t=>t.id!==ttId);
  } else if(ttId){
    const t = S.timetable.find(x=>x.id===ttId);
    if(t){ t.subjectId=subjId; t.teacherId=teacherId; }
  } else {
    S.timetable.push({id:S.nextId.timetable++,classId,day,period,subjectId:subjId,teacherId});
  }
  saveState(); closeModal(); renderContent(); toast('Timetable updated');
}

function deleteTT(ttId){
  S.timetable = S.timetable.filter(t=>t.id!==ttId);
  saveState(); closeModal(); renderContent(); toast('Slot removed');
}

/* === RESULTS === */
function filterResults(){
  const term = document.getElementById('res-term').value;
  const classId = parseInt(document.getElementById('res-class').value);
  const subjEl = document.getElementById('res-subject');
  const subjectId = subjEl ? parseInt(subjEl.value) : null;
  const isAdmin = S.currentUser.role==='admin';
  const isTeacher = S.currentUser.role==='teacher';
  document.getElementById('results-table-area').innerHTML = buildResultsTable(term, classId, subjectId, isAdmin, isTeacher);
}

function togglePublish(btn){
  const rid = parseInt(btn.dataset.rid);
  if(rid){
    const r = S.results.find(x=>x.id===rid);
    if(r){ r.published = !r.published; saveState(); }
  } else {
    /* Create result entry then toggle */
    const sid = parseInt(btn.dataset.sid);
    const subj = parseInt(btn.dataset.subj);
    const term = btn.dataset.term;
    let r = S.results.find(x=>x.studentId===sid&&x.subjectId===subj&&x.term===term);
    if(r){ r.published = !r.published; saveState(); }
  }
  /* Re-render just the toggle */
  btn.classList.toggle('on');
  toast(btn.classList.contains('on')?'Result published':'Result unpublished','info');
}

function bulkPublish(){
  const term = document.getElementById('res-term').value;
  const classId = parseInt(document.getElementById('res-class').value);
  const students = S.students.filter(s=>s.classId===classId);
  let count = 0;
  S.results.forEach(r=>{
    if(r.term===term && students.some(s=>s.id===r.studentId) && !r.published){ r.published=true; count++; }
  });
  saveState(); renderContent(); toast(`${count} results published`);
}

function openEnterMarks(){
  const term = document.getElementById('res-term').value;
  const classId = parseInt(document.getElementById('res-class').value);
  const subjectId = parseInt(document.getElementById('res-subject').value);
  const students = S.students.filter(s=>s.classId===classId);
  const subj = getSubject(subjectId);
  const body = `<p style="font-size:13px;color:var(--muted);margin-bottom:16px">Enter marks out of 100 for each student in <strong>${subj?subj.name:''}</strong> — ${term}</p>
    <div style="max-height:400px;overflow-y:auto">
    ${students.map(s=>{
      const existing = S.results.find(r=>r.studentId===s.id&&r.subjectId===subjectId&&r.term===term);
      return `<div style="display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--border)">
        <span style="flex:1;font-size:14px;font-weight:500">${s.name}</span>
        <input type="number" class="marks-input enter-mark" data-sid="${s.id}" min="0" max="100" value="${existing?existing.marks:''}" placeholder="—">
      </div>`;
    }).join('')}
    </div>`;
  const footer = `<button class="btn-secondary" onclick="closeModal()">Cancel</button><button class="btn-primary" onclick="saveMarks(${classId},${subjectId},'${term}')"><i class="fas fa-save"></i> Save Marks</button>`;
  openModal(`Enter Marks — ${subj?subj.name:''}`, body, footer);
}

function saveMarks(classId, subjectId, term){
  const inputs = document.querySelectorAll('.enter-mark');
  let count = 0;
  inputs.forEach(inp=>{
    const sid = parseInt(inp.dataset.sid);
    const marks = parseInt(inp.value);
    if(isNaN(marks)||marks<0||marks>100) return;
    let r = S.results.find(x=>x.studentId===sid&&x.subjectId===subjectId&&x.term===term);
    if(r){ r.marks = marks; } else { S.results.push({id:S.nextId.results++,studentId:sid,subjectId,marks,term,published:false}); }
    count++;
  });
  saveState(); closeModal(); renderContent(); toast(`${count} marks saved as draft`);
}

/* === ANNOUNCEMENTS === */
function openAnnouncementForm(){
  const body = `
    <div class="form-group"><label>Title</label><input id="f-antitle" placeholder="Announcement title"></div>
    <div class="form-group"><label>Content</label><textarea id="f-ancontent" rows="5" placeholder="Write the announcement details..."></textarea></div>`;
  const footer = `<button class="btn-secondary" onclick="closeModal()">Cancel</button><button class="btn-primary" onclick="saveAnnouncement()"><i class="fas fa-paper-plane"></i> Publish Announcement</button>`;
  openModal('Post New Announcement', body, footer);
}

function saveAnnouncement(){
  const title = document.getElementById('f-antitle').value.trim();
  const content = document.getElementById('f-ancontent').value.trim();
  if(!title||!content){ toast('Title and content required','error'); return; }
  S.announcements.push({id:S.nextId.announcements++,title,content,date:new Date().toISOString().split('T')[0],authorId:S.currentUser.id});
  saveState(); closeModal(); renderContent(); toast('Announcement published');
}

/* ==============================
   INIT
   ============================== */
render();
</script>
</body>
