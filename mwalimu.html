const AVATAR_COLORS = ['#047857','#7C3AED','#DC2626','#D97706','#0284C7','#DB2777','#059669','#9333EA'];
function avatarColor(id){ return AVATAR_COLORS[id % AVATAR_COLORS.length]; }

const TT_PERIODS = [
  {n:1,time:'08:00-08:40',type:'lesson'},{n:2,time:'08:40-09:20',type:'lesson'},
  {n:3,time:'09:20-10:00',type:'lesson'},{n:4,time:'10:00-10:40',type:'lesson'},
  {n:5,time:'10:40-11:00',type:'break'},{n:6,time:'11:00-11:40',type:'lesson'},
  {n:7,time:'11:40-12:20',type:'lesson'},{n:8,time:'12:20-13:00',type:'lesson'}
];
const TT_DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday'];
const SUBJECT_LOAD = {1:6,2:6,3:5,4:5,5:3,6:2,7:3,8:3,9:2,10:2,11:2,12:1};

function generateTimetable(){
  const entries = [];
  let id = 1;
  S.classes.forEach(cls=>{
    S.days.forEach((day,di)=>{
      const pool = [];
      Object.entries(SUBJECT_LOAD).forEach(([sid,load])=>{
        const sidNum = parseInt(sid);
        for(let i=0;i<load;i++) pool.push(sidNum);
      });
      for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}
      let pi = 0;
      S.periods.forEach(p=>{
        if(p.type==='break') return;
        const subjId = pool[pi % pool.length];
        const teachers = S.users.filter(u=>u.role==='teacher' && (u.subjectIds||[]).includes(subjId));
        const teacher = teachers.length > 0 ? teachers[di % teachers.length] : null;
        let attempts = 0;
        let chosen = subjId;
        const prevEntry = entries.find(e=>e.classId===cls.id && e.day===day && e.period===p.n-1);
        while(prevEntry && prevEntry.subjectId===chosen && attempts<10){
          pi++; chosen = pool[pi % pool.length]; attempts++;
        }
        entries.push({id:id++,classId:cls.id,day,period:p.n,subjectId:chosen,teacherId:teacher?teacher.id:null});
        pi++;
      });
    });
  });
  return entries;
}

/* ============================== UTILITIES ============================== */
function getUser(id){return S.users.find(u=>u.id===id);}
function getClass(id){return S.classes.find(c=>c.id===id);}
function getSubject(id){return S.subjects.find(s=>s.id===id);}
function getStudent(id){return S.students.find(s=>s.id===id);}
function initials(name){return name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);}
function roleLabel(r){return{admin:'Administrator',headteacher:'Head Teacher',academic:'Academic Master',teacher:'Teacher'}[r]||r;}
function roleBadge(r){const c={admin:'badge-red',headteacher:'badge-amber',academic:'badge-blue',teacher:'badge-green'};return`<span class="badge ${c[r]||'badge-gray'}">${roleLabel(r)}</span>`;}
function gradeMarks(m){if(m>=80)return'A';if(m>=70)return'B';if(m>=60)return'C';if(m>=50)return'D';return'E';}
function gradeColor(g){return{A:'#16A34A',B:'#059669',C:'#D97706',D:'#DC2626',E:'#991B1B'}[g]||'#64748B';}
function formatDate(d){if(!d)return'';const dt=new Date(d);return dt.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});}
function getGreeting(){
  const h=new Date().getHours();
  if(h<12)return'Good morning';
  if(h<17)return'Good afternoon';
  return'Good evening';
}
function getGreetingIcon(){
  const h=new Date().getHours();
  if(h<12)return'fa-sun';
  if(h<17)return'fa-cloud-sun';
  return'fa-moon';
}

/* ============================== TOAST ============================== */
function toast(msg,type='success'){
  const el=document.createElement('div');
  el.className=`toast toast-${type}`;
  const icons={success:'fa-check-circle',error:'fa-times-circle',info:'fa-info-circle'};
  el.innerHTML=`<i class="fas ${icons[type]||icons.info}"></i><span>${msg}</span>`;
  document.getElementById('toast-root').appendChild(el);
  setTimeout(()=>{el.style.opacity='0';el.style.transform='translateX(100%)';el.style.transition='.3s';setTimeout(()=>el.remove(),300);},3000);
}

function openModal(title,bodyHTML,footerHTML=''){
  const root=document.getElementById('modal-root');

    <button onclick="closeModal()" style="background:none;border:none;font-size:20px;color:var(--muted);cursor:pointer;padding:4px"><i class="fas fa-times"></i></button></div>
    <div class="modal-body">${bodyHTML}</div>${footerHTML?`<div class="modal-footer">${footerHTML}</div>`:''}
  </div></div>`;
  setTimeout(()=>document.getElementById('modal-overlay').classList.add('show'),10);
}

function login(email,password){
  const user=S.users.find(u=>u.email===email && u.password===password);

  S.currentUser=user; S.currentPage='dashboard'; saveState(); render();
  startGreetingUpdater();
  return true;
}

}

  const classCount=S.classes.length;
  const subjectCount=S.subjects.length;

  const draftResults=S.results.filter(r=>!r.published).length;

  if(role==='admin'){
    cards=`
      ${statCard('fa-chalkboard-user','Teachers',teacherCount,'--primary',1)}

      ${statCard('fa-school','Classes',classCount,'#7C3AED',3)}
      ${statCard('fa-book','Subjects',subjectCount,'#0284C7',4)}

      ${statCard('fa-bullhorn','Notices',notices,'--success',5)}`;
  }else{
    cards=`
      ${statCard('fa-chalkboard-user','Teachers',teacherCount,'--primary',1)}
      ${statCard('fa-user-graduate','Students',studentCount,'--accent',2)}

function countTodayLessons(teacherId){
  const day=new Date().toLocaleDateString('en-GB',{weekday:'long'});
  if(!S.days.includes(day))return 0;
  return S.timetable.filter(t=>t.teacherId===teacherId && t.day===day).length;
}

function statCard(icon,label,value,colorVar,delay){
  return`<div class="stat-card fade-up fade-up-${delay}">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <div style="width:44px;height:44px;border-radius:12px;background:color-mix(in srgb, var(${colorVar}) 12%, transparent);display:flex;align-items:center;justify-content:center">
        <i class="fas ${icon}" style="color:var(${colorVar});font-size:18px"></i>
      </div>
    </div>
    <div style="font-size:28px;font-weight:800;line-height:1">${value}</div>
    <div style="font-size:13px;color:var(--muted);margin-top:4px;font-weight:500">${label}</div>
    <div style="position:absolute;top:0;right:0;width:60px;height:60px;background:var(${colorVar});opacity:.05;border-radius:0 14px 0 60px"></div>
  </div>`;

function renderTimetable(el){

    const myTT=S.timetable.filter(t=>t.teacherId===u.id);

    if(classIds.length===0)classIds=S.classes.map(c=>c.id);
  }else{
    classIds=S.classes.map(c=>c.id);
  }
  const periods=S.periods;
  const colCount=periods.length;
  let html=`<div style="margin-bottom:16px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;justify-content:space-between">
    <div style="display:flex;flex-wrap:wrap;gap:8px;align-items:center">

      ${classIds.map((cid,i)=>`<button class="btn-sm ${i===0?'btn-primary':'btn-secondary'} tt-class-btn" data-class-id="${cid}">${getClass(cid).name}</button>`).join('')}

      <button class="btn-secondary btn-sm" data-action="regen-timetable"><i class="fas fa-rotate"></i> Regenerate</button>
      <button class="btn-primary btn-sm" data-action="add-tt-column"><i class="fas fa-plus"></i> Add Session</button>
    </div>`:''}
  </div>`;

  classIds.forEach((cid,ci)=>{
    const cls=getClass(cid);
    let grid=`<div class="tt-grid tt-class-grid" data-grid-class="${cid}" style="grid-template-columns:100px repeat(${colCount},1fr);${ci>0?'display:none':''}">
      <div class="tt-cell tt-header">Day / Time</div>
      ${periods.map(p=>`<div class="tt-cell tt-header">${p.type==='break'?'BREAK':`P${p.n}<br><span style="font-size:9px;font-weight:400">${p.time}</span>`}</div>`).join('')}`;
    S.days.forEach(day=>{
      grid+=`<div class="tt-cell tt-header" style="font-weight:600;color:var(--text);font-size:12px">${day}</div>`;

        if(p.type==='break'){grid+=`<div class="tt-cell break-cell">TEA BREAK</div>`;return;}
        const entry=S.timetable.find(t=>t.classId===cid && t.day===day && t.period===p.n);
        if(entry){
          const subj=getSubject(entry.subjectId);
          const tchr=getUser(entry.teacherId);
          grid+=`<div class="tt-cell has-class" ${isAdmin?`data-action="edit-tt" data-tt-id="${entry.id}" data-class-id="${cid}" data-day="${day}" data-period="${p.n}"`:''}>

          </div>`;
        }else{
          grid+=`<div class="tt-cell" ${isAdmin?`data-action="edit-tt" data-class-id="${cid}" data-day="${day}" data-period="${p.n}" style="cursor:pointer;opacity:.4"`:''}>—</div>`;
        }
      });
    });
    grid+='</div>';
    html+=grid;
  });

  el.innerHTML=`<div class="card fade-up">
    <div class="card-header">
      <h3 style="font-size:16px;font-weight:700">Weekly Timetable</h3>
      ${isAdmin?'<span style="font-size:12px;color:var(--muted)"><i class="fas fa-info-circle"></i> Click any cell to edit</span>':''}
    </div>

function buildResultsTable(term,classId,isAdmin,isTeacher){
  const students=S.students.filter(s=>s.classId==classId);
  if(students.length===0)return'<div class="empty-state"><i class="fas fa-user-graduate"></i><p>No students in this class</p></div>';
  let results=S.results.filter(r=>r.term===term && students.some(s=>s.id===r.studentId));
  if(!isAdmin && !isTeacher)results=results.filter(r=>r.published);
  if(isTeacher && !isAdmin)results=results.filter(r=>r.published);
  const subjectsInClass=[...new Set(results.map(r=>r.subjectId))].map(getSubject).filter(Boolean);
  if(subjectsInClass.length===0)return'<div class="empty-state"><i class="fas fa-chart-bar"></i><p>No results found for this selection</p></div>';
  let headerCols=subjectsInClass.map(s=>`<th>${s.code}<br><span style="font-weight:400;font-size:10px">${s.name}</span></th>`).join('');
  headerCols+='<th>Total</th><th>Mean</th><th>Grade</th>';
  let rows=students.map(st=>{
    const stResults=results.filter(r=>r.studentId===st.id);
    let cells=subjectsInClass.map(s=>{
      const r=stResults.find(x=>x.subjectId===s.id);
      if(!r)return`<td style="color:var(--muted)">—</td>`;
      if(!r.published && !isAdmin)return`<td style="color:var(--muted)">—</td>`;
      return`<td style="font-weight:600">${isAdmin&&!r.published?`<span style="opacity:.5">${r.marks}</span> <i class="fas fa-eye-slash" style="font-size:9px;color:var(--warning)"></i>`:r.marks}</td>`;
    }).join('');
    const visibleResults=stResults.filter(r=>r.published||isAdmin);
    const total=visibleResults.reduce((a,r)=>a+r.marks,0);
    const count=visibleResults.length;
    const mean=count>0?(total/count).toFixed(1):'—';
    const grade=count>0?gradeMarks(total/count):'—';
    return`<tr><td style="font-weight:600">${st.name}</td>${cells}<td style="font-weight:700">${total||'—'}</td><td style="font-weight:600">${mean}</td><td><span style="color:${gradeColor(grade)};font-weight:800">${grade}</span></td></tr>`;
  }).join('');
  return`<div style="overflow-x:auto"><table class="data-table"><thead><tr><th>Student</th>${headerCols}</tr></thead><tbody>${rows}</tbody></table></div>`;
}

/* ============================== REPORTS ============================== */
function renderReports(el){
  const published=S.results.filter(r=>r.published);
  const students=S.students;
  const totalEntries=published.length;
  const allMarks=published.map(r=>r.marks);
  const avgMark=totalEntries>0?(allMarks.reduce((a,b)=>a+b,0)/totalEntries).toFixed(1):0;
  const highest=totalEntries>0?Math.max(...allMarks):0;
  const lowest=totalEntries>0?Math.min(...allMarks):0;
  const subjAvgs=S.subjects.map(s=>{
    const marks=published.filter(r=>r.subjectId===s.id).map(r=>r.marks);
    return{name:s.code,full:s.name,avg:marks.length>0?(marks.reduce((a,b)=>a+b,0)/marks.length).toFixed(1):0,count:marks.length};
  }).filter(s=>s.count>0);
  const classAvgs=S.classes.map(c=>{
    const stIds=students.filter(s=>s.classId===c.id).map(s=>s.id);
    const marks=published.filter(r=>stIds.includes(r.studentId)).map(r=>r.marks);
    return{name:c.name,avg:marks.length>0?(marks.reduce((a,b)=>a+b,0)/marks.length).toFixed(1):0,count:marks.length};
  });
  const studentTotals=students.map(st=>{
    const marks=published.filter(r=>r.studentId===st.id).map(r=>r.marks);
    const total=marks.reduce((a,b)=>a+b,0);
    const mean=marks.length>0?total/marks.length:0;
    return{name:st.name,cls:getClass(st.classId)?.name||'',total,mean:mean.toFixed(1),count:marks.length};
  }).filter(s=>s.count>0).sort((a,b)=>b.mean-a.mean).slice(0,10);
  const grades={A:0,B:0,C:0,D:0,E:0};
  published.forEach(r=>{grades[gradeMarks(r.marks)]++;});
  const maxBar=Math.max(...subjAvgs.map(s=>parseFloat(s.avg)),1);
  el.innerHTML=`
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;margin-bottom:24px">
      ${statCard('fa-chart-line','Average Score',avgMark,'--primary',1)}
      ${statCard('fa-arrow-up','Highest Score',highest,'--success',2)}
      ${statCard('fa-arrow-down','Lowest Score',lowest,'--danger',3)}
      ${statCard('fa-database','Total Entries',totalEntries,'--accent',4)}
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px" class="fade-up-2">
      <div class="card">
        <div class="card-header"><h3 style="font-size:15px;font-weight:700">Subject Performance</h3></div>
        <div class="card-body">
          <div class="bar-chart">${subjAvgs.map(s=>`<div class="bar-col">
            <div class="bar-value">${s.avg}</div>
            <div class="bar" style="height:${(parseFloat(s.avg)/maxBar)*150}px;background:linear-gradient(180deg,var(--primary),var(--primary-light))"></div>
            <div class="bar-label">${s.name}</div>
          </div>`).join('')}</div>
        </div>
      </div>
      <div class="card fade-up-3">
        <div class="card-header"><h3 style="font-size:15px;font-weight:700">Grade Distribution</h3></div>
        <div class="card-body">
          <div style="display:flex;flex-direction:column;gap:12px;margin-top:10px">
            ${Object.entries(grades).map(([g,count])=>{
              const pct=totalEntries>0?((count/totalEntries)*100).toFixed(0):0;
              return`<div>
                <div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-weight:700;color:${gradeColor(g)};font-size:14px">Grade ${g}</span><span style="font-size:13px;color:var(--muted)">${count} students (${pct}%)</span></div>
                <div style="height:10px;background:var(--bg);border-radius:5px;overflow:hidden"><div style="height:100%;width:${pct}%;background:${gradeColor(g)};border-radius:5px;transition:.5s"></div></div>
              </div>`;
            }).join('')}
          </div>
        </div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
      <div class="card fade-up-4">
        <div class="card-header"><h3 style="font-size:15px;font-weight:700">Class Averages</h3></div>
        <div style="overflow-x:auto"><table class="data-table"><thead><tr><th>Class</th><th>Average</th><th>Entries</th></tr></thead>
        <tbody>${classAvgs.map(c=>`<tr><td style="font-weight:600">${c.name}</td><td style="font-weight:700;color:var(--primary)">${c.avg}</td><td>${c.count}</td></tr>`).join('')}</tbody></table></div>
      </div>
      <div class="card fade-up-5">
        <div class="card-header"><h3 style="font-size:15px;font-weight:700">Top 10 Students</h3></div>
        <div style="overflow-x:auto"><table class="data-table"><thead><tr><th>#</th><th>Student</th><th>Class</th><th>Mean</th><th>Grade</th></tr></thead>
        <tbody>${studentTotals.map((s,i)=>`<tr><td style="font-weight:700;color:${i<3?'var(--accent)':'var(--muted)'}">${i+1}</td><td style="font-weight:600">${s.name}</td><td><span class="badge badge-amber">${s.cls}</span></td><td style="font-weight:700">${s.mean}</td><td><span style="color:${gradeColor(gradeMarks(parseFloat(s.mean)))};font-weight:800">${gradeMarks(parseFloat(s.mean))}</span></td></tr>`).join('')}</tbody></table></div>

}

/* ============================== EXAM SETTINGS (Admin) ============================== */
function renderExamSettings(el){
  if(!hasRole('admin')){el.innerHTML='<div class="card"><div class="card-body"><div class="empty-state"><i class="fas fa-lock"></i><p>Access restricted to administrators only.</p></div></div></div>';return;}
  const settings=S.examSettings;
  const s=settings.default;
  const fonts=['Times New Roman','Arial','Calibri','Cambria','Georgia','Courier New'];
  const sizes=[10,11,12,13,14];
  const aligns=[{v:'left',l:'Left'},{v:'center',l:'Center'},{v:'right',l:'Right'},{v:'justify',l:'Justify'}];
  const indents=[0,0.25,0.5,1,1.5,2];
  const spacings=[1.0,1.15,1.5,2.0];

  const overrides=Object.keys(settings).filter(k=>k!=='default').map(k=>{
    const c=getClass(k);const sc=settings[k];if(!c)return'';
    return`<div style="display:flex;align-items:center;justify-content:space-between;padding:12px;background:var(--bg);border-radius:8px;margin-bottom:8px">
      <div><div style="font-weight:600">${c.name}</div><div style="font-size:12px;color:var(--muted)">${sc.numQuestions} questions • ${sc.fontType} ${sc.fontSize}pt • ${sc.alignment} • indent ${sc.indentation}"</div></div>
      <div style="display:flex;gap:6px"><button class="btn-secondary btn-sm" data-action="edit-class-settings" data-id="${k}">Edit</button><button class="btn-danger btn-sm" data-action="delete-class-settings" data-id="${k}"><i class="fas fa-trash" style="font-size:10px"></i></button></div>
    </div>`;
  }).join('');

  el.innerHTML=`
    <div class="card fade-up" style="margin-bottom:20px">
      <div class="card-header"><h3 style="font-size:16px;font-weight:700"><i class="fas fa-sliders" style="color:var(--primary);margin-right:8px"></i>Default Formatting Rules</h3></div>
      <div class="card-body">
        <p style="font-size:13px;color:var(--muted);margin-bottom:16px">These rules apply to ALL classes unless overridden. Teachers must follow them when setting exams — the PDF output will match these specifications exactly.</p>
        <form id="exam-settings-form">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
            <div class="form-group"><label>Number of Questions</label><input type="number" name="numQuestions" value="${s.numQuestions}" min="1" max="50" required></div>
            <div class="form-group"><label>Exam Title</label><input type="text" name="examTitle" value="${s.examTitle}" required></div>
            <div class="form-group"><label>Time Allowed</label><input type="text" name="timeAllowed" value="${s.timeAllowed}" required></div>
            <div class="form-group"><label>Paper Size</label><select name="paperSize"><option value="A4" ${s.paperSize==='A4'?'selected':''}>A4</option><option value="Letter" ${s.paperSize==='Letter'?'selected':''}>Letter</option></select></div>
            <div class="form-group"><label>Font Type</label><select name="fontType">${fonts.map(f=>`<option value="${f}" ${s.fontType===f?'selected':''}>${f}</option>`).join('')}</select></div>
            <div class="form-group"><label>Font Size (pt)</label><select name="fontSize">${sizes.map(n=>`<option value="${n}" ${s.fontSize===n?'selected':''}>${n}pt</option>`).join('')}</select></div>
            <div class="form-group"><label>Alignment</label><select name="alignment">${aligns.map(a=>`<option value="${a.v}" ${s.alignment===a.v?'selected':''}>${a.l}</option>`).join('')}</select></div>
            <div class="form-group"><label>Indentation (inches)</label><select name="indentation">${indents.map(n=>`<option value="${n}" ${s.indentation===n?'selected':''}>${n}"</option>`).join('')}</select></div>
            <div class="form-group"><label>Line Spacing</label><select name="lineSpacing">${spacings.map(n=>`<option value="${n}" ${s.lineSpacing===n?'selected':''}>${n}</option>`).join('')}</select></div>
          </div>
          <div class="form-group"><label>General Instructions</label><textarea name="instructions" rows="2">${s.instructions}</textarea></div>
          <button type="submit" class="btn-primary"><i class="fas fa-save"></i> Save Default Settings</button>
        </form>
      </div>
    </div>
    <div class="card fade-up-2" style="margin-bottom:20px">
      <div class="card-header"><h3 style="font-size:16px;font-weight:700">Per-Class Overrides</h3><button class="btn-secondary btn-sm" data-action="open-class-override"><i class="fas fa-plus"></i> Add Override</button></div>
      <div class="card-body">${overrides||'<div style="text-align:center;padding:20px;color:var(--muted);font-size:13px">No per-class overrides. All classes use defaults.</div>'}</div>
    </div>
    <div class="card fade-up-3">
      <div class="card-body" style="display:flex;gap:12px;align-items:start">
        <i class="fas fa-circle-info" style="color:var(--info);font-size:20px;margin-top:2px"></i>
        <div><div style="font-weight:600;font-size:14px;margin-bottom:4px">How it works</div><div style="font-size:13px;color:var(--muted);line-height:1.6">When a teacher opens "Set Examination", the formatting rules are loaded automatically and <strong>locked</strong>. Teachers can only add questions — they cannot change fonts, alignment, or paper structure. The Download PDF button produces a paper that follows your specifications exactly, as if formatted in Microsoft Word.</div></div>
      </div>
    </div>`;

  document.getElementById('exam-settings-form').addEventListener('submit',e=>{
    e.preventDefault();
    const fd=new FormData(e.target);
    const obj={};
    for(const[k,v]of fd.entries())obj[k]=v;
    obj.numQuestions=parseInt(obj.numQuestions);
    obj.fontSize=parseInt(obj.fontSize);
    obj.indentation=parseFloat(obj.indentation);
    obj.lineSpacing=parseFloat(obj.lineSpacing);
    S.examSettings.default=obj;
    saveState();toast('Default settings saved');
  });
}

      questions:[]
    };
  }

          <div class="form-group" style="margin:0"><label>Subject</label><select id="eb-subject" onchange="updateExamDraft('subjectId',this.value)">${S.subjects.map(s=>`<option value="${s.id}" ${draft.subjectId===s.id?'selected':''}>${s.name}</option>`).join('')}</select></div>
          <div class="form-group" style="margin:0"><label>Exam Title</label><input type="text" id="eb-title" value="${draft.title||settings.examTitle}" oninput="updateExamDraft('title',this.value)"></div>
        </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px" class="fade-up-3">

function getExamSettings(classId){
  return S.examSettings[classId]||S.examSettings.default;
}

function renderQuestionCard(q,i){
  const typeMap={
    mcq:{label:'Multiple Choice',icon:'fa-list-check',color:'#0284C7'},
    short:{label:'Short Answer',icon:'fa-pen',color:'#16A34A'},
    long:{label:'Long Answer',icon:'fa-paragraph',color:'#D97706'},
    drawing:{label:'Drawing',icon:'fa-pencil',color:'#7C3AED'},
    picture:{label:'Picture',icon:'fa-image',color:'#DC2626'}
  };
  const t=typeMap[q.type]||typeMap.short;
  let extra='';
  if(q.type==='mcq'){
    extra=`<div style="margin-top:8px"><label style="font-size:12px;font-weight:600;color:var(--muted);margin-bottom:4px;display:block">Options</label>
    ${(q.options||['','','','']).map((opt,idx)=>`<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
      <span style="font-weight:700;color:var(--primary);width:18px">${String.fromCharCode(65+idx)})</span>
      <input class="form-group" style="padding:6px 10px;font-size:13px" value="${opt}" onchange="updateQuestionOption(${q.id},${idx},this.value)" placeholder="Option ${String.fromCharCode(65+idx)}">
    </div>`).join('')}</div>`;
  }
  if(q.type==='picture'){
    extra=`<div style="margin-top:8px"><label style="font-size:12px;font-weight:600;color:var(--muted);margin-bottom:4px;display:block">Image URL (optional)</label>
    <input class="form-group" style="padding:6px 10px;font-size:13px" value="${q.picture||''}" onchange="updateQuestionField(${q.id},'picture',this.value)" placeholder="https://...">
    <input type="file" accept="image/*" style="font-size:12px;margin-top:4px" onchange="uploadQuestionImage(${q.id},this)"></div>`;
  }
  if(q.type==='drawing'){
    extra=`<div style="margin-top:8px;font-size:12px;color:var(--muted)"><i class="fas fa-info-circle"></i> A blank drawing box will appear on the printed paper.</div>`;
  }
  if(q.type==='short'||q.type==='long'){
    extra=`<div style="margin-top:8px;font-size:12px;color:var(--muted)"><i class="fas fa-info-circle"></i> ${q.type==='short'?'Single answer line will be provided.':'Multiple answer lines will be provided.'}</div>`;
  }
  return`<div class="q-card">
    <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:8px">
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-weight:800;font-size:18px;color:var(--primary)">${i+1}.</span>
        <span class="q-type-badge" style="background:${t.color}15;color:${t.color}"><i class="fas ${t.icon}"></i> ${t.label}</span>
      </div>
      <div style="display:flex;gap:4px">
        <button class="btn-secondary btn-sm" style="padding:3px 8px" data-action="move-question" data-id="${q.id}" data-dir="-1" ${i===0?'disabled':''}><i class="fas fa-arrow-up" style="font-size:10px"></i></button>
        <button class="btn-secondary btn-sm" style="padding:3px 8px" data-action="move-question" data-id="${q.id}" data-dir="1" ${i===S.examDraft.questions.length-1?'disabled':''}><i class="fas fa-arrow-down" style="font-size:10px"></i></button>
        <button class="btn-danger btn-sm" style="padding:3px 8px" data-action="remove-question" data-id="${q.id}"><i class="fas fa-trash" style="font-size:10px"></i></button>
      </div>
    </div>
    <div class="form-group" style="margin:0"><textarea rows="2" style="padding:8px 12px;font-size:13px" onchange="updateQuestionField(${q.id},'text',this.value)" placeholder="Type the question here...">${q.text||''}</textarea></div>
    <div style="display:flex;gap:8px;align-items:center;margin-top:6px">
      <label style="font-size:12px;font-weight:600;color:var(--muted)">Marks:</label>
      <input type="number" min="1" value="${q.marks||1}" style="width:60px;padding:4px 8px;border:1px solid var(--border);border-radius:6px;font-size:13px" onchange="updateQuestionField(${q.id},'marks',this.value)">
    </div>
    ${extra}
  </div>`;
}

function renderExamPreview(draft,settings,subj,cls){
  let html=`<div class="exam-paper" style="font-family:'${settings.fontType}',serif;font-size:${settings.fontSize}pt;text-align:${settings.alignment};line-height:${settings.lineSpacing};text-indent:${settings.indentation}in;">
    <div style="text-align:center;margin-bottom:16px">
      <div style="font-weight:bold;font-size:${settings.fontSize+4}pt;text-transform:uppercase">${S.school.name}</div>
      <div style="font-style:italic;font-size:${settings.fontSize-1}pt">${S.school.motto}</div>
      <div style="margin:8px 0;border-top:2px solid #000;border-bottom:1px solid #000;padding:6px 0">
        <div style="font-weight:bold">${draft.title||settings.examTitle}</div>
        <div style="font-size:${settings.fontSize-1}pt;margin-top:2px">${subj?subj.name:''} — ${cls?cls.name:''}</div>
        <div style="font-size:${settings.fontSize-2}pt;margin-top:2px">${S.school.term}, ${S.school.year} • Time: ${settings.timeAllowed}</div>
      </div>
    </div>
    <div style="font-style:italic;font-size:${settings.fontSize-1}pt;margin-bottom:12px">${settings.instructions}</div>`;
  if(draft.questions.length===0){
    html+=`<div style="text-align:center;color:#999;padding:24px;font-style:italic">Questions will appear here as you add them.</div>`;
  }else{
    draft.questions.forEach((q,i)=>{
      html+=`<div style="margin-bottom:14px">`;
      html+=`<div style="font-weight:bold">${i+1}. ${q.text||'Untitled question'} <span style="float:right;font-weight:normal">(${q.marks||1} mark${(q.marks||1)!==1?'s':''})</span></div>`;
      if(q.type==='mcq'){
        (q.options||[]).forEach((opt,idx)=>{if(opt){html+=`<div style="margin-left:24px;margin-top:4px">${String.fromCharCode(65+idx)}) ${opt}</div>`;}});
      }else if(q.type==='short'){
        html+=`<div style="margin-top:6px;border-bottom:1px solid #000;height:18px"></div>`;
      }else if(q.type==='long'){
        for(let l=0;l<4;l++)html+=`<div style="margin-top:8px;border-bottom:1px solid #000;height:14px"></div>`;
      }else if(q.type==='drawing'){
        html+=`<div class="drawing-box"></div>`;
      }else if(q.type==='picture'&&q.picture){
        html+=`<div style="margin-top:6px;text-align:center"><img src="${q.picture}" style="max-height:120px;max-width:100%"></div>`;
      }
      html+=`</div>`;
    });
  }
  html+=`<div style="margin-top:24px;text-align:center;font-style:italic;color:#666;font-size:${settings.fontSize-2}pt">— End of Examination —</div></div>`;
  return html;
}

/* ============================== EXAM BUILDER FUNCTIONS ============================== */
function updateExamDraft(key,value){
  if(!S.examDraft)return;
  S.examDraft[key]=value;
  if(key==='classId'){
    renderContent();
  }else{
    refreshExamPreview();
  }
}
function updateQuestionField(qId,field,value){
  const q=S.examDraft.questions.find(x=>x.id==qId);
  if(q){q[field]=value;refreshExamPreview();}
}
function updateQuestionOption(qId,idx,value){
  const q=S.examDraft.questions.find(x=>x.id==qId);
  if(q){q.options[idx]=value;refreshExamPreview();}
}

function downloadExamPDF(){
  const draft=S.examDraft;
  if(!draft||draft.questions.length===0){toast('Add at least one question first','error');return;}
  const settings=getExamSettings(draft.classId);
  const school=S.school;
  const subj=getSubject(draft.subjectId);
  const cls=getClass(draft.classId);
  const{jsPDF}=window.jspdf;
  const doc=new jsPDF({unit:'pt',format:settings.paperSize.toLowerCase()});
  const fontMap={'Times New Roman':'times','Georgia':'times','Cambria':'times','Arial':'helvetica','Calibri':'helvetica','Courier New':'courier'};
  const font=fontMap[settings.fontType]||'helvetica';
  const pageW=doc.internal.pageSize.getWidth();
  const pageH=doc.internal.pageSize.getHeight();
  const margin=50;
  const contentW=pageW-margin*2;
  const indent=settings.indentation*72;
  const fontSize=settings.fontSize;
  const lineHeight=fontSize*settings.lineSpacing*1.2;
  let y=margin;
  doc.setFont(font,'bold');doc.setFontSize(fontSize+4);
  doc.text(school.name,pageW/2,y,{align:'center'});y+=lineHeight+4;
  doc.setFont(font,'italic');doc.setFontSize(fontSize-1);
  doc.text(school.motto,pageW/2,y,{align:'center'});y+=lineHeight+6;
  doc.setLineWidth(2);doc.line(margin,y,pageW-margin,y);y+=4;
  doc.setLineWidth(0.5);doc.line(margin,y,pageW-margin,y);y+=12;
  doc.setFont(font,'bold');doc.setFontSize(fontSize+2);
  doc.text(draft.title||settings.examTitle,pageW/2,y,{align:'center'});y+=lineHeight+2;
  doc.setFont(font,'normal');doc.setFontSize(fontSize);
  doc.text(`${subj?subj.name:''} — ${cls?cls.name:''}`,pageW/2,y,{align:'center'});y+=lineHeight;
  doc.setFontSize(fontSize-2);
  doc.text(`${school.term}, ${school.year}   •   Time: ${settings.timeAllowed}`,pageW/2,y,{align:'center'});y+=14;
  doc.setFont(font,'italic');doc.setFontSize(fontSize-1);
  const instrLines=doc.splitTextToSize(settings.instructions,contentW);
  doc.text(instrLines,margin,y);y+=instrLines.length*(lineHeight-2)+10;
  draft.questions.forEach((q,i)=>{
    if(y>pageH-margin-40){doc.addPage();y=margin;}
    const qText=`${i+1}. ${q.text||'Untitled question'}`;
    const marksText=`(${q.marks||1} mark${(q.marks||1)!==1?'s':''})`;
    doc.setFont(font,'bold');doc.setFontSize(fontSize);
    const qLines=doc.splitTextToSize(qText,contentW-60);
    doc.text(qLines,margin+indent,y);
    doc.setFont(font,'normal');doc.text(marksText,pageW-margin,y,{align:'right'});
    y+=qLines.length*lineHeight+4;
    if(q.type==='mcq'){
      (q.options||[]).forEach((opt,idx)=>{if(!opt)return;if(y>pageH-margin-20){doc.addPage();y=margin;}
        const optLines=doc.splitTextToSize(`${String.fromCharCode(65+idx)}) ${opt}`,contentW-80);
        doc.text(optLines,margin+indent+20,y);y+=optLines.length*lineHeight+2;});
      y+=4;
    }else if(q.type==='short'){
      if(y>pageH-margin-20){doc.addPage();y=margin;}
      doc.setLineWidth(0.5);doc.line(margin+indent+10,y+12,pageW-margin,y+12);y+=24;
    }else if(q.type==='long'){
      for(let l=0;l<4;l++){if(y>pageH-margin-20){doc.addPage();y=margin;}
        doc.setLineWidth(0.5);doc.line(margin+indent+10,y+10,pageW-margin,y+10);y+=lineHeight+4;}
      y+=4;
    }else if(q.type==='drawing'){
      if(y>pageH-margin-120){doc.addPage();y=margin;}
      doc.setLineWidth(0.7);doc.rect(margin+indent+10,y,contentW-indent-20,100);
      doc.setLineWidth(0.3);
      for(let dx=0;dx<contentW-indent-20;dx+=10){doc.line(margin+indent+10+dx,y,margin+indent+10+dx+30,y+100);}
      y+=110;
    }else if(q.type==='picture'&&q.picture){
      if(y>pageH-margin-140){doc.addPage();y=margin;}
      try{const fmt=q.picture.startsWith('data:image/png')?'PNG':'JPEG';doc.addImage(q.picture,fmt,margin+indent+10,y,Math.min(200,contentW-indent-20),120);y+=130;}catch(e){}
    }
    y+=6;
  });
  doc.setFont(font,'italic');doc.setFontSize(fontSize-2);
  doc.text('— End of Examination —',pageW/2,pageH-30,{align:'center'});
  const filename=`${subj?subj.code:'exam'}_${cls?cls.name.replace(/\s/g,''):''}.pdf`;
  doc.save(filename);
  toast('PDF downloaded successfully');
}

function addTTColumn(){
  const lastPeriod=S.periods[S.periods.length-1];
  const newN=lastPeriod.n+1;
  const parts=lastPeriod.time.split('-');
  const[endH,endM]=parts[1].trim().split(':').map(Number);
  let nH=endH,nM=endM+40;
  if(nM>=60){nH+=Math.floor(nM/60);nM=nM%60;}
  const newTime=`${String(endH).padStart(2,'0')}:${String(endM).padStart(2,'0')}-${String(nH).padStart(2,'0')}:${String(nM).padStart(2,'0')}`;
  S.periods.push({n:newN,time:newTime,type:'lesson'});
  saveState();renderContent();toast(`Session P${newN} added`);
}

      <div class="form-group"><label>Font Size (pt)</label><select name="fontSize">${sizes.map(n=>`<option value="${n}" ${s.fontSize===n?'selected':''}>${n}pt</option>`).join('')}</select></div>
      <div class="form-group"><label>Alignment</label><select name="alignment">${aligns.map(a=>`<option value="${a.v}" ${s.alignment===a.v?'selected':''}>${a.l}</option>`).join('')}</select></div>
      <div class="form-group"><label>Indentation (inches)</label><select name="indentation">${indents.map(n=>`<option value="${n}" ${s.indentation===n?'selected':''}>${n}"</option>`).join('')}</select></div>
      <div class="form-group"><label>Line Spacing</label><select name="lineSpacing">${spacings.map(n=>`<option value="${n}" ${s.lineSpacing===n?'selected':''}>${n}</option>`).join('')}</select></div>
    </div>
    <div class="form-group"><label>General Instructions</label><textarea name="instructions" rows="2">${s.instructions}</textarea></div>
  </form>`;
  const footer=`<button class="btn-secondary" onclick="closeModal()">Cancel</button><button class="btn-primary" onclick="saveClassSettings(${classId})">Save</button>`;
  openModal(`Exam Rules — ${c.name}`,body,footer);
}
function saveClassSettings(classId){
  const form=document.getElementById('class-settings-form');
  const fd=new FormData(form);
  const obj={};
  for(const[k,v]of fd.entries())obj[k]=v;
  obj.numQuestions=parseInt(obj.numQuestions);
  obj.fontSize=parseInt(obj.fontSize);
  obj.indentation=parseFloat(obj.indentation);
  obj.lineSpacing=parseFloat(obj.lineSpacing);
  obj.paperSize=S.examSettings.default.paperSize;
  S.examSettings[classId]=obj;
  saveState();closeModal();renderContent();toast('Class settings saved');
}
function deleteClassSettings(classId){
  if(!confirm('Remove this override? Class will use default settings.'))return;
  delete S.examSettings[classId];
  saveState();renderContent();toast('Override removed');
}
function viewRules(){
  const classId=S.examDraft?S.examDraft.classId:S.classes[0].id;
  const s=getExamSettings(classId);
  const body=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;font-size:13px">
    <div style="padding:10px;background:var(--bg);border-radius:8px"><div style="font-size:11px;text-transform:uppercase;color:var(--muted)">Questions</div><div style="font-weight:700;font-size:16px">${s.numQuestions}</div></div>
    <div style="padding:10px;background:var(--bg);border-radius:8px"><div style="font-size:11px;text-transform:uppercase;color:var(--muted)">Font Type</div><div style="font-weight:700;font-size:16px">${s.fontType}</div></div>
    <div style="padding:10px;background:var(--bg);border-radius:8px"><div style="font-size:11px;text-transform:uppercase;color:var(--muted)">Font Size</div><div style="font-weight:700;font-size:16px">${s.fontSize}pt</div></div>
    <div style="padding:10px;background:var(--bg);border-radius:8px"><div style="font-size:11px;text-transform:uppercase;color:var(--muted)">Alignment</div><div style="font-weight:700;font-size:16px">${s.alignment}</div></div>
    <div style="padding:10px;background:var(--bg);border-radius:8px"><div style="font-size:11px;text-transform:uppercase;color:var(--muted)">Indentation</div><div style="font-weight:700;font-size:16px">${s.indentation}"</div></div>
    <div style="padding:10px;background:var(--bg);border-radius:8px"><div style="font-size:11px;text-transform:uppercase;color:var(--muted)">Line Spacing</div><div style="font-weight:700;font-size:16px">${s.lineSpacing}</div></div>
    <div style="padding:10px;background:var(--bg);border-radius:8px"><div style="font-size:11px;text-transform:uppercase;color:var(--muted)">Paper Size</div><div style="font-weight:700;font-size:16px">${s.paperSize}</div></div>
    <div style="padding:10px;background:var(--bg);border-radius:8px"><div style="font-size:11px;text-transform:uppercase;color:var(--muted)">Time Allowed</div><div style="font-weight:700;font-size:16px">${s.timeAllowed}</div></div>
  </div>
  <div style="margin-top:12px;padding:10px;background:var(--bg);border-radius:8px"><div style="font-size:11px;text-transform:uppercase;color:var(--muted)">Instructions</div><div style="font-size:13px;margin-top:4px">${s.instructions}</div></div>`;
  openModal('Formatting Rules (Locked)',body,'<button class="btn-primary" onclick="closeModal()">Close</button>');
}

/* === QUESTION ACTIONS === */
function addQuestion(type){
  const settings=getExamSettings(S.examDraft.classId);
  if(S.examDraft.questions.length>=settings.numQuestions){toast('Question limit reached','error');return;}
  const q={id:Date.now(),type,text:'',marks:1};
  if(type==='mcq')q.options=['','','',''];
  if(type==='picture')q.picture='';
  S.examDraft.questions.push(q);
  renderContent();
}
function removeQuestion(qId){
  S.examDraft.questions=S.examDraft.questions.filter(q=>q.id!=qId);
  renderContent();
}
function moveQuestion(qId,dir){
  const arr=S.examDraft.questions;
  const i=arr.findIndex(q=>q.id==qId);
  if(i<0)return;
  const j=i+parseInt(dir);
  if(j<0||j>=arr.length)return;
  [arr[i],arr[j]]=[arr[j],arr[i]];
  renderContent();
}

/* ============================== EVENT DELEGATION ============================== */
document.addEventListener('click',function(e){
  const btn=e.target.closest('[data-action]');
  if(!btn){
    const nav=e.target.closest('[data-page]');
    if(nav){navigate(nav.dataset.page);document.getElementById('sidebar')?.classList.remove('open');}
    const ttBtn=e.target.closest('.tt-class-btn');
    if(ttBtn){
      const cid=ttBtn.dataset.classId;
      ttBtn.parentElement.querySelectorAll('.tt-class-btn').forEach(b=>{b.className='btn-sm btn-secondary tt-class-btn';});
      ttBtn.className='btn-sm btn-primary tt-class-btn';
      document.querySelectorAll('.tt-class-grid').forEach(g=>{g.style.display=g.dataset.gridClass===cid?'':'none';});
    }
    return;
  }
  const action=btn.dataset.action;
  const id=parseInt(btn.dataset.id);
  switch(action){
    case'logout':logout();break;
    case'reset-data':if(confirm('Reset all data to demo defaults? This cannot be undone.')){resetState();}break;
    case'open-add-teacher':openTeacherForm();break;
    case'edit-teacher':openTeacherForm(id);break;
    case'delete-teacher':if(confirm('Remove this staff member?')){S.users=S.users.filter(u=>u.id!==id);saveState();renderContent();toast('Staff member removed');}break;
    case'open-add-subject':openSubjectForm();break;
    case'edit-subject':openSubjectForm(id);break;
    case'delete-subject':if(confirm('Delete this subject?')){S.subjects=S.subjects.filter(s=>s.id!==id);saveState();renderContent();toast('Subject deleted');}break;
    case'open-add-class':openClassForm();break;
    case'edit-class':openClassForm(id);break;
    case'delete-class':if(confirm('Delete this class? Students will become unassigned.')){S.classes=S.classes.filter(c=>c.id!==id);S.students.forEach(s=>{if(s.classId===id)s.classId=null;});saveState();renderContent();toast('Class deleted');}break;
    case'assign-class-teacher':openAssignCT(id);break;
    case'open-add-student':openStudentForm();break;
    case'edit-student':openStudentForm(id);break;
    case'delete-student':if(confirm('Delete this student? All their results will be removed.')){S.students=S.students.filter(s=>s.id!==id);S.results=S.results.filter(r=>r.studentId!==id);saveState();renderContent();toast('Student deleted');}break;
    case'edit-tt':openTTForm(btn.dataset);break;
    case'add-tt-column':addTTColumn();break;
    case'regen-timetable':regenTimetable();break;
    case'filter-results':filterResults();break;
    case'bulk-publish':bulkPublish();break;
    case'open-enter-marks':openEnterMarks();break;
    case'open-post-announcement':openAnnouncementForm();break;
    case'delete-announcement':if(confirm('Delete this announcement?')){S.announcements=S.announcements.filter(a=>a.id!==id);saveState();renderContent();toast('Announcement deleted');}break;
    case'open-class-override':openClassOverride();break;
    case'edit-class-settings':editClassSettings(id);break;
    case'delete-class-settings':deleteClassSettings(id);break;
    case'view-rules':viewRules();break;
    case'add-question':addQuestion(btn.dataset.type);break;
    case'remove-question':removeQuestion(id);break;
    case'move-question':moveQuestion(id,btn.dataset.dir);break;
    case'download-pdf':downloadExamPDF();break;
    case'nav-exam-builder':navigate('exam-builder');break;
    case'nav-timetable':navigate('timetable');break;
    case'nav-results':navigate('results');break;
  }
});

/* ============================== INIT ============================== */
render();
</script>
</body>
