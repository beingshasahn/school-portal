<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>School Portal Login</title>

<style>
*{box-sizing:border-box;font-family:Arial,sans-serif}

body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#1e3c72,#2a5298);
  padding:15px;
}

.card{
  background:white;
  width:100%;
  max-width:380px;
  padding:25px;
  border-radius:15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.25);
}

h2{
  text-align:center;
  color:#1e3c72;
  margin-bottom:20px;
}

input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:1px solid #ccc;
  border-radius:8px;
}

.password-wrapper{position:relative}

.toggle{
  position:absolute;
  right:10px;
  top:50%;
  transform:translateY(-50%);
  cursor:pointer;
  font-size:13px;
  color:#1e3c72;
  font-weight:bold;
}

button{
  width:100%;
  padding:12px;
  margin-top:15px;
  border:none;
  border-radius:8px;
  background:#1e3c72;
  color:white;
  cursor:pointer;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

<div class="card">
<h2>School Portal</h2>

<input id="email" type="email" placeholder="Email">

<div class="password-wrapper">
  <input id="password" type="password" placeholder="Password">
  <span class="toggle" onclick="togglePassword()">Show</span>
</div>

<button onclick="login()">Login</button>
</div>

<script>

const SUPABASE_URL = "https://bslofdobcvxkjphbjyzb.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJzbG9mZG9iY3Z4a2pwaGJqeXpiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzODY5NTEsImV4cCI6MjA5Njk2Mjk1MX0.oZ8oxXGxKyN4qwBgWrgdp9JOCkNXtREf6epTAcQg45s";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

/* AUTO SESSION CHECK (IMPORTANT FOR AUTO LOGIN) */
window.addEventListener("load", async () => {
  const { data } = await supabaseClient.auth.getSession();

  if(data.session){
    redirectByRole();
  }
});

/* LOGIN */
async function login(){

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  if(!email || !password){
    alert("Fill all fields");
    return;
  }

  const { data, error } = await supabaseClient.auth.signInWithPassword({
    email,
    password
  });

  if(error){
    alert(error.message);
    return;
  }

  await redirectByRole();
}

/* ROLE ROUTING */
async function redirectByRole(){

  const { data: { user } } = await supabaseClient.auth.getUser();

  if(!user){
    return;
  }

  const { data: profile, error } = await supabaseClient
    .from("profiles")
    .select("role")
    .eq("id", user.id)
    .single();

  if(error || !profile){
    alert("Profile not found");
    return;
  }

  const role = profile.role;

  if(role === "admin"){
    window.location.href = "admin/dashboard.html";
  }
  else if(role === "teacher"){
    window.location.href = "teacher/dashboard.html";
  }
  else if(role === "headteacher"){
    window.location.href = "headteacher/dashboard.html";
  }
  else{
    alert("Unknown role");
  }
}

/* PASSWORD TOGGLE */
function togglePassword(){
  const pass = document.getElementById("password");
  const toggle = document.querySelector(".toggle");

  pass.type = pass.type === "password" ? "text" : "password";
  toggle.innerText = pass.type === "password" ? "Show" : "Hide";
}

</script>

</body>
</html>
