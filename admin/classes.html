<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Classes Management</title>

<style>
*{
  box-sizing:border-box;
  font-family:Arial;
}

body{
  margin:0;
  display:flex;
  min-height:100vh;
  background:#f4f6f9;
}

/* SIDEBAR */
.sidebar{
  width:250px;
  background:#1e3c72;
  color:white;
  padding:20px;
}

.sidebar a{
  display:block;
  color:white;
  text-decoration:none;
  padding:10px;
  margin:6px 0;
  background:rgba(255,255,255,0.1);
  border-radius:6px;
}

/* MAIN */
.main{
  flex:1;
  padding:20px;
}

/* HEADER */
.header{
  background:white;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
}

/* FORM */
.form{
  background:white;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
}

input{
  width:100%;
  padding:10px;
  margin:8px 0;
  border:1px solid #ccc;
  border-radius:6px;
}

button{
  background:#1e3c72;
  color:white;
  padding:10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
  background:white;
  border-radius:10px;
  overflow:hidden;
}

th,td{
  padding:10px;
  border-bottom:1px solid #eee;
  text-align:left;
}

.deleteBtn{
  background:red;
  color:white;
  border:none;
  padding:6px 10px;
  border-radius:6px;
  cursor:pointer;
}

/* RESPONSIVE */
@media(max-width:768px){
  body{flex-direction:column;}
  .sidebar{width:100%;}
}
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h3>Admin Panel</h3>

  <a href="dashboard.html">Dashboard</a>
  <a href="teachers.html">Teachers</a>
  <a href="students.html">Students</a>
  <a href="classes.html">Classes</a>
  <a href="subjects.html">Subjects</a>
  <a href="assignments.html">Assignments</a>
</div>

<!-- MAIN -->
<div class="main">

<div class="header">
  <h2>Classes Management</h2>
</div>

<!-- FORM -->
<div class="form">

  <input type="text" id="class_name" placeholder="Class Name (e.g. Form 1 A)">

  <button onclick="addClass()">Add Class</button>

</div>

<!-- TABLE -->
<table>
  <thead>
    <tr>
      <th>Class Name</th>
      <th>Action</th>
    </tr>
  </thead>

  <tbody id="table"></tbody>
</table>

</div>

<script>

const supabaseUrl = "https://bslofdobcvxkjphbjyzb.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJzbG9mZG9iY3Z4a2pwaGJqeXpiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzODY5NTEsImV4cCI6MjA5Njk2Mjk1MX0.oZ8oxXGxKyN4qwBgWrgdp9JOCkNXtREf6epTAcQg45s";

const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

async function init(){
  loadClasses();
}

/* ADD CLASS */
async function addClass(){

  const class_name = document.getElementById("class_name").value;

  if(!class_name){
    alert("Enter class name");
    return;
  }

  const { error } = await supabaseClient
    .from("classes")
    .insert([{
      class_name
    }]);

  if(error){
    alert(error.message);
  } else {
    alert("Class added 👍");
    loadClasses();
  }
}

/* LOAD CLASSES */
async function loadClasses(){

  const { data } = await supabaseClient
    .from("classes")
    .select("*")
    .order("id",{ascending:false});

  const table = document.getElementById("table");
  table.innerHTML = "";

  data.forEach(c=>{
    table.innerHTML += `
      <tr>
        <td>${c.class_name}</td>
        <td>
          <button class="deleteBtn" onclick="deleteClass('${c.id}')">Delete</button>
        </td>
      </tr>
    `;
  });
}

/* DELETE */
async function deleteClass(id){

  await supabaseClient
    .from("classes")
    .delete()
    .eq("id", id);

  loadClasses();
}

init();

</script>

</body>
</html>
