<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Portal</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{
box-sizing:border-box;
font-family:Segoe UI,Arial;
}

body{
margin:0;
background:#f5f6fa;
}


/* TOP BAR */

.topbar{
background:white;
height:60px;
padding:12px 15px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #eee;
position:sticky;
top:0;
z-index:10;

}


.brand{
display:flex;
align-items:center;
gap:8px;
font-weight:bold;
color:#111;
}


.brand-logo{
width:32px;
height:32px;
background-image:url("https://bslofdobcvxkjphbjyzb.supabase.co/storage/v1/object/public/logos/school.png");
background-size:contain;
background-repeat:no-repeat;
background-position:center;

}

.user{
width:38px;
height:38px;
border-radius:50%;
background:#1e3a8a;
color:white;
display:flex;
align-items:center;
justify-content:center;

font-weight:bold;

}

/* PAGE */

.page{
padding:15px;
animation:fade .3s;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}

}


#welcome{

font-weight:700;
font-size:15px;

}

/* STAT CARDS */

.stat h2{

margin:0;
color:#1e3a8a;
}


/* TABLE */
.table-card{
overflow:auto;
}


table{

width:100%;
border-collapse:collapse;

}


th{

background:#1e3a8a;
color:white;

padding:10px;

}


td{

padding:10px;

border-bottom:1px solid #eee;

font-size:13px;

}


/* BUTTON */

.deleteBtn{

background:#ef4444;

color:white;

border:none;

padding:7px 12px;

border-radius:8px;

cursor:pointer;

}


/* BOTTOM NAV */


.bottom-nav{

position:fixed;

bottom:0;

left:0;
right:0;

height:65px;

background:white;

display:flex;

justify-content:space-around;

align-items:center;

border-top:1px solid #eee;

}


.nav-item{

font-size:12px;

text-align:center;

color:#777;

cursor:pointer;

}


.nav-item span{

display:block;

font-size:20px;

}



.nav-item.active{

color:#f59e0b;

font-weight:bold;

}

/* STAT CARDS */

.cards{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  margin-bottom:20px;
}

.stat{
  background:white;
  padding:12px;
  border-radius:12px;
  box-shadow:0 2px 8px rgba(0,0,0,.06);
  min-height:90px;
}

.stat h2{
  margin:0;
  font-size:22px;
  color:#1e3a8a;
}

.stat p{
  margin:5px 0 0;
  color:#666;
  font-size:12px;
}


/* kwenye screen kubwa iwe nne mstari mmoja */

@media(min-width:768px){

.cards{
  grid-template-columns:repeat(4,1fr);
}

  }

/* MODAL */


#deleteModal{

display:none;

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:rgba(0,0,0,.5);

align-items:center;
justify-content:center;

z-index:999;

}



.modal-box{

background:white;

padding:20px;

width:320px;

border-radius:15px;

text-align:center;

}


.modal-btn{

padding:9px 15px;

border:none;

border-radius:8px;

margin:5px;

cursor:pointer;

}



/* MOBILE */


@media(max-width:700px){

table{

font-size:12px;

}

}



</style>


</head>


<body>


<!-- TOP -->

<div class="topbar">


<div class="brand">

<span class="brand-logo"></span>

KempsPortal Admin

</div>


<div class="user" id="userInitials">

AD

</div>


</div>





<!-- HOME PAGE -->


<div class="page">


<div class="card">


<h3 id="welcome">

Loading...

</h3>


<p style="color:#777;font-size:13px">

Manage school activities easily

</p>


</div>





<div class="cards">


<div class="card stat">

<h2 id="teachers">
0
</h2>

<p>Teachers</p>

</div>



<div class="card stat">

<h2 id="students">
0
</h2>

<p>Students</p>

</div>



<div class="card stat">

<h2 id="classes">
0
</h2>

<p>Classes</p>

</div>



<div class="card stat">

<h2 id="subjects">
0
</h2>

<p>Subjects</p>

</div>


</div>





<div class="card table-card">


<h3>

Teachers Overview

</h3>



<table>


<thead>

<tr>

<th>No</th>
<th>Teacher</th>
<th>Classes</th>
<th>Subjects</th>
<th>Students</th>
<th>Action</th>

</tr>


</thead>



<tbody id="teachersTable">


</tbody>


</table>



</div>



</div>





<!-- BOTTOM NAV -->


<div class="bottom-nav">


<div class="nav-item active">

<span>🏠</span>

Home

</div>


<div class="nav-item"
onclick="location.href='teachers.html'">

<span>👨‍🏫</span>

Teachers

</div>



<div class="nav-item"
onclick="location.href='students.html'">

<span>👨‍🎓</span>

Students

</div>



<div class="nav-item"
onclick="logout()">

<span>⚙️</span>

Logout

</div>


</div>






<!-- DELETE MODAL -->


<div id="deleteModal">


<div class="modal-box">


<h3>

Delete Teacher?

</h3>


<p id="deleteTeacherName"></p>



<button id="confirmDeleteBtn"
class="modal-btn"
style="background:red;color:white">

Delete

</button>



<button onclick="closeModal()"
class="modal-btn"
style="background:#ddd">

Cancel

</button>


</div>


</div>
<script>

const supabaseUrl =
"https://bslofdobcvxkjphbjyzb.supabase.co";

const supabaseKey =
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJzbG9mZG9iY3Z4a2pwaGJqeXpiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzODY5NTEsImV4cCI6MjA5Njk2Mjk1MX0.oZ8oxXGxKyN4qwBgWrgdp9JOCkNXtREf6epTAcQg45s";


const supabaseClient =
supabase.createClient(
supabaseUrl,
supabaseKey
);



let selectedTeacherId=null;



/* PROTECT ADMIN */

async function protect(){


const {data:{user}} =
await supabaseClient.auth.getUser();



if(!user){

location.href="../index.html";
return;

}



const {data:profile,error}=

await supabaseClient

.from("profiles")

.select("role,full_name")

.eq("id",user.id)

.maybeSingle();



if(error){

document.getElementById("welcome")
.innerText="Profile loading error";

return;

}



if(profile?.role !== "admin"){

document.getElementById("welcome")
.innerText="Access denied";

return;

}



let hour=new Date().getHours();

let greet="Good morning";


if(hour>=12 && hour<16){

greet="Good afternoon";

}

else if(hour>=16){

greet="Good evening";

}



document.getElementById("welcome")
.innerText=

`${greet}, ${profile.full_name || "Admin"}`;



// initials

let name =
profile.full_name || "Admin";


document.getElementById("userInitials")
.innerText =
name.substring(0,2).toUpperCase();



}





/* STATS */


async function loadStats(){


let teachers =
await supabaseClient

.from("profiles")

.select("*",
{count:"exact",head:true})

.eq("role","teacher");



let students =
await supabaseClient

.from("students")

.select("*",
{count:"exact",head:true});



let classes =
await supabaseClient

.from("classes")

.select("*",
{count:"exact",head:true});



let subjects =
await supabaseClient

.from("subjects")

.select("*",
{count:"exact",head:true});




document.getElementById("teachers")
.innerText =
teachers.count || 0;


document.getElementById("students")
.innerText =
students.count || 0;


document.getElementById("classes")
.innerText =
classes.count || 0;


document.getElementById("subjects")
.innerText =
subjects.count || 0;


}






/* TEACHERS TABLE */


async function loadTeachers(){


const {data:teachers=[]}=

await supabaseClient

.from("profiles")

.select("*")

.eq("role","teacher");



const {data:assignments=[]}=

await supabaseClient

.from("teacher_assignments")

.select(`
*,
classes(class_name),
subjects(subject_name)
`);




const {data:students=[]}=

await supabaseClient

.from("students")

.select("*");





let table =
document.getElementById("teachersTable");


table.innerHTML="";




teachers.forEach((t,i)=>{


let myAssignments =
assignments.filter(a=>
a.teacher_id===t.id
);



let classes =
[
...new Set(
myAssignments.map(
a=>a.classes?.class_name
))
];



let subjects =
[
...new Set(
myAssignments.map(
a=>a.subjects?.subject_name
))
];



let classIds =
myAssignments.map(a=>a.class_id);



let studentCount =
students.filter(s=>
classIds.includes(s.class_id)
).length;





table.innerHTML += `

<tr>

<td>${i+1}</td>

<td>${t.full_name || t.email}</td>

<td>${classes.join(", ")}</td>

<td>${subjects.join(", ")}</td>

<td>${studentCount}</td>


<td>

<button class="deleteBtn"

onclick="openDeleteModal(
'${t.id}',
'${t.full_name || t.email}'
)">

Delete

</button>

</td>


</tr>

`;



});



}







/* DELETE MODAL */


function openDeleteModal(id,name){

selectedTeacherId=id;


document.getElementById(
"deleteTeacherName"
)
.innerText=name;


document.getElementById(
"deleteModal"
)
.style.display="flex";

}



function closeModal(){

document.getElementById(
"deleteModal"
)
.style.display="none";


selectedTeacherId=null;

}






document
.getElementById("confirmDeleteBtn")
.addEventListener("click",async()=>{


if(!selectedTeacherId)
return;



await supabaseClient

.from("teacher_assignments")

.delete()

.eq("teacher_id",
selectedTeacherId);





const {error}=

await supabaseClient

.from("profiles")

.delete()

.eq("id",
selectedTeacherId);




if(error){

alert(error.message);

}

else{

alert("Teacher deleted successfully");

loadTeachers();

loadStats();

}



closeModal();



});






/* LOGOUT */


async function logout(){

await supabaseClient.auth.signOut();

location.href="../index.html";

}







async function init(){

await protect();

loadStats();

loadTeachers();

}



init();


</script>


</body>

  </html>
