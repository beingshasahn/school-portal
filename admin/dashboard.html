<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{
  box-sizing:border-box;
  font-family:Arial;
}

body{
  margin:0;
  display:flex;
  min-height:100vh;
  background:#f4f6f9;
}

/* SIDEBAR */
.sidebar{
  width:250px;
  background:#1e3c72;
  color:white;
  padding:20px;
}

.sidebar a{
  display:block;
  color:white;
  text-decoration:none;
  padding:10px;
  margin:6px 0;
  background:rgba(255,255,255,0.1);
  border-radius:6px;
}

/* MAIN */
.main{
  flex:1;
  padding:20px;
}

.header{
  background:white;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
}

/* CARDS */
.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:10px;
  margin-bottom:20px;
}

.card{
  background:white;
  padding:15px;
  border-radius:10px;
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
  background:white;
  border-radius:10px;
  overflow:hidden;
}

th,td{
  padding:10px;
  border-bottom:1px solid #eee;
}

th{
  background:#1e3c72;
  color:white;
}

/* BUTTON */
.deleteBtn{
  background:red;
  color:white;
  border:none;
  padding:6px 10px;
  border-radius:6px;
  cursor:pointer;
}

/* MODAL */
#deleteModal{
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.5);
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.modal-box{
  background:white;
  padding:20px;
  border-radius:10px;
  width:320px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.modal-box h3{
  margin:0;
}

.modal-btn{
  padding:8px 12px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  margin:5px;
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h3>Admin Panel</h3>
  <a href="dashboard.html">Dashboard</a>
  <a href="teachers.html">Teachers</a>
  <a href="students.html">Students</a>
</div>

<!-- MAIN -->
<div class="main">

<div class="header">
  <h2>KOROSHO SCHOOL ADMIN</h2>
</div>

<!-- STATS -->
<div class="cards">
  <div class="card">
    <h3 id="teachers">0</h3>
    <p>Teachers</p>
  </div>

  <div class="card">
    <h3 id="students">0</h3>
    <p>Students</p>
  </div>

  <div class="card">
    <h3 id="classes">0</h3>
    <p>Classes</p>
  </div>

  <div class="card">
    <h3 id="subjects">0</h3>
    <p>Subjects</p>
  </div>
</div>

<h3>Teachers Overview</h3>

<table>
  <thead>
    <tr>
      <th>No</th>
      <th>Teacher</th>
      <th>Classes</th>
      <th>Subjects</th>
      <th>Students</th>
      <th>Action</th>
    </tr>
  </thead>

  <tbody id="teachersTable"></tbody>
</table>

</div>

<!-- MODAL -->
<div id="deleteModal">
  <div class="modal-box">
    <h3>Delete Teacher?</h3>

    <p style="margin:10px 0;font-weight:bold;">
      <span id="deleteTeacherName">---</span>
    </p>

    <p style="color:gray;font-size:13px;">
      This action cannot be undone.
    </p>

    <button id="confirmDeleteBtn" class="modal-btn" style="background:red;color:white;">
      Yes Delete
    </button>

    <button onclick="closeModal()" class="modal-btn" style="background:#ccc;">
      Cancel
    </button>
  </div>
</div>

<script>

const supabaseUrl = "https://bslofdobcvxkjphbjyzb.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJzbG9mZG9iY3Z4a2pwaGJqeXpiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzODY5NTEsImV4cCI6MjA5Njk2Mjk1MX0.oZ8oxXGxKyN4qwBgWrgdp9JOCkNXtREf6epTAcQg45s";

const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

/* VARIABLES */
let selectedTeacherId = null;
let selectedTeacherName = "";

/* PROTECT */
async function protect(){
  const { data: { user } } = await supabaseClient.auth.getUser();

  if(!user){
    window.location.href = "../index.html";
    return;
  }

  const { data: profile } = await supabaseClient
    .from("profiles")
    .select("role, full_name")
    .eq("id", user.id)
    .single();

  if(!profile || profile.role !== "admin"){
    window.location.href = "../index.html";
    return;
  }
}

/* LOAD STATS */
async function loadStats(){

  const teachers = await supabaseClient
    .from("profiles")
    .select("*", { count:"exact", head:true })
    .eq("role","teacher");

  const students = await supabaseClient
    .from("students")
    .select("*", { count:"exact", head:true });

  const classes = await supabaseClient
    .from("classes")
    .select("*", { count:"exact", head:true });

  const subjects = await supabaseClient
    .from("subjects")
    .select("*", { count:"exact", head:true });

  document.getElementById("teachers").innerText = teachers.count || 0;
  document.getElementById("students").innerText = students.count || 0;
  document.getElementById("classes").innerText = classes.count || 0;
  document.getElementById("subjects").innerText = subjects.count || 0;
}

/* LOAD TEACHERS */
async function loadTeachers(){

  const { data: teachers } = await supabaseClient
    .from("profiles")
    .select("*")
    .eq("role","teacher");

  const { data: assignments } = await supabaseClient
    .from("teacher_assignments")
    .select("*, classes(class_name), subjects(subject_name)");

  const { data: students } = await supabaseClient
    .from("students")
    .select("*");

  let tbody = document.getElementById("teachersTable");
  tbody.innerHTML = "";

  teachers.forEach((t,index)=>{

    let teacherAssignments = assignments.filter(a => a.teacher_id === t.id);

    let classNames = [...new Set(teacherAssignments.map(a => a.classes.class_name))];
    let subjectNames = [...new Set(teacherAssignments.map(a => a.subjects.subject_name))];

    let classIds = teacherAssignments.map(a => a.class_id);
    let studentCount = students.filter(s => classIds.includes(s.class_id)).length;

    tbody.innerHTML += `
      <tr>
        <td>${index+1}</td>
        <td>${t.full_name || t.email}</td>
        <td>${classNames.join(", ")}</td>
        <td>${subjectNames.join(", ")}</td>
        <td>${studentCount}</td>
        <td>
          <button class="deleteBtn" onclick="openDeleteModal('${t.id}','${t.full_name || t.email}')">
            Delete
          </button>
        </td>
      </tr>
    `;
  });
}

/* OPEN MODAL */
function openDeleteModal(id,name){
  selectedTeacherId = id;
  selectedTeacherName = name;

  document.getElementById("deleteTeacherName").innerText = name;
  document.getElementById("deleteModal").style.display = "flex";
}

/* CLOSE MODAL */
function closeModal(){
  document.getElementById("deleteModal").style.display = "none";
  selectedTeacherId = null;
  selectedTeacherName = "";
}

/* CONFIRM DELETE */
document.getElementById("confirmDeleteBtn").addEventListener("click", async function(){

  if(!selectedTeacherId) return;

  const { error } = await supabaseClient
    .from("profiles")
    .delete()
    .eq("id", selectedTeacherId)
    .eq("role","teacher");

  if(error){
    alert(error.message);
  } else {
    alert("You have successfully deleted this teacher");
    loadTeachers();
    loadStats();
  }

  closeModal();
});

/* LOGOUT */
async function logout(){
  await supabaseClient.auth.signOut();
  window.location.href = "../index.html";
}

/* INIT */
async function init(){
  await protect();
  loadStats();
  loadTeachers();
}

init();

</script>

</body>
</html>
