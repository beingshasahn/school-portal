<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Students Management</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
*{box-sizing:border-box;font-family:Arial}

body{
  margin:0;
  display:flex;
  min-height:100vh;
  background:#f4f6f9;
}

/* SIDEBAR */
.sidebar{
  width:240px;
  background:#1e3c72;
  color:white;
  padding:15px;
}

.sidebar a{
  display:block;
  color:white;
  text-decoration:none;
  padding:8px;
  margin:6px 0;
  background:rgba(255,255,255,0.1);
  border-radius:6px;
  font-size:14px;
}

/* MAIN */
.main{
  flex:1;
  padding:15px;
}

/* HEADER */
.header{
  background:white;
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
}

/* FORM */
.form{
  background:white;
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
}

/* GRID INPUTS */
.form-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
}

/* INPUT STYLE */
input, select{
  width:100%;
  padding:8px;
  border:1px solid #ccc;
  border-radius:6px;
  font-size:13px;
  margin:0;
}

/* BUTTON */
button{
  background:#1e3c72;
  color:white;
  padding:8px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-size:13px;
  margin-top:8px;
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
  background:white;
  border-radius:10px;
  overflow:hidden;
}

th,td{
  padding:8px;
  border-bottom:1px solid #eee;
  font-size:13px;
}

/* ACTION BUTTONS */
.deleteBtn{background:red;padding:5px 8px;border:none;color:white;border-radius:5px}
.editBtn{background:#f0ad4e;padding:5px 8px;border:none;color:white;border-radius:5px}

/* RESPONSIVE */
@media(max-width:768px){
  .sidebar{width:100%}
  body{flex-direction:column}
  .form-grid{grid-template-columns:1fr}
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h3>Admin Panel</h3>
  <a href="#">Dashboard</a>
  <a href="#">Students</a>
  <a href="#">Classes</a>
</div>

<!-- MAIN -->
<div class="main">

<div class="header">
  <h2>Students Management</h2>
</div>

<!-- ADD STUDENT -->
<div class="form">

  <div class="form-grid">

    <input type="text" id="name" placeholder="Student Name">
    <input type="number" id="prem_no" placeholder="Prem No">

    <select id="gender">
      <option value="">Gender</option>
      <option value="Male">Male</option>
      <option value="Female">Female</option>
    </select>

    <select id="class"></select>

  </div>

  <button onclick="addStudent()">Add / Update Student</button>

</div>

<!-- IMPORT -->
<div class="form">

  <button onclick="downloadTemplate()" style="background:green;">
    Download Excel Template
  </button>

  <select id="import_class">
    <option value="">Select Class For Import</option>
  </select>

  <input type="file" id="excelFile">

  <button onclick="importExcel()">Upload & Preview</button>
  <div id="previewSection" style="display:none;margin-top:10px;">
    <h4>Preview</h4>

    <table>
      <thead>
        <tr>
          <th>Prem No</th>
          <th>Name</th>
          <th>Sex</th>
        </tr>
      </thead>
      <tbody id="previewTable"></tbody>
    </table>

    <button onclick="confirmImport()" style="background:green;margin-top:10px;">
      Confirm Import
    </button>
  </div>

</div>

<!-- FILTER -->
<div class="form">
  <select id="filter_class" onchange="loadStudents()">
    <option value="">Filter by Class</option>
  </select>
</div>

<!-- TABLE -->
<table>
  <thead>
    <tr>
      <th>Adm No</th>
      <th>Prem No</th>
      <th>Name</th>
      <th>Gender</th>
      <th>Class</th>
      <th>Action</th>
    </tr>
  </thead>
  <tbody id="table"></tbody>
</table>

</div>

<script>

let previewData = [];
let editingId = null;

const supabaseUrl = "https://bslofdobcvxkjphbjyzb.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJzbG9mZG9iY3Z4a2pwaGJqeXpiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzODY5NTEsImV4cCI6MjA5Njk2Mjk1MX0.oZ8oxXGxKyN4qwBgWrgdp9JOCkNXtREf6epTAcQg45s";

const supabaseClient = supabase.createClient(
  supabaseUrl,
  supabaseKey
);

init();

async function init(){
  await loadClasses();
  await loadStudents();
}

/* LOAD CLASSES */
async function loadClasses(){

  const { data, error } = await supabaseClient
    .from("classes")
    .select("*")
    .order("class_name");

  if(error){
    console.log(error);
    return;
  }

  const c1 = document.getElementById("class");
  const c2 = document.getElementById("filter_class");
  const c3 = document.getElementById("import_class");

  c1.innerHTML = `<option value="">Select Class</option>`;
  c2.innerHTML = `<option value="">Filter by Class</option>`;
  c3.innerHTML = `<option value="">Select Class For Import</option>`;

  data.forEach(c => {

    c1.innerHTML += `
      <option value="${c.id}">
        ${c.class_name}
      </option>
    `;

    c2.innerHTML += `
      <option value="${c.id}">
        ${c.class_name}
      </option>
    `;

    c3.innerHTML += `
      <option value="${c.id}">
        ${c.class_name}
      </option>
    `;

  });

}

/* ADD OR UPDATE STUDENT */
async function addStudent(){

  const student_name =
    document.getElementById("name").value.trim();

  const prem_no =
    document.getElementById("prem_no").value.trim();

  const gender =
    document.getElementById("gender").value;

  const class_id =
    document.getElementById("class").value;

  if(!student_name || !class_id){

    alert("Please fill all required fields.");
    return;
  }

  if(editingId){

    const { error } = await supabaseClient
      .from("students")
      .update({
        student_name,
        prem_no,
        gender,
        class_id
      })
      .eq("id", editingId);

    if(error){
      alert(error.message);
      return;
    }

  }else{

    const admission_no = generateAdmissionNo();

    const { error } = await supabaseClient
      .from("students")
      .insert([{
        admission_no,
        student_name,
        prem_no,
        gender,
        class_id
      }]);

    if(error){
      alert(error.message);
      return;
    }

  }

  resetForm();
  loadStudents();
}

/* RESET FORM */
function resetForm(){

  editingId = null;

  document.getElementById("name").value = "";
  document.getElementById("prem_no").value = "";
  document.getElementById("gender").value = "";
  document.getElementById("class").value = "";
}

/* LOAD STUDENTS */
async function loadStudents(){

  const filter =
    document.getElementById("filter_class").value;

  let query = supabaseClient
    .from("students")
    .select("*")
    .order("id", { ascending:false });

  if(filter){
    query = query.eq("class_id", filter);
  }

  const { data, error } = await query;

  if(error){
    console.log(error);
    return;
  }

  const table =
    document.getElementById("table");

  table.innerHTML = "";

  for(const s of data){

    let className = "";

    if(s.class_id){

      const { data: cls } =
        await supabaseClient
          .from("classes")
          .select("class_name")
          .eq("id", s.class_id)
          .single();

      className = cls?.class_name || "";
    }

    table.innerHTML += `
      <tr>

        <td>${s.admission_no || ""}</td>

        <td>${s.prem_no || ""}</td>

        <td>${s.student_name || ""}</td>

        <td>${s.gender || ""}</td>

        <td>${className}</td>

        <td>

          <button
            class="editBtn"
            onclick='editStudent(${JSON.stringify(s)})'>
            Edit
          </button>

          <button
            class="deleteBtn"
            onclick="deleteStudent('${s.id}')">
            Delete
          </button>

        </td>

      </tr>
    `;
  }
}

/* EDIT */
function editStudent(student){

  editingId = student.id;

  document.getElementById("name").value =
    student.student_name || "";

  document.getElementById("prem_no").value =
    student.prem_no || "";

  document.getElementById("gender").value =
    student.gender || "";

  document.getElementById("class").value =
    student.class_id || "";
}

/* DELETE */
async function deleteStudent(id){

  if(!confirm("Delete this student?")){
    return;
  }

  await supabaseClient
    .from("students")
    .delete()
    .eq("id", id);

  loadStudents();
}

/* TEMPLATE */
function downloadTemplate(){

  const data = [

    {
      prem_no: "202611076",
      student_name: "Shadafi Saidi",
      gender: "Male"
    },

    {
      prem_no: "202611077",
      student_name: "Shamim Bashiru Baisa",
      gender: "Female"
    }

  ];

  const ws = XLSX.utils.json_to_sheet(data);

  const wb = XLSX.utils.book_new();

  XLSX.utils.book_append_sheet(
    wb,
    ws,
    "Students"
  );

  XLSX.writeFile(
    wb,
    "students_template.xlsx"
  );
}

/* IMPORT EXCEL */
async function importExcel(){

  const selectedClass =
    document.getElementById("import_class").value;

  if(!selectedClass){

    alert("Select class first");
    return;
  }

  const file =
    document.getElementById("excelFile").files[0];

  if(!file){

    alert("Choose Excel file");
    return;
  }

  const reader = new FileReader();

  reader.onload = function(e){

    const workbook = XLSX.read(
      new Uint8Array(e.target.result),
      { type:"array" }
    );

    const sheet =
      workbook.Sheets[
        workbook.SheetNames[0]
      ];

    const rows =
      XLSX.utils.sheet_to_json(sheet);

    previewData = [];

    rows.forEach(row => {

      previewData.push({

        admission_no:
          generateAdmissionNo(),

        prem_no:
          row.prem_no || "",

        student_name:
          row.student_name || "",

        gender:
          row.gender || "",

        class_id:
          selectedClass

      });

    });

    showPreview();

  };

  reader.readAsArrayBuffer(file);
}

/* SHOW PREVIEW */
function showPreview(){

  const previewTable =
    document.getElementById("previewTable");

  const previewSection =
    document.getElementById("previewSection");

  previewTable.innerHTML = "";

  previewData.forEach(r => {

    previewTable.innerHTML += `

      <tr>

        <td>${r.prem_no}</td>

        <td>${r.student_name}</td>

        <td>${r.gender}</td>

      </tr>

    `;

  });

  previewSection.style.display = "block";
}

/* CONFIRM IMPORT */
async function confirmImport(){

  if(previewData.length === 0){

    alert("No data to import");
    return;
  }

  const { error } =
    await supabaseClient
      .from("students")
      .insert(previewData);

  if(error){

    alert(error.message);
    return;
  }

  alert(
    previewData.length +
    " students imported successfully"
  );

  previewData = [];

  document.getElementById(
    "previewSection"
  ).style.display = "none";

  document.getElementById(
    "previewTable"
  ).innerHTML = "";

  document.getElementById(
    "excelFile"
  ).value = "";

  loadStudents();
}

/* GENERATE ADMISSION NUMBER */
function generateAdmissionNo(){

  const year =
    new Date().getFullYear();

  const random =
    Math.floor(
      10000 + Math.random() * 90000
    );

  return `KEMPS/${year}/${random}`;
}

</script>

</body>
</html>
