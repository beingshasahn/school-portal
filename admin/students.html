<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>School Admin Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
*{
box-sizing:border-box;
font-family:Segoe UI,Arial;
}

body{
margin:0;
background:#f4f6fb;
display:flex;
min-height:100vh;
}

/* SIDEBAR */
.sidebar{
width:240px;
background:#1e3c72;
color:#fff;
padding:18px;
}

.sidebar h3{
margin:0 0 15px 0;
}

.sidebar a{
display:block;
color:#fff;
text-decoration:none;
padding:10px;
margin:6px 0;
background:rgba(255,255,255,.12);
border-radius:8px;
font-size:14px;
}

/* MAIN */
.main{
flex:1;
padding:15px;
padding-bottom:90px;
}

/* HEADER */
.header{
background:#fff;
padding:15px;
border-radius:12px;
margin-bottom:15px;
box-shadow:0 2px 10px rgba(0,0,0,.06);
}

.header h2{
margin:0;
font-size:18px;
}

.header small{
color:#666;
}

/* OVERVIEW CARDS */
.cards{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
margin-bottom:15px;
}

.card{
background:#fff;
padding:12px;
border-radius:12px;
box-shadow:0 2px 10px rgba(0,0,0,.05);
text-align:center;
}

.card h3{
margin:0;
font-size:14px;
color:#666;
}

.card h1{
margin:5px 0 0;
font-size:20px;
color:#1e3c72;
}

/* FORMS */
.form{
background:#fff;
padding:15px;
border-radius:12px;
margin-bottom:15px;
box-shadow:0 2px 10px rgba(0,0,0,.05);
}

.form-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
}

input,select{
padding:10px;
border:1px solid #ddd;
border-radius:8px;
}

/* BUTTON */
button{
background:#1e3c72;
color:#fff;
border:none;
padding:10px;
border-radius:8px;
cursor:pointer;
}

/* SEARCH */
.search{
margin-bottom:10px;
}

.search input{
width:100%;
}

/* TABLE SCROLL ONLY */
.table-container{
width:100%;
overflow-x:auto;
background:#fff;
border-radius:12px;
box-shadow:0 2px 10px rgba(0,0,0,.05);
}

table{
min-width:800px;
width:100%;
border-collapse:collapse;
}

th{
background:#1e3c72;
color:#fff;
padding:10px;
}

td{
padding:10px;
border-bottom:1px solid #eee;
font-size:13px;
}

/* BOTTOM NAV */
.bottom-nav{
position:fixed;
bottom:0;
left:0;
right:0;
height:65px;
background:#fff;
display:flex;
align-items:center;
justify-content:space-around;
border-top:1px solid #ddd;
z-index:999;
overflow-x:auto;
white-space:nowrap;
}

.nav-item{
text-align:center;
font-size:12px;
color:#777;
min-width:80px;
flex-shrink:0;
}

.nav-item span{
display:block;
font-size:20px;
}

.nav-item.active{
color:#1e3c72;
font-weight:bold;
}

/* MOBILE */
@media(max-width:768px){

.sidebar{display:none;}

.cards{
grid-template-columns:repeat(2,1fr);
}

.form-grid{
grid-template-columns:1fr;
}

}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
<h3>KOROSHO SCHOOL</h3>
<a href="#">Dashboard</a>
<a href="#">Students</a>
<a href="#">Teachers</a>
<a href="#">Classes</a>
<a href="#">Subjects</a>
</div>

<!-- MAIN -->
<div class="main">

<!-- HEADER -->
<div class="header">
<h2>KOROSHO ENGLISH MEDIUM</h2>
<small>Admin Dashboard System</small>
</div>

<!-- CARDS -->
<div class="cards">

<div class="card">
<h3>Students</h3>
<h1 id="studentsCount">0</h1>
</div>

<div class="card">
<h3>Teachers</h3>
<h1 id="teachersCount">0</h1>
</div>

<div class="card">
<h3>Classes</h3>
<h1 id="classesCount">0</h1>
</div>

<div class="card">
<h3>Subjects</h3>
<h1 id="subjectsCount">0</h1>
</div>

</div>

<!-- ADD STUDENT -->
<div class="form">

<div class="form-grid">

<input type="text" id="name" placeholder="Student Name">
<input type="number" id="prem_no" placeholder="Prem No">

<select id="gender">
<option value="">Gender</option>
<option value="Male">Male</option>
<option value="Female">Female</option>
</select>

<select id="class"></select>

</div>

<button onclick="addStudent()">Add Student</button>

</div>

<!-- SEARCH -->
<div class="form search">
<input type="text" id="search" placeholder="Search student...">
</div>

<!-- TABLE -->
<div class="table-container">
<table>
<thead>
<tr>
<th>Adm No</th>
<th>Prem No</th>
<th>Name</th>
<th>Gender</th>
<th>Class</th>
<th>Action</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>
</div>

</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">

<div class="nav-item active">
<span>🏠</span>
Home
</div>

<div class="nav-item">
<span>👨‍🎓</span>
Students
</div>

<div class="nav-item">
<span>👨‍🏫</span>
Teachers
</div>

<div class="nav-item">
<span>📊</span>
Reports
</div>

<div class="nav-item">
<span>☰</span>
More
</div>

</div>

<script>

const supabaseUrl="https://bslofdobcvxkjphbjyzb.supabase.co";
const supabaseKey="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJzbG9mZG9iY3Z4a2pwaGJqeXpiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzODY5NTEsImV4cCI6MjA5Njk2Mjk1MX0.oZ8oxXGxKyN4qwBgWrgdp9JOCkNXtREf6epTAcQg45s";
const supabaseClient=supabase.createClient(supabaseUrl,supabaseKey);

let editingId=null;

init();

async function init(){
await loadStudents();
await loadCounts();
await loadClasses();
}

/* COUNTS */
async function loadCounts(){

let students=await supabaseClient.from("students").select("*",{count:"exact"});
let teachers=await supabaseClient.from("teachers").select("*",{count:"exact"});
let classes=await supabaseClient.from("classes").select("*",{count:"exact"});
let subjects=await supabaseClient.from("subjects").select("*",{count:"exact"});

document.getElementById("studentsCount").innerText=students.count||0;
document.getElementById("teachersCount").innerText=teachers.count||0;
document.getElementById("classesCount").innerText=classes.count||0;
document.getElementById("subjectsCount").innerText=subjects.count||0;

}

/* CLASSES */
async function loadClasses(){
let {data}=await supabaseClient.from("classes").select("*");

document.getElementById("class").innerHTML=
`<option value="">Select Class</option>`;

data.forEach(c=>{
document.getElementById("class").innerHTML+=`
<option value="${c.id}">${c.class_name}</option>
`;
});
}

/* ADD STUDENT */
async function addStudent(){

let name=document.getElementById("name").value;
let prem=document.getElementById("prem_no").value;
let gender=document.getElementById("gender").value;
let class_id=document.getElementById("class").value;

await supabaseClient.from("students").insert([{
student_name:name,
prem_no:prem,
gender,
class_id
}]);

loadStudents();
loadCounts();
}

/* LOAD */
async function loadStudents(){

let {data}=await supabaseClient.from("students").select("*");

let table=document.getElementById("table");
table.innerHTML="";

data.forEach(s=>{
table.innerHTML+=`
<tr>
<td>${s.admission_no||""}</td>
<td>${s.prem_no||""}</td>
<td>${s.student_name||""}</td>
<td>${s.gender||""}</td>
<td>${s.class_id||""}</td>
<td><button>Delete</button></td>
</tr>
`;
});

}

</script>

</body>
</html>
