<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Students Management</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
*{box-sizing:border-box;font-family:Arial}

body{
  margin:0;
  display:flex;
  min-height:100vh;
  background:#f4f6f9;
}

/* SIDEBAR */
.sidebar{
  width:240px;
  background:#1e3c72;
  color:white;
  padding:15px;
}

.sidebar a{
  display:block;
  color:white;
  text-decoration:none;
  padding:8px;
  margin:6px 0;
  background:rgba(255,255,255,0.1);
  border-radius:6px;
  font-size:14px;
}

/* MAIN */
.main{
  flex:1;
  padding:15px;
}

/* HEADER */
.header{
  background:white;
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
}

/* FORM */
.form{
  background:white;
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
}

/* GRID INPUTS */
.form-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
}

/* INPUT STYLE */
input, select{
  width:100%;
  padding:8px;
  border:1px solid #ccc;
  border-radius:6px;
  font-size:13px;
  margin:0;
}

/* BUTTON */
button{
  background:#1e3c72;
  color:white;
  padding:8px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-size:13px;
  margin-top:8px;
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
  background:white;
  border-radius:10px;
  overflow:hidden;
}

th,td{
  padding:8px;
  border-bottom:1px solid #eee;
  font-size:13px;
}

/* ACTION BUTTONS */
.deleteBtn{background:red;padding:5px 8px;border:none;color:white;border-radius:5px}
.editBtn{background:#f0ad4e;padding:5px 8px;border:none;color:white;border-radius:5px}

/* RESPONSIVE */
@media(max-width:768px){
  .sidebar{width:100%}
  body{flex-direction:column}
  .form-grid{grid-template-columns:1fr}
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h3>Admin Panel</h3>
  <a href="#">Dashboard</a>
  <a href="#">Students</a>
  <a href="#">Classes</a>
</div>

<!-- MAIN -->
<div class="main">

<div class="header">
  <h2>Students Management</h2>
</div>

<!-- ADD STUDENT -->
<div class="form">

  <div class="form-grid">

    <input type="text" id="name" placeholder="Student Name">
    <input type="number" id="prem_no" placeholder="Prem No">

    <select id="gender">
      <option value="">Gender</option>
      <option value="Male">Male</option>
      <option value="Female">Female</option>
    </select>

    <select id="class"></select>

  </div>

  <button onclick="addStudent()">Add / Update Student</button>

</div>

<!-- IMPORT -->
<div class="form">

  <button onclick="downloadTemplate()" style="background:green;">
    Download Excel Template
  </button>

  <select id="import_class">
    <option value="">Select Class For Import</option>
  </select>

  <input type="file" id="excelFile">

  <button onclick="importExcel()">Upload & Preview</button>
  <div id="previewSection" style="display:none;margin-top:10px;">
    <h4>Preview</h4>

    <table>
      <thead>
        <tr>
          <th>Prem No</th>
          <th>Name</th>
          <th>Sex</th>
        </tr>
      </thead>
      <tbody id="previewTable"></tbody>
    </table>

    <button onclick="confirmImport()" style="background:green;margin-top:10px;">
      Confirm Import
    </button>
  </div>

</div>

<!-- FILTER -->
<div class="form">
  <select id="filter_class" onchange="loadStudents()">
    <option value="">Filter by Class</option>
  </select>
</div>

<!-- TABLE -->
<table>
  <thead>
    <tr>
      <th>Adm No</th>
      <th>Prem No</th>
      <th>Name</th>
      <th>Gender</th>
      <th>Class</th>
      <th>Action</th>
    </tr>
  </thead>
  <tbody id="table"></tbody>
</table>

</div>

  loadClasses();

/* CLASSES */
async function loadClasses(){
  const { data } = await supabaseClient.from("classes").select("*");

  const c1 = document.getElementById("class");
  const c2 = document.getElementById("filter_class");
  const c3 = document.getElementById("import_class");
c3.innerHTML = `<option value="">Select Class For Import</option>`;
  c1.innerHTML = `<option value="">Class</option>`;

}

/* ADD */
async function addStudent(){

  const admission_no = generateAdmissionNo();
  const student_name = document.getElementById("name").value;
  const prem_no = document.getElementById("prem_no").value;
  const gender = document.getElementById("gender").value;
  const class_id = document.getElementById("class").value;

  if(!student_name || !class_id){
    alert("Fill required fields");
    return;
  }

  if(editingId){
    await supabaseClient.from("students")
      .update({ admission_no, student_name, prem_no, gender, class_id })
      .eq("id", editingId);
  } else {
    await supabaseClient.from("students")
      .insert([{ admission_no, student_name, prem_no, gender, class_id }]);
  }

  reset();
  loadStudents();
}

function reset(){
  editingId = null;
  document.getElementById("admission_no").value="";
  document.getElementById("name").value="";
  document.getElementById("prem_no").value="";
  document.getElementById("gender").value="";
  document.getElementById("class").value="";
}

/* LOAD */
async function loadStudents(){

  const filter = document.getElementById("filter_class").value;

  let q = supabaseClient.from("students").select("*").order("id",{ascending:false});

  if(filter) q = q.eq("class_id",filter);

  const { data } = await q;

  const table = document.getElementById("table");
  table.innerHTML = "";

  for(let s of data){

    const cls = await supabaseClient.from("classes")
      .select("*").eq("id",s.class_id).single();

    table.innerHTML += `
      <tr>
        <td>${s.admission_no}</td>
        <td>${s.prem_no||""}</td>
        <td>${s.student_name}</td>
        <td>${s.gender||""}</td>
        <td>${cls.data?.class_name||""}</td>
        <td>
          <button class="editBtn" onclick='editStudent(${JSON.stringify(s)})'>Edit</button>
          <button class="deleteBtn" onclick="deleteStudent('${s.id}')">Del</button>
        </td>
      </tr>
    `;
  }
}

/* EDIT */
function editStudent(s){
  editingId = s.id;
  document.getElementById("admission_no").value=s.admission_no;
  document.getElementById("name").value=s.student_name;
  document.getElementById("prem_no").value=s.prem_no||"";
  document.getElementById("gender").value=s.gender;
  document.getElementById("class").value=s.class_id;
}

/* DELETE */
async function deleteStudent(id){
  await supabaseClient.from("students").delete().eq("id",id);
  loadStudents();
}

/* CONFIRM */
async function confirmImport(){
  await supabaseClient.from("students").insert(previewData);

}
function generateAdmissionNo(){

  const year = new Date().getFullYear();

  return "KEMPS/" + year + "/" +
         Math.floor(Math.random()*100000);

</script>

</body>
</html>
