<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Students Management</title>

<style>
*{box-sizing:border-box;font-family:Arial}

body{
  margin:0;
  display:flex;
  min-height:100vh;
  background:#f4f6f9;
}

.sidebar{
  width:250px;
  background:#1e3c72;
  color:white;
  padding:20px;
}

.sidebar a{
  display:block;
  color:white;
  text-decoration:none;
  padding:10px;
  margin:6px 0;
  background:rgba(255,255,255,0.1);
  border-radius:6px;
}

.main{flex:1;padding:20px}

.header{
  background:white;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
}

.form{
  background:white;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
}

input, select{
  width:100%;
  padding:10px;
  margin:8px 0;
  border:1px solid #ccc;
  border-radius:6px;
}

button{
  background:#1e3c72;
  color:white;
  padding:10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  margin:2px;
}

.deleteBtn{background:red}

.editBtn{
  background:#f0ad4e;
}

table{
  width:100%;
  border-collapse:collapse;
  background:white;
}

th,td{
  padding:10px;
  border-bottom:1px solid #eee;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

<div class="sidebar">
  <h3>Admin Panel</h3>
  <a href="dashboard.html">Dashboard</a>
  <a href="teachers.html">Teachers</a>
  <a href="students.html">Students</a>
  <a href="classes.html">Classes</a>
  <a href="subjects.html">Subjects</a>
  <a href="assignments.html">Assignments</a>
</div>

<div class="main">

<div class="header">
  <h2>Students Management</h2>
</div>

<!-- FORM -->
<div class="form">

  <input type="text" id="admission_no" placeholder="Admission Number">
  <input type="text" id="name" placeholder="Student Name">

  <!-- NEW: PREM NUMBER -->
  <input type="number" id="prem_no" placeholder="Prem Number (Numbers only)">

  <select id="gender">
    <option value="">Select Gender</option>
    <option value="Male">Male</option>
    <option value="Female">Female</option>
  </select>

  <select id="class"></select>

  <button onclick="addStudent()">Add Student</button>
</div>
<div class="form">

  <select id="filter_class" onchange="loadStudents()">
    <option value="">Filter by Class (All)</option>
  </select>

</div>
<table>
  <thead>
    <tr>
      <th>Admission No</th>
      <th>Prem No</th>
      <th>Name</th>
      <th>Gender</th>
      <th>Class</th>
      <th>Action</th>
    </tr>
  </thead>

  <tbody id="table"></tbody>
</table>

</div>

<script>

const supabaseUrl = "https://bslofdobcvxkjphbjyzb.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJzbG9mZG9iY3Z4a2pwaGJqeXpiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzODY5NTEsImV4cCI6MjA5Njk2Mjk1MX0.oZ8oxXGxKyN4qwBgWrgdp9JOCkNXtREf6epTAcQg45s";

const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

let editingId = null;

async function init(){
  loadClasses();
  loadStudents();
}

async function loadClasses(){

  const { data } = await supabaseClient
    .from("classes")
    .select("*");

  const classSelect = document.getElementById("class");
  const filterSelect = document.getElementById("filter_class");

  classSelect.innerHTML = `<option value="">Select Class</option>`;
  filterSelect.innerHTML = `<option value="">Filter by Class (All)</option>`;

  data.forEach(c=>{
    classSelect.innerHTML += `<option value="${c.id}">${c.class_name}</option>`;
    filterSelect.innerHTML += `<option value="${c.id}">${c.class_name}</option>`;
  });
}
/* RESET FORM */
function resetForm(){
  document.getElementById("admission_no").value = "";
  document.getElementById("name").value = "";
  document.getElementById("prem_no").value = "";
  document.getElementById("gender").value = "";
  document.getElementById("class").value = "";
  editingId = null;
}

/* ADD OR UPDATE STUDENT */
async function addStudent(){

  const admission_no = document.getElementById("admission_no").value;
  const student_name = document.getElementById("name").value;
  const prem_no = document.getElementById("prem_no").value;
  const gender = document.getElementById("gender").value;
  const class_id = document.getElementById("class").value;

  if(!admission_no || !student_name || !class_id){
    alert("Fill required fields");
    return;
  }

  // UPDATE MODE
  if(editingId){

    const { error } = await supabaseClient
      .from("students")
      .update({
        admission_no,
        student_name,
        prem_no,
        gender,
        class_id
      })
      .eq("id", editingId);

    if(error){
      alert(error.message);
    } else {
      alert("Student updated 👍");
      resetForm();
      loadStudents();
    }

    return;
  }

  // INSERT MODE
  const { error } = await supabaseClient
    .from("students")
    .insert([{
      admission_no,
      student_name,
      prem_no,
      gender,
      class_id
    }]);

  if(error){
    alert(error.message);
  } else {
    alert("Student added 👍");
    resetForm();
    loadStudents();
  }
}

/* LOAD STUDENTS */
async function loadStudents(){

  const filterClass = document.getElementById("filter_class").value;

  let query = supabaseClient
    .from("students")
    .select("*")
    .order("id",{ascending:false});

  // FILTER BY CLASS
  if(filterClass){
    query = query.eq("class_id", filterClass);
  }

  const { data } = await query;

  const table = document.getElementById("table");
  table.innerHTML = "";

  for(let s of data){

    const cls = await supabaseClient
      .from("classes")
      .select("*")
      .eq("id", s.class_id)
      .single();

    table.innerHTML += `
      <tr>
        <td>${s.admission_no}</td>
        <td>${s.prem_no || ""}</td>
        <td>${s.student_name}</td>
        <td>${s.gender || ""}</td>
        <td>${cls.data?.class_name || ""}</td>
        <td>
          <button class="editBtn" onclick='editStudent(${JSON.stringify(s)})'>Edit</button>
          <button class="deleteBtn" onclick="deleteStudent('${s.id}')">Delete</button>
        </td>
      </tr>
    `;
  }
    }

/* EDIT STUDENT */
function editStudent(s){

  editingId = s.id;

  document.getElementById("admission_no").value = s.admission_no;
  document.getElementById("name").value = s.student_name;
  document.getElementById("prem_no").value = s.prem_no || "";
  document.getElementById("gender").value = s.gender;
  document.getElementById("class").value = s.class_id;
}

/* DELETE */
async function deleteStudent(id){

  await supabaseClient
    .from("students")
    .delete()
    .eq("id", id);

  loadStudents();
}

init();

</script>

</body>
</html>
