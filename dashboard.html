<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f4f6f9;
}

.header{
  background:#1e3c72;
  color:white;
  padding:15px;
  text-align:center;
}

.container{
  padding:20px;
}

.card{
  background:white;
  padding:15px;
  margin-bottom:10px;
  border-radius:10px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

button{
  padding:10px;
  border:none;
  border-radius:6px;
  background:#1e3c72;
  color:white;
  cursor:pointer;
}
</style>

</head>

<body>

<div class="header">
<h2>Teacher Dashboard</h2>
</div>

<div class="container">

<div class="card">
<h3>Welcome 👋</h3>
<p>Manage your students and results here.</p>
</div>

<div class="card">
<button onclick="logout()">Logout</button>
</div>

</div>

<script>
function logout(){
  window.location.href = "index.html";
}
</script>

</body>
</html>
