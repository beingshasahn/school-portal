<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teacher Dashboard</title>

<style>
*{
  box-sizing:border-box;
  font-family:Arial;
}

body{
  margin:0;
  display:flex;
  height:100vh;
  background:#f4f6f9;
}

/* SIDEBAR */
.sidebar{
  width:250px;
  background:#1e3c72;
  color:white;
  padding:20px;
  display:flex;
  flex-direction:column;
}

.sidebar h2{
  font-size:18px;
  margin-bottom:20px;
}

.sidebar a{
  color:white;
  text-decoration:none;
  padding:10px;
  margin:5px 0;
  border-radius:6px;
  background:rgba(255,255,255,0.1);
}

.sidebar a:hover{
  background:rgba(255,255,255,0.2);
}

/* MAIN */
.main{
  flex:1;
  padding:20px;
  overflow:auto;
}

/* CARDS */
.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:10px;
  margin-bottom:15px;
}

.card{
  background:white;
  padding:15px;
  border-radius:10px;
  box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
  background:white;
  border-radius:10px;
  overflow:hidden;
}

th,td{
  padding:10px;
  border-bottom:1px solid #eee;
  text-align:left;
}

/* MARKS FORM */
input, select{
  width:100%;
  padding:10px;
  margin-top:8px;
  border-radius:6px;
  border:1px solid #ccc;
}

button{
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:6px;
  background:#1e3c72;
  color:white;
  cursor:pointer;
}

button:hover{
  background:#16325c;
}

/* RESPONSIVE */
@media(max-width:768px){
  body{
    flex-direction:column;
  }
  .sidebar{
    width:100%;
  }
}
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>School Portal</h2>

  <p id="user">Loading...</p>

  <a href="#">Dashboard</a>
  <a href="#">My Classes</a>
  <a href="#">My Subjects</a>
  <a href="#" onclick="logout()">Logout</a>
</div>

<!-- MAIN -->
<div class="main">

<h2>Dashboard</h2>

<div class="cards">
  <div class="card">
    <h3 id="classCount">0</h3>
    <p>Classes</p>
  </div>

  <div class="card">
    <h3 id="subjectCount">0</h3>
    <p>Subjects</p>
  </div>

  <div class="card">
    <h3 id="studentCount">0</h3>
    <p>Students</p>
  </div>
</div>

<h3>Students List</h3>

<table>
  <thead>
    <tr>
      <th>Admission No</th>
      <th>Name</th>
      <th>Gender</th>
    </tr>
  </thead>
  <tbody id="studentsTable"></tbody>
</table>

<!-- MARKS SECTION -->
<h3 style="margin-top:20px;">Enter Marks</h3>

<div class="card">
  <select id="studentSelect"></select>
  <select id="subjectSelect"></select>

  <input id="marks" type="number" placeholder="Enter Marks">

  <button onclick="saveMarks()">Save Marks</button>
</div>

</div>

<script>
const supabaseUrl = "https://bslofdobcvxkjphbjyzb.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJzbG9mZG9iY3Z4a2pwaGJqeXpiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzODY5NTEsImV4cCI6MjA5Njk2Mjk1MX0.oZ8oxXGxKyN4qwBgWrgdp9JOCkNXtREf6epTAcQg45s";

const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

let teacherId = null;
let assignments = [];

// INIT
async function init(){

  const { data } = await supabaseClient.auth.getUser();
  const user = data.user;

  teacherId = user.id;

  document.getElementById("user").innerText =
    "Welcome: " + user.email;

  loadAssignments();
}

// LOAD ASSIGNMENTS
async function loadAssignments(){

  const { data } = await supabaseClient
    .from("teacher_assignments")
    .select("*")
    .eq("teacher_id", teacherId);

  assignments = data || [];

  document.getElementById("classCount").innerText =
    new Set(assignments.map(a=>a.class_id)).size;

  document.getElementById("subjectCount").innerText =
    new Set(assignments.map(a=>a.subject_id)).size;

  loadStudents();
  loadDropdowns();
}

// LOAD STUDENTS TABLE
async function loadStudents(){

  let classIds = [...new Set(assignments.map(a=>a.class_id))];

  const { data } = await supabaseClient
    .from("students")
    .select("*")
    .in("class_id", classIds);

  const table = document.getElementById("studentsTable");
  table.innerHTML = "";

  document.getElementById("studentCount").innerText =
    data.length;

  data.forEach(s=>{
    table.innerHTML += `
      <tr>
        <td>${s.admission_no}</td>
        <td>${s.student_name}</td>
        <td>${s.gender}</td>
      </tr>
    `;
  });
}

// LOAD DROPDOWNS
async function loadDropdowns(){

  const { data: students } = await supabaseClient
    .from("students")
    .select("*");

  const studentSelect = document.getElementById("studentSelect");
  studentSelect.innerHTML = "";

  students.forEach(s=>{
    studentSelect.innerHTML += `
      <option value="${s.id}">${s.student_name}</option>
    `;
  });

  const { data: subjects } = await supabaseClient
    .from("subjects")
    .select("*");

  const subjectSelect = document.getElementById("subjectSelect");
  subjectSelect.innerHTML = "";

  subjects.forEach(s=>{
    subjectSelect.innerHTML += `
      <option value="${s.id}">${s.subject_name}</option>
    `;
  });
}

// SAVE MARKS
async function saveMarks(){

  const student_id = document.getElementById("studentSelect").value;
  const subject_id = document.getElementById("subjectSelect").value;
  const marks = document.getElementById("marks").value;

  const { data: user } = await supabaseClient.auth.getUser();

  const { error } = await supabaseClient
    .from("results")
    .insert([{
      student_id,
      subject_id,
      teacher_id: user.user.id,
      marks
    }]);

  if(error){
    alert(error.message);
  } else {
    alert("Marks saved successfully 👍");
    document.getElementById("marks").value = "";
  }
}

// LOGOUT
async function logout(){
  await supabaseClient.auth.signOut();
  window.location.href = "index.html";
}

init();
</script>

</body>
</html>
