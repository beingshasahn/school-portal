<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teacher Dashboard</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f4f6f9;
}

.header{
  background:#1e3c72;
  color:white;
  padding:15px;
  text-align:center;
}

.container{
  padding:15px;
}

.card{
  background:white;
  padding:15px;
  margin-bottom:10px;
  border-radius:10px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

button{
  padding:10px;
  border:none;
  border-radius:6px;
  background:#1e3c72;
  color:white;
  cursor:pointer;
  margin-top:10px;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

<div class="header">
<h2>Teacher Dashboard</h2>
</div>

<div class="container">

<div class="card">
<h3 id="welcome">Loading...</h3>
<p>Welcome to your dashboard</p>
</div>

<div class="card">
<h4>Your Assigned Students</h4>
<ul id="students"></ul>
<button onclick="loadStudents()">Load Students</button>
</div>

<div class="card">
<button onclick="logout()">Logout</button>
</div>

</div>

<script>
const supabaseUrl = "https://bslofdobcvxkjphbjyzb.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJzbG9mZG9iY3Z4a2pwaGJqeXpiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzODY5NTEsImV4cCI6MjA5Njk2Mjk1MX0.oZ8oxXGxKyN4qwBgWrgdp9JOCkNXtREf6epTAcQg45s";

const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

// GET USER
async function getUser(){
  const { data, error } = await supabaseClient.auth.getUser();

  if(error){
    alert(error.message);
    return null;
  }

  return data.user;
}

// LOAD WELCOME NAME
async function loadUser(){
  const user = await getUser();

  if(user){
    document.getElementById("welcome").innerText =
      "Welcome, " + user.email;
  }
}

// LOAD STUDENTS
async function loadStudents(){
  const user = await getUser();

  if(!user){
    alert("User not logged in");
    return;
  }

  const { data: assignments, error: aError } = await supabaseClient
    .from("teacher_assignments")
    .select("*")
    .eq("teacher_id", user.id);

  if(aError){
    alert(aError.message);
    return;
  }

  if(!assignments || assignments.length === 0){
    alert("No assignments found");
    return;
  }

  const classId = assignments[0].class_id;

  const { data: students, error } = await supabaseClient
    .from("students")
    .select("*")
    .eq("class_id", classId);

  if(error){
    alert(error.message);
    return;
  }

  const list = document.getElementById("students");
  list.innerHTML = "";

  if(!students || students.length === 0){
    list.innerHTML = "<li>No students found</li>";
    return;
  }

  students.forEach(s => {
    let li = document.createElement("li");

    // FIXED HERE 👇
    li.textContent = s.student_name;

    list.appendChild(li);
  });
}

// LOGOUT
function logout(){
  supabaseClient.auth.signOut();
  window.location.href = "index.html";
}

loadUser();
</script>

</body>
</html>
