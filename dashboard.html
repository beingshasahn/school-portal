<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teacher Dashboard</title>

<style>
*{
  box-sizing:border-box;
  font-family:Arial;
}

body{
  margin:0;
  display:flex;
  height:100vh;
  background:#f4f6f9;
}

/* SIDEBAR */
.sidebar{
  width:250px;
  background:#1e3c72;
  color:white;
  padding:20px;
}

.sidebar h2{
  font-size:18px;
  margin-bottom:15px;
}

.sidebar a{
  display:block;
  color:white;
  text-decoration:none;
  padding:10px;
  margin:5px 0;
  background:rgba(255,255,255,0.1);
  border-radius:6px;
}

/* MAIN */
.main{
  flex:1;
  padding:20px;
  overflow:auto;
}

/* FILTERS */
.filters{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-bottom:15px;
}

select{
  width:100%;
  padding:10px;
  border-radius:6px;
  border:1px solid #ccc;
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
  background:white;
  border-radius:10px;
  overflow:hidden;
}

th,td{
  padding:10px;
  border-bottom:1px solid #eee;
  text-align:left;
}

input{
  width:80px;
  padding:6px;
}

/* RESPONSIVE */
@media(max-width:768px){
  body{
    flex-direction:column;
  }
  .sidebar{
    width:100%;
  }
  .filters{
    grid-template-columns:1fr;
  }
}
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>School Portal</h2>
  <p id="user">Loading...</p>

  <a href="#">Dashboard</a>
  <a href="#">Marks Entry</a>
  <a href="#" onclick="logout()">Logout</a>
</div>

<!-- MAIN -->
<div class="main">

<h2>Marks Entry System</h2>

<div class="filters">
  <select id="classSelect" onchange="loadStudents()"></select>
  <select id="subjectSelect"></select>
</div>

<table>
  <thead>
    <tr>
      <th>Admission No</th>
      <th>Name</th>
      <th>Gender</th>
      <th>Marks</th>
      <th>Action</th>
    </tr>
  </thead>
  <tbody id="studentsTable"></tbody>
</table>

</div>

<script>
const supabaseUrl = "https://bslofdobcvxkjphbjyzb.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJzbG9mZG9iY3Z4a2pwaGJqeXpiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzODY5NTEsImV4cCI6MjA5Njk2Mjk1MX0.oZ8oxXGxKyN4qwBgWrgdp9JOCkNXtREf6epTAcQg45s";

const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

let teacherId = null;
let assignments = [];

// INIT
async function init(){

  const { data } = await supabaseClient.auth.getUser();
  teacherId = data.user.id;

  document.getElementById("user").innerText =
    "Welcome " + data.user.email;

  loadAssignments();
}

// LOAD ASSIGNMENTS (FILTERS)
async function loadAssignments(){

  const { data } = await supabaseClient
    .from("teacher_assignments")
    .select("*")
    .eq("teacher_id", teacherId);

  assignments = data || [];

  loadFilters();
}

// LOAD CLASS + SUBJECT DROPDOWNS (ONLY ASSIGNED)
function loadFilters(){

  const classSelect = document.getElementById("classSelect");
  const subjectSelect = document.getElementById("subjectSelect");

  classSelect.innerHTML = "";
  subjectSelect.innerHTML = "";

  let classes = [...new Set(assignments.map(a=>a.class_id))];
  let subjects = [...new Set(assignments.map(a=>a.subject_id))];

  classes.forEach(c=>{
    classSelect.innerHTML += `<option value="${c}">Class ${c}</option>`;
  });

  subjects.forEach(s=>{
    subjectSelect.innerHTML += `<option value="${s}">Subject ${s}</option>`;
  });

  loadStudents();
}

// LOAD STUDENTS BY CLASS
async function loadStudents(){

  const classId = document.getElementById("classSelect").value;

  const { data } = await supabaseClient
    .from("students")
    .select("*")
    .eq("class_id", classId);

  const table = document.getElementById("studentsTable");
  table.innerHTML = "";

  data.forEach(s=>{
    table.innerHTML += `
      <tr>
        <td>${s.admission_no}</td>
        <td>${s.student_name}</td>
        <td>${s.gender}</td>
        <td>
          <input type="number" id="mark-${s.id}" placeholder="0-100">
        </td>
        <td>
          <button onclick="saveMark('${s.id}')">Save</button>
        </td>
      </tr>
    `;
  });
}

// SAVE MARK PER STUDENT
async function saveMark(studentId){

  const subjectId = document.getElementById("subjectSelect").value;
  const marks = document.getElementById("mark-"+studentId).value;

  const { data } = await supabaseClient.auth.getUser();

  const { error } = await supabaseClient
    .from("results")
    .insert([{
      student_id: studentId,
      subject_id: subjectId,
      teacher_id: data.user.id,
      marks: marks
    }]);

  if(error){
    alert(error.message);
  } else {
    alert("Saved 👍");
  }
}

// LOGOUT
async function logout(){
  await supabaseClient.auth.signOut();
  window.location.href = "index.html";
}

init();
</script>

</body>
</html>
