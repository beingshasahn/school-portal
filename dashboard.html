<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teacher Dashboard</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f4f6f9;
}

.header{
  background:#1e3c72;
  color:white;
  padding:15px;
  text-align:center;
}

.container{
  padding:15px;
}

.card{
  background:white;
  padding:15px;
  margin-bottom:10px;
  border-radius:10px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

select{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
}

ul{
  padding-left:20px;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

<div class="header">
<h2>Teacher Dashboard</h2>
</div>

<div class="container">

<div class="card">
<h3 id="welcome">Loading...</h3>
</div>

<div class="card">
<h4>Select Class</h4>
<select id="classSelect" onchange="loadStudents()"></select>

<h4>Select Subject</h4>
<select id="subjectSelect"></select>
</div>

<div class="card">
<h4>Students</h4>
<ul id="students"></ul>
</div>

</div>

<script>
const supabaseUrl = "https://bslofdobcvxkjphbjyzb.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJzbG9mZG9iY3Z4a2pwaGJqeXpiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzODY5NTEsImV4cCI6MjA5Njk2Mjk1MX0.oZ8oxXGxKyN4qwBgWrgdp9JOCkNXtREf6epTAcQg45s";

const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

let assignments = [];

// GET USER
async function getUser(){
  const { data } = await supabaseClient.auth.getUser();
  return data.user;
}

// LOAD USER + ASSIGNMENTS
async function init(){
  const user = await getUser();

  if(!user){
    alert("Not logged in");
    return;
  }

  document.getElementById("welcome").innerText =
    "Welcome " + user.email;

  const { data } = await supabaseClient
    .from("teacher_assignments")
    .select("*")
    .eq("teacher_id", user.id);

  assignments = data || [];

  loadDropdowns();
}

// LOAD DROPDOWNS
function loadDropdowns(){
  const classSelect = document.getElementById("classSelect");
  const subjectSelect = document.getElementById("subjectSelect");

  classSelect.innerHTML = "";
  subjectSelect.innerHTML = "";

  let classes = [...new Set(assignments.map(a => a.class_id))];
  let subjects = [...new Set(assignments.map(a => a.subject_id))];

  classes.forEach(c=>{
    let opt = document.createElement("option");
    opt.value = c;
    opt.textContent = "Class " + c;
    classSelect.appendChild(opt);
  });

  subjects.forEach(s=>{
    let opt = document.createElement("option");
    opt.value = s;
    opt.textContent = "Subject " + s;
    subjectSelect.appendChild(opt);
  });

  loadStudents();
}

// LOAD STUDENTS AUTOMATICALLY
async function loadStudents(){

  const classId = document.getElementById("classSelect").value;

  if(!classId) return;

  const { data } = await supabaseClient
    .from("students")
    .select("*")
    .eq("class_id", classId);

  const list = document.getElementById("students");
  list.innerHTML = "";

  data.forEach(s=>{
    let li = document.createElement("li");
    li.textContent = s.student_name;
    list.appendChild(li);
  });
}

// INIT
init();
</script>

</body>
</html>
