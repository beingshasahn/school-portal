<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>School Portal Login</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{
  box-sizing:border-box;
  font-family:'Roboto',sans-serif;
}

body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#f1f3f4;
}

.card{
  width:100%;
  max-width:380px;
  background:white;
  padding:35px;
  border-radius:12px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.logo{
  text-align:center;
  font-size:20px;
  font-weight:500;
  margin-bottom:5px;
}

.subtitle{
  text-align:center;
  font-size:14px;
  color:#666;
  margin-bottom:20px;
}

input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:1px solid #ccc;
  border-radius:8px;
  outline:none;
}

input:focus{
  border-color:#1a73e8;
}

button{
  width:100%;
  padding:12px;
  margin-top:15px;
  border:none;
  border-radius:8px;
  background:#1a73e8;
  color:white;
  cursor:pointer;
}

button:hover{
  background:#1557b0;
}

.error{
  margin-top:10px;
  color:red;
  font-size:13px;
  display:none;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<div class="card">

  <div class="logo">
    KOROSHO ENGLISH MEDIUM<br>
    School Portal
  </div>

  <div class="subtitle">Sign in to continue</div>

  <input id="email" type="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <div class="error" id="errorBox"></div>

  <button onclick="login()">Sign in</button>

</div>

<script>

const SUPABASE_URL = "https://bslofdobcvxkjphbjyzb.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJzbG9mZG9iY3Z4a2pwaGJqeXpiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzODY5NTEsImV4cCI6MjA5Njk2Mjk1MX0.oZ8oxXGxKyN4qwBgWrgdp9JOCkNXtREf6epTAcQg45s";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

/* ❗ IMPORTANT: NO AUTO LOGIN LOGIC HERE */
/* We DO NOT use onAuthStateChange or getSession redirect */

function showError(msg){
  const box = document.getElementById("errorBox");
  box.style.display = "block";
  box.innerText = msg;
}

/* LOGIN ONLY */
async function login(){

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  if(!email || !password){
    showError("Please fill all fields");
    return;
  }

  const { data, error } = await supabaseClient.auth.signInWithPassword({
    email,
    password
  });

  if(error){
    showError(error.message);
    return;
  }

  await redirectByRole();
}

/* ROLE REDIRECT */
async function redirectByRole(){

  const { data: { user } } = await supabaseClient.auth.getUser();

  if(!user){
    showError("Login failed");
    return;
  }

  const { data: profile, error } = await supabaseClient
    .from("profiles")
    .select("role")
    .eq("id", user.id)
    .maybeSingle();

  if(error || !profile){
    showError("Profile not found");
    return;
  }

  const BASE = "/school-portal";
  const role = profile.role;

  if(role === "admin"){
    window.location.href = `${BASE}/admin/dashboard.html`;
  }
  else if(role === "teacher"){
    window.location.href = `${BASE}/teacher/dashboard.html`;
  }
  else if(role === "headteacher"){
    window.location.href = `${BASE}/headteacher/dashboard.html`;
  }
}

</script>

</body>
</html>
