<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>School Portal Login</title>

<style>
*{
  box-sizing:border-box;
  font-family: Arial, sans-serif;
}

body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(135deg, #1e3c72, #2a5298);
  padding:15px;
}

.card{
  background:white;
  width:100%;
  max-width:380px;
  padding:25px;
  border-radius:15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.25);
}

h2{
  text-align:center;
  color:#1e3c72;
  margin-bottom:20px;
}

input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:1px solid #ccc;
  border-radius:8px;
  font-size:14px;
}

.password-wrapper{
  position:relative;
}

.toggle{
  position:absolute;
  right:10px;
  top:50%;
  transform:translateY(-50%);
  cursor:pointer;
  font-size:13px;
  color:#1e3c72;
  font-weight:bold;
}

button{
  width:100%;
  padding:12px;
  margin-top:15px;
  border:none;
  border-radius:8px;
  background:#1e3c72;
  color:white;
  font-size:15px;
  cursor:pointer;
}

button:hover{
  background:#16325c;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

<div class="card">
<h2>School Portal</h2>

<input id="email" type="email" placeholder="Email">

<div class="password-wrapper">
  <input id="password" type="password" placeholder="Password">
  <span class="toggle" onclick="togglePassword()">Show</span>
</div>

<button onclick="login()">Login</button>
</div>

<script>

const supabaseUrl = "https://bslofdobcvxkjphbjyzb.supabase.co";
const supabaseKey = "YOUR_ANON_KEY_HERE";

const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

/* LOGIN FUNCTION (ROLE BASED FIXED) */
async function login(){

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  if(!email || !password){
    alert("Please fill all fields");
    return;
  }

  const { data, error } =
    await supabaseClient.auth.signInWithPassword({
      email,
      password
    });

  if(error){
    alert(error.message);
    return;
  }

  const user = data.user;

  if(!user){
    alert("Login failed");
    return;
  }

  /* FETCH PROFILE (ROLE) */
  const { data: profile, error: profileError } =
    await supabaseClient
      .from("profiles")
      .select("role")
      .eq("id", user.id)
      .single();

  if(profileError || !profile){
    alert("Profile not found. Contact admin.");
    return;
  }

  const role = profile.role;

  /* SAFE ROLE ROUTING */
  switch(role){

    case "admin":
      window.location.href = "admin/dashboard.html";
      break;

    case "teacher":
      window.location.href = "teacher/dashboard.html";
      break;

    case "headteacher":
      window.location.href = "headteacher/dashboard.html";
      break;

    default:
      alert("Unknown role: " + role);
  }
}

/* PASSWORD TOGGLE */
function togglePassword(){
  const pass = document.getElementById("password");
  const toggle = document.querySelector(".toggle");

  if(pass.type === "password"){
    pass.type = "text";
    toggle.innerText = "Hide";
  } else {
    pass.type = "password";
    toggle.innerText = "Show";
  }
}

</script>

</body>
</html>
