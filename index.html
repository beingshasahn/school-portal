<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>School Portal Login</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{
  box-sizing:border-box;
  font-family:'Roboto',sans-serif;
}

body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#f1f3f4;
}

.card{
  width:100%;
  max-width:380px;
  background:white;
  padding:35px;
  border-radius:12px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
  animation:fadeIn 0.6s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1; transform:translateY(0);}
}

.logo{
  text-align:center;
  font-size:20px;
  font-weight:500;
  margin-bottom:5px;
  color:#202124;
}

.subtitle{
  text-align:center;
  font-size:14px;
  color:#5f6368;
  margin-bottom:25px;
}

input{
  width:100%;
  padding:12px 14px;
  margin-top:12px;
  border:1px solid #dadce0;
  border-radius:8px;
  outline:none;
}

input:focus{
  border-color:#1a73e8;
  box-shadow:0 0 0 2px rgba(26,115,232,0.2);
}

.password-wrapper{
  position:relative;
}

.toggle{
  position:absolute;
  right:10px;
  top:50%;
  transform:translateY(-50%);
  font-size:12px;
  cursor:pointer;
  color:#1a73e8;
}

button{
  width:100%;
  padding:12px;
  margin-top:18px;
  border:none;
  border-radius:8px;
  background:#1a73e8;
  color:white;
  font-weight:500;
  cursor:pointer;
}

button:hover{
  background:#1557b0;
}

.spinner{
  width:16px;
  height:16px;
  border:2px solid #fff;
  border-top:2px solid transparent;
  border-radius:50%;
  animation:spin 0.8s linear infinite;
  display:none;
}

@keyframes spin{
  to{transform:rotate(360deg);}
}

.error{
  margin-top:10px;
  font-size:13px;
  color:#d93025;
  display:none;
}

.success{
  margin-top:10px;
  font-size:13px;
  color:#188038;
  display:none;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<div class="card">

  <div class="logo">
    KOROSHO ENGLISH MEDIUM PRE AND PRIMARY SCHOOL<br>
    School Portal Login
  </div>

  <div class="subtitle">Sign in to continue</div>

  <input id="email" type="email" placeholder="Email">

  <div class="password-wrapper">
    <input id="password" type="password" placeholder="Password">
    <span class="toggle" onclick="togglePassword()">Show</span>
  </div>

  <div class="error" id="errorBox"></div>
  <div class="success" id="successBox"></div>

  <button id="loginBtn" onclick="login()">
    <span>Sign in</span>
  </button>

</div>

<script>

const SUPABASE_URL = "https://bslofdobcvxkjphbjyzb.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJzbG9mZG9iY3Z4a2pwaGJqeXpiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzODY5NTEsImV4cCI6MjA5Njk2Mjk1MX0.oZ8oxXGxKyN4qwBgWrgdp9JOCkNXtREf6epTAcQg45s";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let redirected = false;

/* AUTO SESSION */
supabaseClient.auth.onAuthStateChange((event, session) => {
  if(session && !redirected){
    redirectByRole();
  }
});

/* LOGIN */
async function login(){

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  if(!email || !password){
    showError("Please fill all fields");
    return;
  }

  const { data, error } = await supabaseClient.auth.signInWithPassword({
    email,
    password
  });

  if(error){
    showError(error.message);
    return;
  }

  await redirectByRole();
}

/* ROLE ROUTING - FIXED FOR GITHUB PAGES */
async function redirectByRole(){

  if(redirected) return;
  redirected = true;

  const { data: { user } } = await supabaseClient.auth.getUser();

  if(!user){
    redirected = false;
    return;
  }

  const { data: profile, error } = await supabaseClient
    .from("profiles")
    .select("role")
    .eq("id", user.id)
    .maybeSingle();

  if(error || !profile){
    redirected = false;
    showError("Profile not found");
    return;
  }

  const role = profile.role;

  /* IMPORTANT FIX: GitHub Pages base path */
  const BASE = "/school-portal";

  if(role === "admin"){
    window.location.href = `${BASE}/admin/dashboard.html`;
  }
  else if(role === "teacher"){
    window.location.href = `${BASE}/teacher/dashboard.html`;
  }
  else if(role === "headteacher"){
    window.location.href = `${BASE}/headteacher/dashboard.html`;
  }
  else{
    redirected = false;
    showError("Unknown role");
  }
}

/* PASSWORD TOGGLE */
function togglePassword(){
  const pass = document.getElementById("password");
  pass.type = pass.type === "password" ? "text" : "password";
}

/* UI ERRORS */
function showError(msg){
  const box = document.getElementById("errorBox");
  box.style.display = "block";
  box.innerText = msg;
}

</script>

</body>
    </html>
