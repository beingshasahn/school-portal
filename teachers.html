<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teachers Management</title>

<style>
*{
  box-sizing:border-box;
  font-family:Arial;
}

body{
  margin:0;
  display:flex;
  min-height:100vh;
  background:#f4f6f9;
}

/* SIDEBAR */
.sidebar{
  width:250px;
  background:#1e3c72;
  color:white;
  padding:20px;
}

.sidebar a{
  display:block;
  color:white;
  text-decoration:none;
  padding:10px;
  margin:6px 0;
  background:rgba(255,255,255,0.1);
  border-radius:6px;
}

/* MAIN */
.main{
  flex:1;
  padding:20px;
}

/* HEADER */
.header{
  background:white;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
}

/* FORM */
.form{
  background:white;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
}

input, select{
  width:100%;
  padding:10px;
  margin:8px 0;
  border:1px solid #ccc;
  border-radius:6px;
}

button{
  background:#1e3c72;
  color:white;
  padding:10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
  background:white;
  border-radius:10px;
  overflow:hidden;
}

th,td{
  padding:10px;
  border-bottom:1px solid #eee;
  text-align:left;
}

.deleteBtn{
  background:red;
  padding:6px 10px;
  border:none;
  color:white;
  border-radius:6px;
  cursor:pointer;
}

/* RESPONSIVE */
@media(max-width:768px){
  body{flex-direction:column;}
  .sidebar{width:100%;}
}
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h3>Admin Panel</h3>

  <a href="dashboard.html">Dashboard</a>
  <a href="teachers.html">Teachers</a>
  <a href="students.html">Students</a>
  <a href="classes.html">Classes</a>
  <a href="subjects.html">Subjects</a>
  <a href="assignments.html">Assignments</a>
</div>

<!-- MAIN -->
<div class="main">

<div class="header">
  <h2>Teachers Management</h2>
</div>

<!-- ADD TEACHER -->
<div class="form">
  <h3>Add New Teacher</h3>

  <input type="text" id="name" placeholder="Full Name">
  <input type="email" id="email" placeholder="Email">

  <select id="role">
    <option value="teacher">Teacher</option>
    <option value="headteacher">Headteacher</option>
    <option value="admin">Admin</option>
  </select>

  <button onclick="addTeacher()">Save Teacher</button>
</div>

<!-- TABLE -->
<table>
  <thead>
    <tr>
      <th>Full Name</th>
      <th>Email</th>
      <th>Role</th>
      <th>Action</th>
    </tr>
  </thead>

  <tbody id="teachersTable"></tbody>
</table>

</div>

<script>

const supabaseUrl = "https://bslofdobcvxkjphbjyzb.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJzbG9mZG9iY3Z4a2pwaGJqeXpiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzODY5NTEsImV4cCI6MjA5Njk2Mjk1MX0.oZ8oxXGxKyN4qwBgWrgdp9JOCkNXtREf6epTAcQg45s";

const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

async function init(){
  loadTeachers();
}

/* ADD TEACHER */
async function addTeacher(){

  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const role = document.getElementById("role").value;

  if(!name || !email){
    alert("Fill all fields");
    return;
  }

  const { error } = await supabaseClient
    .from("profiles")
    .insert([{
      full_name: name,
      role: role
    }]);

  if(error){
    alert(error.message);
  } else {
    alert("Teacher added");
    loadTeachers();
  }
}

/* LOAD TEACHERS */
async function loadTeachers(){

  const { data } = await supabaseClient
    .from("profiles")
    .select("*")
    .order("id", { ascending:false });

  const table = document.getElementById("teachersTable");
  table.innerHTML = "";

  data.forEach(t=>{
    table.innerHTML += `
      <tr>
        <td>${t.full_name}</td>
        <td>${t.id || ""}</td>
        <td>${t.role}</td>
        <td>
          <button class="deleteBtn" onclick="deleteTeacher('${t.id}')">Delete</button>
        </td>
      </tr>
    `;
  });
}

/* DELETE */
async function deleteTeacher(id){

  await supabaseClient
    .from("profiles")
    .delete()
    .eq("id", id);

  loadTeachers();
}

init();

</script>

</body>
</html>
